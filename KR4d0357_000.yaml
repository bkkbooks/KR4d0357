body:
  text: 北磵集别集類三宋提要臣等謹北磵集十巻宋釋居簡撰居簡字敬叟潼川王氏子嘉熙中勅住淨慈光孝寺因寓北磵日久故以名集其集詩文各為一編此則皆其所作雜文也張誠子序稱讀其文與宗密未知伯仲誦其詩合參寥覺範為一人不能當也宗密即圭峯禪師裴休為書傳法碑者其文集唐志不著錄今亦未見傳本無從較其工拙第以宋代釋子而論則九僧以下大抵有詩而無文其集中兼有詩文者惟契嵩與惠洪最著契嵩鐔津集好力與儒者爭是非其文博而辨惠洪石門文字禪多宣佛理兼抒文談其文輕而秀居簡此集不摭拾宗門語錄而格意清拔自無蔬筍之氣位置于二人之間亦未遽為蜂腰矣乾隆四十三年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣睦費墀北磵集原序慶元初予始入太學於時偽學之禁嚴臺官胡紘司業髙文虎表裏為爪牙搏噬無虛日學校諸生語言小異輒坐偽罪不以聽予浮沉其間日以短氣遇休沐率一游南北山得士於北磵相羊林泉吟㺯風月足以消遣世慮然予學乎泗水北磵學乎靈山予固不以及彼彼亦不予及也居數年北磵出天台為導師而予更憂患㦄兵間自荆楚浮江漢以歸至東海上則南北山無復相誰何矣予時以特薦補官不受擢第太常寓輦轂下北磵以赤書相勞苦寄新詩啟予出語益峻偉予既歸江西與盱江刺史言北磵於今為偉士刺史走書邀北磵以唐僧紹隆所開山處之北磵髙卧不肯起既而江東部使者以東林雲居力致之亦復不肯起今年予歸自嶺表北磵㳺華亭知予入長安駕小舟看予於清河坊客舎握手道契闊十有三年如一日也讀其文宗密未知其伯仲誦其詩合參寥覺範為一人不能當也雖然北磵無學之宗也文於何有見之文者似焉而已矣北磵於人不茍合合亦不茍睽取舍去就之際潔如也其名居簡其字敬叟其生潼川寓北磵之日久故人不名字之稱北磵云嘉定丁丑十月望日盱江張自明誠子叙
