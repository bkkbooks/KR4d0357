body:
  text: 北澗集卷三宋釋居簡撰大雄寺記行在所直北四十里寺曰大雄舊曰上保安後晉開運四年鄧氏作鎮時建治平二年賜今額地接良渚峰嶺秀野水通安溪沃壤綿亘山無潭湫蜿蜒沕靈嘉定八年夏大旱港斷潢絶者數月羣望不孚此山出雲雨近畿有秋朝廷寵嘉封爵建祠錫賚鼎至始郡祥符寺僧覺定偕方外友慶端相攸居之經始之志克艱克勤壯規宏模儼然在目三門兩廡再造於建中靖國元年則子殊有方起廢於風淩雨震之餘懴堂之作於崇寧三年則子純悉力於時和嵗豐之後髙敞堅好州里鮮儷肖無量夀像作懴悔主為衆庶澡過雪非宅心純想之方子欽晚出才具絶人喟然歎曰是剎之作也亦既久矣殿者所以舍佛表出尊特其可缺乎度才僦工遍扣檀施祁寒隆暑不小休卒有成於政和三年越四年使有常有威造佛菩薩天龍給侍如七金山與殿胥稱至是凡所宜有不可以加矣先是有常結界以落之以禦諸非律儀其法曰天可陟吾界不可入地可陷吾疆不可犯應不吉祥不俟禁呵勇自退舍於廣漠之野而無何有之鄉此常之心也若夫三災彌綸心為本根弗鋤其根圖蔓難既乃於是中自焚自溺窮盡未來庸有了時毋使吾常徒用其力故併書之以授愛堂俾告來者愛堂雅善豫如湛其名嘗主黃檗十二祖大道場云其辭曰幢剎之興存乎其人其人伊何駕大願輪南渡以來寺滿山谷願輪不馳器滿則覆惟我大雄一燈相尋百祀策勳逮于雲礽厥惟艱哉如此其久豈不務速務以不朽龍蟄于山實寄豐凶繄爾正直相吾鼓鐘假菴記淄川王識之束髮自立汲汲為善掉鞅塵表強安四隅榜曰假菴宅心以仁遵路以義瀟灑茆茨剖破藩籬洞然八窗眇然一枝借書東家分照西鄰優哉悠哉聊以卒嵗假於人者若是其假人者豈止是而已古已往矣書則古人之糟粕餔糟餟醨浸漬沉酣歸淡泊寂寥之根發胸中至味之藴殘膏沐新賸馥騰逺有英可擷有豔可摘藻澤萬彚沾溉百世將假無言之言而強記之忘言也假無聞之聞而強聽之絶聞也譬夫水飲豈傍睨者知夫寒暖之節則必萌異同之説異同之説不息則安知吾之所謂假常熟縣大慈寺鐘樓記千鈞之鏞不梁百尺之髙而簨簴之則停輪息苦警昏導迷何所妄冀寒山夜半聲到客船非衲子明心即詩人得句昧者往往以是為迂濶不切不知美教化移風俗王者先務而心華發明照十方剎亦豈細事大慈為福山望剎創梁天監中長江橫陳五峯擁環古木夾道童童如幢寺昔中微木亦就稿及其再振木則重茂大鐘橫撞僅在平地厥聲弗鈜不足以發深省文逺欲造樓未幾而寂其徒如珤了此緒績不日而成嘉定九年三月既望也翬飛半天遐眺無際寺與樓稱鐘又稱之費幾萬緡始逺欲市田為山家經常計幡然而作曰市田非比丘法則又反諸檀施施者不受願聽所欲為至是舉以權輿其事餘出於其父母昆弟飛錫來北澗謁紀嵗月余語之曰昔昭默大士云身為比丘不導父母於佛法中謂之不孝是役也于以繼先志又豁父母昆弟施心一舉而兩得雖然曩見子擔簦負笈問天台之旨於諸老之門今復見冠冕多衆於古靈山晉進不已至於厭飫心初而流通所學以夀佛祖夫如是又豈特孝於其父母哉萬緡之樓土木之事耳吾所紀者在彼而不在此彰教法堂記土必腐木必蠧堂則有成與虧法存諸其人未始有成庸虧耶彰教法堂五間第十七代法中建嵗月莫可考寺無耆宿與夫識載也猊床屏隂題云元豐七年十二月二十五日住持修穆造屏植于堂堂必先豈七年前所造耶隆興元年九月十三第二十七代師寂翻蓋則見於梁題逮寶慶二年弊而不可為矣鼎新之權輿於十一月十五成於三年三月初七柱踏舊礎崇增二尺三寸敞小閣支寢堂之上楹挾以兩祠宇則鄉所未有惟堅罔惟侈惟壯罔惟麗雕刻文藻皆勿用取材於家山取飯於家田取財於施者不足則貸相是役者豫章西山碧雲菴四明如潔落成之日四衆聳瞻謂余為能殆不知余方將謝不能也噫美輪美奐兮固非余心初所由志危而不持顛而不扶盍亦求余所謂法存諸其人無成與虧也何故泉州金粟洞天三教藏記黃老於漢佛於晉宋二氏之書滿寰宇聚則充棟載則汗牛何其多耶問其數各五千餘卷與祕府牙籖相上下巾羃嚴祕往往過之金粟洞天在泉南勝處住山人凝雲黃去華總三家之書于山中置諸大輪藏所謂藏也者藏也涵藏之謂也藏諸名山古也或病其以二氏之書亂祕府妄意求合孔氏噫合其可求乎求而合不勝其不合也茍不可合雖孟賁烏獲之勇之力不可牽糾而使之合不可離也雖強分之視勇力烏乎施然則離合有常理不在呶呶齒舌間也天地間大物莫如海百谷東輸未始見其盈尾閭泄之未始見其虧而與百谷同一味曷嘗求合於百谷既至於海矣海則曰爾江耳河耳淮濟耳盍各安爾甲乙之序涇也渭也亦正爾清濁之分然後去貪取廉旌芳潔驅汙濁俾各從其類雖蹄涔之陋罔不藐夫海失長百谷之道強為是區區之别不可得也夫如是庸詎知吾求合於外耶善乎荆國王文公答曽子固之為言也善學者讀其書惟理之求有合乎吾心樵牧之言不廢茍不合諸理周孔吾不從吾嘗紬繹斯言而志夫學隱然得之於中東海有聖人出焉此言合也此理合也西海有聖人出焉此言合也此理合也故萃天下之書使天下善學者博觀約取離乎其所離合乎其所合也書東禪浴室壁僧園四事外所當有莫先浴室大火三伏金石流土山焦汗浹浹如雨執熱不濯必鬱悶熬燥懵懵如酲沖和之微幾何而弗傷傷則病病則欲為毫末之善了不可得東禪浴室新於紹定五年冬起數十年廢於寺僧惟一之手一之為也亦難矣萃銖裒錙基此役未當開口語人有施輒受受輒適義所受既義人樂其施束薪如桂得三十畝負郭於章氏女為樵采之直費緡逾萬弗務速弗侈靡弗規圗以豐槖囊弗勤衆以淫土木區區求紀載為鑽貴扳勢之具有正因衲子調度乃策其勳勞識諸室之壁為是數者之勸越明年季秋既望潼川北澗云四無室記問宣子以內三術為之主立性具之體以外三術為之張發身器之用遐榻擬古曰無生窟篆裊碧縷曰無聲漏爝火不息然無盡燈落日懸鼓觀無量夀不越尋丈扁曰四無於四無中問清泰津或謂余曰燈即佛身鏡即佛界於此界中復有溟渤彌盧原隰丘陵草木鳥獸人及非人俱從佛生得佛法分云胡西墉設象注想不務內觀區區外馳則語之曰見月執指孰與忘指忘指執月與執指同燈即佛身鏡即佛界子知之矣不知鏡即月也而佛與燈不一不二子識藥矣未識藥忌藥忌反毒益壅病蒂望吾四無適越而北轅日騖日逺只益背馳因作而歌曰鏡非月燈非佛了了見竟何物雲無蒂天無畛流景西頽絲髮無隱千佛院記距余故廬未逮一舍縣曰東關縣之西岡阜秀整龍矯鳳闖一峯橫溪隂作怒猊狀矗石飛峙其上層出千佛莫知幾何年巖間有刻漫不可讀里社禱水旱禳疵癘如響答慶厯二年彭氏造殿舍佛號夀聖院某年月日改廣福子原者張氏子蚤頴異走南方叩耆宿執侍天童宏智覺禪師爰得其旨沉潛燕默以晦其所有余四五嵗時大父行輩指以示余曰是有道者也創大閣于淳熙丙戌擬內院以奉慈氏垂成而死法會實終之慶元庚申敞新閣以佇舊殿之千二百應真輪奐與原所創儷居無何而會亡紹圎舉緒役然後大備兩閣翼然煙霏間與溪山相領略補空缺而來粹爽部勒一丘􅊤鍾英育華豈獨發為人文抑又以境攝人起其所固有之善油然於心初善益善惡罔敢不悛此原之志而會與圓之善巧會之徒了因訪孤山南巖隱居言其詳而請紀述故書之余老矣浩然有登樓之思尚須杖策倚檻遐眺幽尋援毫而賦賦罷而歌以些原與會而與圎相勞苦樂境記湖州余既僦樂境之榻主人與余倚檻喚魚憶濠上遊作濠上吟倚楹而歌曰適兮居樂兮魚所忘者余又安知夫魚夫魚與余怡怡兮愈愈主人莞爾而作曰異乎吾所聞吾師西之酣酣上池車軸九花一花自題故吾狀所樂之境而致其思冀凡我同盟之人既盟之後言歸于好信夫子之樂夫樂吾為子不取余於是原其樂窮其自亂之以曲終之雅而系其辭曰胎蓮命慧之提封地之嚴淨俗之粹美退嗟窮空樂藐四禪載諸契經雜諸傳記無有苦相它土鮮儷豈數畝之宫窮土木幻培塿瀦清漣種芳鮮以蹄涔擬虎眼漩澓所同日語雖然我知之矣惟心惟國惟性惟覺玉芬陀利泥滓芳擢五濁不垢一埃弗著是樂也可以斷百非之鞅可以釋九類之縛昧者昧此而小夫樂福昌院記餘姚遊源溪塢間當重山之陽寺擅其勝建於唐長慶四年逮會昌五年廢錢吳越時號永夀大中祥符元年賜今額後一百九十二年結九夏制方會食於堂則自皓詮始杭之普濟師鑑者發蒙於此晚歸自方外與清涼行仔圗振厥緒先輪藏而鐘閣法堂兩廊次第皆輪奐市田三百畝嵗入七百餘斛可給千指刷數百年已廢之羞嘻亦勤矣然廢興有數也長慶之興也莫不欲子孫世世夀域中一善之成會昌之廢也莫不欲父祖世世夀域中一善之敗成則長慶成敗則會昌敗福昌固自若也然則再造於吳越策勳於巨宋豈偶然哉咨爾鑑洎爾源與仔爾維一乃心毋維罔豫聽守成之難難於圗成燕安之毒毒於艱勤謹終如初率人以誠扶此勝幢勿欹勿傾勿負節衣輟食以為施者是謂報吾君以及吾親資夀寺盧舍那閣記平江崇閣華觀祗樹之制相望皆有大莊嚴藏之一體茍以土木之役澒動觀聽則不耕不桑何自逃祖宗之誅蓋依經所説以境攝心起其所固有之善油然作於外物轇轕之際俗日益下相陵相競日益勝方其忿時莫知自懲亡其身及其親不暇顧雖嚴刑峻罰不足威過塔廟必稽顙舉手是孰使之然耶隱然於中者不自泯也資夀之閣嘉定三年住持善通作寶慶三年無聚智湧登閣而喟然曰美輪美奐昧者未必弗以為遊觀為燕晦失創建厥旨遂實以琅函玉軸五千餘卷一一牙籖標其目中設盧舍那補陀大士壯麗與閣稱凡厥聞見莫不善湧之為咸謂其無忝厥祖無著大士故家遺俗而成就者如此以偈贊曰報身圎滿輪補陀小白花琅函五千軸一一懸牙籖光􅟃日月明復道出雲雨哂乃如幻人幻此如幻境欲度如幻衆成就如幻事是事實非實不實如空花靜寂單復圎及與第一義亦與如上事非同亦非殊洞開樓閣門入已還復閉童子斂念時不隔一絲毫資夀寺永豐莊記市田非比丘法馬祖百丈以十方共住為叢林則塜間樹下者有所歸宿自是資生儲蓄寖成俗建幢樹剎施宅土營厦屋立常産大如甲第小若編户有業則賦興衆多則用繁必經紀於其能集事者掌會稽謹出內制盈縮不足則持盂四方此姑蘇資夀禪寺永豐莊之所由作慶元三年常之無錫淨慧禪寺僧妙瓊妙祖倡二十人以次裒金洎衆施營膏腴一千八百五十四畝縣官拆而復圍者半田舍農器稱是可裕數干指洗鉢之急資夀有田自瓊與祖始方其心初發時此田已具微勇往精奮忍寒苦甘淡泊確乎不可拔百罹弗怨順處逆境尚何以集一事若毛髮比况千五百畝有畸之田哉咨爾衆欲登加行地必先資糧適百里者宿舂糧適千里者三月聚糧佛道長逺久受勤苦乃可得成佛語也百里千里之不啻上上種性則一超直入鄉者大城我所化作為止息耳則法華具載所詣之地果安在而中下之流亦復小憩所謂資糧豈專在黍稷穜稑與夫禾麻菽麥倘受此施終日飰一米未始嚼著或不動口已咬著沙則瓊與祖畢命為期盡瘁於是所成就者戞戞乎其難也何憾焉故樂書其事而紀其嵗月又系之以辭曰飢兮寒粥兮饘饘粥之餘既磨既研志斯堅石斯穿終之以得兔忘蹄兮得魚忘筌九龍山重修普澤寺記梓邑十山川俱秀整發為人文蓋有所自來唐盛時文章顯者有之智術顯者有之逮今未已也郪甲九邑饒沃壤美風俗煮海之富供縣官一水一石半在少陵品題中九龍亦佳處普澤寺踞山之陽故老相傳作於唐嵗月莫可考考於圗經無聞殿最古記不及創始淳熙癸卯祖輝新華構擬天台方廣舍半千尊者丙午復造重閣煥麗擬內院以奉慈氏兩朵翼然會二十八祖於其下不十年策成績至是盡瘁九年之功也了相嗣厥志不墜振始吁亦勤矣方其權輿之初無一錢直費輒數萬計莫非求人求人之難難於梯天不知幾摧挫幾頓抑譏呵哂誚斥辱困折之不顧乃克就此種種莊嚴使吝驕封蔽者一歷耳一屬目蕩無畛畦本有之善油然而起善種芽甲惡習殄殞夫豈徒殫財力澒觀聽事土木丹碧炫耀浮俗然後為得也嘉定甲申季秋既望輝諸孫宗印為余言其詳余方堅卧小朵之隂鄉夢日栩栩想念存注歷歷冥現如登春臺心空目明萬象掀露了無遁形又若翩然適華胥氏不皇不王淳古粹美作是觀已兩忘去來如睡夢覺如蓮華開呼印比丘執柬授事毫忽不遺悉書以記妙湛延夀堂記平江疾病相扶持無憾於養生送死以明王道之本佛世寖古建幢剎棲冷灰稿株臘穹德茂者却塜間桑下嵐昏霧蝕之患又為省行堂以别不老不病欲其循省日用事若學之正偏業之勤荒行之缺全思之沉掉好惡之失中喜怒之或私利養是崇進修是怠應病授藥法惟一味以治其內劑砭針艾以攻其外正命小康幻體亦寧或又謂之延夀堂延夀云者延此者也夀此者也非人間世短修延促之謂也今者反是樂便安者巧圗其居耽燕佚者曲求其處先之以貨賂申之以強援弗知廉與遜為何物盡巧致曲疇知志於道者袖手旁顧泚顙芒背忍死不為也一念之忍傲睨黃髮鯢齒纍然困踣於其外祖宗成憲遂為具文往往大叢林亦如之今妙湛鼎新斯堂故書近世叢林墜典以告覆車在前冀革斯轍雖然水沫芭蕉匪石匪金燕安鴆毒少壯勿恃美疢惡石老病無忽作如是觀以度生死則住山月巖某之宰制耆舊執事某之裁割勤勞百艱不徒其為是役也作於紹定三年仲夏晦落之於冬書雲慶寧僧堂記華亭慶寧自某年月日智圎創建若干年殿宇厨庫容衆之具凡所當有次第而集者其徒師訓之力居多又若干年而僧堂之役未舉緇白之有力者未嘗過而問焉今成於圓公之孫訓公之子古鏡文杲祖作之父述之子成之君子曰善繼志也僧堂之作非古人意古無招提况堂耶自枯木留香後天下較竒策勝翬飛炫耀床榻窗几惟恐不壯麗耄耋疾疢無霧霾風雨暴露之慘既適既寧精勵勝進當倍蓰異時塜間樹下不三宿者何反無聞焉方其滑扉疏櫺一單三椽正因者莫不廩然反觀惕然內求絶意死生榮辱外形骸於死灰稿木志節獨苦於塜樹間不相下充其所學飫其心初不愆先聖決定明訓然後以其所覺而覺他人答此信施昧者反是茍安宅形冥冥烏鳶念念臭腐坐馳於庸鄙汙雜今夕何夕颯然白首入生死輪出沒異類靡所底麗展轉酬酢無有窮已於戲釋籖巖迥燕坐石冷赤城華頂萬八千丈我念昔者峻躋巍陟日死魅匿草腥蛇落百世之下道震吳越舉此話頭夜欵古鏡惟此古鏡是則是效苦心松筠制行氷檗不獨居此堂無愧焉抑又率人臻無愧之地欲鑱余文余則有愧紹定四年良月旦潼川北澗記崇聖院記江隂常距江隂逾百里無招提衲子暮夜投逆旅與商賈雜秋潦冬氷宿再或信實戾三尺而百丈所呵尤不小貸剎樹於此中流一壺也丹丘智觀早出於外見聞頗習惕然不啻飢溺歸白父母願得所當豫之産之直父母豫之卷而來兹既營剃髮益自刻苦裒錙銖積分毫相攸爽塏插草成梵剎凡所當有者次第而集作於紹定元年白禮部給臨安府錢塘縣崇聖院廢額甲乙焚修以待雲水訪北澗隱居倫次其事乞紀嵗月則謂之曰天地間寧欠爾把茒也今夫人之子子曰伊吾上口必曰釋氏熾王澤熄王澤熄則害中國蠧四民又何汲汲此役嗾其喙哉觀曰子何見之晚也六騑渡江扈而至者矍起為侯伯戚里內侍賜寺恩寵厥父祖金碧照耀西湖南北操墁入其門一世閲幾興廢洎煙冷燈㶳之不嗣與夫豪力盜據而不復振者何限我之所作拾其殘棄之餘移置荒寒寂絶之地俾緇白不相紊避三尺百丈之禁孰曰不可子獨不聞荆國王文公云方今亂俗不在佛乃在學士大夫沉沒利欲歐陽氏則曰修仁義以勝之仁義勝吾死無憾余不懌其言不能敓也興聖寺大悲閣記華亭具千手眼若兩目兩臂而不自多登地已前未易議運兩目兩臂若干手眼而不自少等覺妙覺則多多益辦過此以往則佛地無量聖身歷塵沙劫作所難作辦所難辦從聞思修入三摩地獲二殊勝始一目二目而千萬目乃至八萬四千爍迦羅目一臂二臂而千萬臂乃至八萬四千母陀羅臂目自鑒覺而不知鑑覺手自執捉而與執捉忘各安所安不相違礙手眼可盡其應無窮如風行空吹萬不同或不鳴條濤山撞舂及其止也土囊孰封如月初上清涵萬水影分無數月豈有二及其入也銀闕罔閉如春在花如意在弦意兮不傳春兮不言倥侗小智斟酌聖量如囊流螢擬熾燎原又如敲空欲諧金石不知人人圎具此妙借燈玉座初非髙廣大莊嚴藏本無關鑰紹興九年十月華亭興聖寺火千手眼大士巋然瓦礫中命婦衛氏載之以歸居無何夢好女子謂之曰盍送我還覺而異之燒香拜像前憶夢中女子惟肖涓吉護其入置諸僧堂乾道初議整綴殘缺大參政錢公某實為之倡寺僧互相其事像復完好光燭霄漢行恭惠輝者迹光所自得之於蓮趺右趾聚族而謀曰洪覺著靈隂翊孝治宜崇閣以尊事若雲淨藏如瑩躍然相和未幾恭與雲遞迭而逝瑩曰逝者如斯志未嘗往也願借一臂力以畢余志自淳熙初訖嘉定癸酉嘉平策勤茹苦三十年乃克承奉大士於中復道上安三世佛藻梲燦霞丹楹煥日翼然橫陳出雲雨上諸莊嚴事莫不偉特宜考績而嘉成功故系之以辭曰泠泠兮載熹炎炎兮廪而山移兮數莫移玉石兮俱焚玉兮溫其錢之信由衛而敬信既孚所敬者盡載飾兮載完光奮夜兮斗寒碧瓦兮層翬復道兮雲齊納月兮璇題煥金碧兮陸離同盟兮安之俟如瑩兮一夔超果寺懴院記華亭懴不在堂在乎本心至到懇惻循省往謬自愧自悔一洗滌已永斷相續才萌輒夷毋使滋蔓以事法顯事融理偏是則名為真懴悔處功用雖至已第二月佛言世二健兒一不作一能懴不作則自至於規矩準繩視聽言動焉往而非中焉往而非正能懴則發露發露則克己己私既盡白圭青銅一經磨拂永謝塵玷雖然未若不作之為愈也懴摩改過也改過不吝聖賢所贊過而能改善莫大焉皆健者也健生勇大勇也義理之勇非血氣方剛好勇鬬狠之勇也不然疇能一鉏永盡餘蒂如焦穀芽如石女兒華亭超果寺火後獨懴院未復比丘道元視祖居舊址久矣災翳乃斬蓬藋剪榛棘因其姐氏易簀時餘粧在奩結奩付元琅琅遺言務成此段竒了了不及其私慨慷竒男子生死之際不是過元感其誠益罄其長洎猶子某氏之施市材選良呼集梓人作於紹定四年二月二十八丁丁斧斤不日成之髙廣雄壯輪奐鮮麗懴室嚴密禪觀靚邃飯食經行解衣磐礴各得其所然後檀施市田各為行人了一日入期費綿綿瓜瓞與此懴利它自利相終始因作而言曰萬生擾擾均為目前之謀一息惶惶誰作身後之計若元之姐氏者目前身後俱無憾微元又孰使承其託九里法喜院佛殿記吳江塔廟之制晉魏所嚴尚矣斥像及殿德山也既而復其故何前倨後恭也耶吾嘗究其説矣别傳之妙在直指即吾心見佛性天真萬德無相萬間皆吾性具見量方其柄此能事壁立千仞設殽函之固乃以兩雄不俱立為之説使大乘器一超直入輩玄覺向上人遂有岩頭雪峯勃然作興鼓行而南昭昭揭日月方是時也斥斯振仆斯起是謂不壞世間相而操縱自若也佛者覺也竺云佛譯云覺或曰能仁以仁覺人曰大覺中雖屢迍不啻秦火力排痛詆於雄辨之口而不加損極崇盡敬於不世出之主而不加益口舌狺狺愛憎紛紛只益自勞匪戾吾正法喜大殿之再造也偉特壯麗冠冕衆剎爰有檀度葉為著姓富而知教楷式里閈寺之文顯戒詮素以質實格人卒賴其族風動信施五六比丘從而和之作於紹定戊子某月越二年二月而成然後惠日師永造佛及侍衛如七金山十八開士序列左右使見聞者若天台悟旋陀羅尼於法華見靈山儼然未散既識其實而系厥辭辭曰空王嗣芳遺像有嚴世出世間載仰載瞻踞芬陀花若聆其音即而扣之寂寂若瘖謂其果瘖則為謗佛曰其有聲厥聽斯惑有無兩忘其聲琅琅石湍激風舌相廣長遍覆大千説塵沙偈偈無數字字無數義沿字尋義入海算沙得一實義如空中花空花無蒂義眇朕兆歸根反初十目並照雲斂義天洞然八荒巍巍絶言海印發光喜祥樓記通泉事神如事親神則享薄親而厚神神則羞然則佞神非孝也聰明正直者弗享或曰敬鬼神而逺之既聞命矣未聞孝則謂之曰孔子稱禹曰吾無間然矣菲飲食而致孝乎鬼神未有孝乎鬼神而薄其親者此蘇恱之之拓地遷廟於爽塏龎正黼之倡衆飛樓於空碧遂獲男子之祥而昌其後蓋得事神如事親之道作於嘉定丙子九月十四日越兩年而成輪奐不減白崖白崖今曰玉屏隔江有唐拾遺陳子昻廟余少時往來廟下望玉屏如削樓觀插嵌岩如化出某年月日厄於火新廟未見也少陵杜工部過射洪作詩五篇至今山川為之晶明拾遺讀書堂在金華山并故宅則擅其一二語不及神至今黯然有遺恨抑重文德名節為風俗勸略諸竒偉壯麗之觀耶辭以補其闕俾修嵗時之祀者歌之辭曰雲生兮洲西樓逈兮雲低練繞兮屏開橫翔兮水中坁翼翼兮天四垂駟晴虹兮跨淩煙霏絢兮陽精慘兮隂機人歌吉祥物無癘疵豐潔兮盛粢社酒兮淋漓撫長江兮載釃澄心院藏記通泉佛所説經一味之雨三草二木所澤各異根差性殊豈雨之咎車軸之滴匪海莫容大心溟渤乃克堪受涵攝其義曰藏運行其説曰輪舍藏無以藴其奧非輪無以發其用第二義門特出巧思制成八觚八窗玲瓏面面層室以貯琅函以絢金碧以擬覩史大莊嚴藏樞正厥中以靜以應一機潛發飄風疾旋若翻地軸使海水立蕩胸決眥倐爾如砥曰此權道會心以境嘉定五年三月初十通泉澄心蘭若殿以置藏十二大士琉璃光熾盛光幻出環堵岩石間儼然大光明藏各質所疑又疑東方塵剎神力斷取聞輒意消况見者耶此祖意覺證善巧所自出法堯先造大部四合八百四十卷祖意覺證又足以五千四十八卷是役也動以萬計倒槖不留一簮直餘出諸施者落之於嘉定十五年七月二十三日十年間關亦勤矣噫經來白馬寺止四十二章先覺諸賢華竺接武所致者半滿未具取一闡提生公受擯再譯法華什師蒙恥壁觀沙門則有楞伽四卷新州樵者止聞金剛半偈小龍湫破句讀於海眼任灌家未終軸於圎覺藏乘之備莫盛於斯宜極玄臻奧𡨕心契初視前日相倍蓰曷反寥敻無聞焉雖然舜何人也豫何人也有為者亦若是余喜澄心龍藏無缺文也亦作是説鶴記常州天慶觀鶴可狎乎九臯戞然不可狎也曩常乘軒倐然而來也何故回初度學回者畢至鶴也胎仙庸知夫弗與回騫騰下上於瑶瑟三疊而婆娑焉或曰誕或又曰百獸率舞於擊石拊石樂之和也與天地旁宣人和發於天地間而胎仙格又奚誕若夫玄裳迅飛縞衣翔鳴步虗古壇寥陽廣庭瞭斯覿聰斯聆是日也斂隂縱晴聳瞻萬人長興獄記代人天下之至平莫如天子之法側持則欹古今之常道莫如聖人之經不通則泥囹圄則盡其情偽而後付諸法引經以參證俾不失其當于廷尉時天下無寃民用是道也後世獄市若龍斷豪壓則鬻豪巧誘則鬻巧利啖則鬻利禍怵則鬻禍茍可以利已害人者靡不為也死於箠楚死於桎梏死於凍餒死於疾疫堂堂之生遂為瘖啞無所申訴之死天子之法適足以黼黻其私余試兹邑諸老先生懼余不足任此繁劇則謂之曰昔為此邑者亦人耳前政之善吾師之不善不由也茍擇其易將難者誰屬乎既至視板帳棼如絲會稽之籍爛如糜訂之所聞則老姦猾胥支辭蔓説靜而求之而不得其眹眇而索之慘淡意象差一二相應既而軒豁呈露盡得其要俗雖悍不鄙夷之訟雖嚚不淹回之信稍孚凡所以固陋者一日必葺獄最圮岌岌欲壓囚繫在其下輒栗栗遂痛自撙節而一新之俾不幸而至是者得其所示以字民者加惠於此一本於誠以吾之誠格其所固有之善相警飭於一家由家而井由井而鄉由鄉而邑仁不勝用矣然則悍俗之與嚚訟抑有瘳焉是役也作於某年月日逮月日而落其成北澗集卷三
