body:
  text: 北澗集卷十宋釋居簡撰酒仙祠銘竺仙氏家法嚴于行師善世守者全鋒不足攻也酒亂德謹為之防縱敗禮固為之間踰防間有律智者過則改視覆轍甚焚溺等而上之成佛子住反是蟲臂鼠肝聽其所如吳僧遇賢則異是曰酒亂德吾所以樹德曰縱敗禮吾所以成禮縱是適酒是耆雖酣酲有常度始人惡之少則疑終則敬既而稱酒仙飲之必㫖且多諧謔風生鮮克嬰其鋒或謂東方曼倩不是過信腳行信口道左規右矩旬煆月鍊者未必然也喜淨業不喜清泰問其故曰無酒年八十八笑談與衆訣于所居之明覺了了生死之際祥符五年正月十五日也歌詩滿三吳稚子抵掌歌之謂非酒仙不能作仙姓林生姑蘇之長洲幼失水至嘉興遂從郡之永安可依為比丘五十九臘嗣杭之龍册球公後二百有三載余始識仙象訪遺事于寺僧惟一得皇祐六年濟陽丁偃記淮西張任則重述于淳熙九年一以為未也需余銘拒者四三辭婉而氣益和為之銘銘曰繡佛前醉逃禪人中英飲中仙仙上天第幾禪誰同盟林酒仙蘇峩冠林童顛蹟殊歸心同然德可歌言可傳谷可變陵可遷蘇不崩林不騫梵蓬居塔銘釋慧梵字竺卿縛茆奉母扁曰蓬一時稱蓬居生嘉興府崇德縣之石門顧氏家父母以其無適俗韻事髙陽澄寂院僧守先三年習經懴十三剃落具足受毗尼畢生持守有嚴坐七十六臘壽八十九為子孝臨事敬謹身節用脫略世故君子謂其壽考無愧學性具宗㫖于天竺如虎子學詩于處士陸永仲時東越律師之秀曰亷曰持伯仲也亷口不輟佛名少暇對人語持有詩名左藏張雪窗云忍淚别僧持者也于卿異姓兄弟徒皆先逝孫空覺奉卿如卿奉母死葬蓬中後十七年師謹槖卿詩藁來謁銘乃亡友上方朴翁義銛編次文昌育齊李公沐則為之序以其先大參政有雅故謂其詩似唐諸王孫李長吉讀其詩者當不言而與又嘗演唱于湖之開元智者應侍郎曽文清逮遴選銘曰壽冠五福卿八十九孝先百行卿使母壽母子俱壽天其與之雪月風烟一昌于詩僦東西鄰樹梅水仙自食芳鮮自寫幽妍歡娛母慈而送其死母死不忘以其有子我不識卿聞卿于銛遺事可銘幽光發潜金山蓬山聰禪師塔銘寶慶元年三月十四金山龍游禪寺住山人亡龕留五日奉全身葬于洪信松山菴名永聰字自聞蓬山其號紹興辛巳七月十八生于杭之於潜徐氏八歲剃髮受具服紫伽黎為縣東資聖寺僧行居後還家孰授五經十五從父游徑山别峯機辨警拔白父曰人天龍象也願學焉别峯器之至育王天童當拙菴密菴全盛時婆娑兩翁間或五六年或四三年既壯掌肯堂之記于荐嚴後游閩越江東西湖南北凡緇白名流反復博約雖好夸務勝惡聲相加必雍容婉辭盡底藴乃已嘗語人曰佛祖正印厥任重今也竒貨矗矗如蝟辨而失宗酲而掖醒泛而多岐眊而指津豈無望於捷馳橫騖者掎角而婁其種落耕稼于台之淨慧開法于光孝一香供别峯記初友也徙建康保寧蔣山南徐金山在保寧時制府講守禦甚急師與幕府諸公議論具有本末異時敵入濠滁略蘄黃悉如所料劉潜夫贈詩有聰老才堪將之句往往贋浮圖以識字議已輒笑曰固犯是不韙死無長物年六十五臘五十九度弟子四十餘銘曰語而明默而冥語而忽冥默而忽明語默之不知昭昭乎無遁形樊然葛藤我獨不能惄然如瘖我獨苦心疲精竭志我愚益肆僞飾外修我則反求或聚族而謀曰佞壬擁腫惝恍詼詭罔人欺世千礎萬指有一于此聫臂引類及是則痛誣力非廩乎人可罔耶世果可欺曰罔曰欺墦間餒而蓬山寂寥忍死不為是故北澗銘而載之天童山息菴禪師塔銘公名達觀號息菴婺之義烏趙氏子高曾皆衣冠年十二喜佛書勇舍世俗家父母成其志受業于縣之法惠寺僧正覺欲超大方凡鼎望利養非本色衲子住處往往過門輒掉頭若正因保社窮鄉遐徼越嶺海犯霜露趼足糗糧尋訪不憚逺參應菴于天童見無菴于道場後于天封水菴室中明得二老垂手處瓣香為水菴有自也水菴在閩橫機峻峭為衲子一關徑往扣之一語不浪下破的而後反用覺圓據育王席端氣蓋諸方有從上爪牙宿學所嚴公分板首一語一義反復博約必盡底藴侃侃不相下堅于長城從容佛照一語不契即去至龍翔柏堂虛第一座以俟識者偉柏堂知人開法嚴之靈岩閲四五剎晚自金山被㫖靈隱坐四夏用大覺故事上告老之請歸天童又六夏而蛻嘉定五年七月二十七日也臘五十壽七十五龕留七日奉全身塔于玲瓏岩下得其傳者守中從禮度九十七人永澄永隆猶子也隆先逝大事實澄當之機用播叢林具眼者因言得人而印心泮然一言而忘其所為言則此窣堵波可以銘可以不銘銘曰佛智冡嗣圎悟靈機後之跨竈水菴崛竒不則不足與有為水菴勝幢隻手可支鼎力在腕危而不持不則不足與無為無為之為中下罔知然則飰猫之鉢翻墨之衣孰重孰輕孰是孰非夷禪師碑隂靈隱石鼓既得銘于祕書侍右郎官高公似孫重逸抱銘泣于余曰先師貶剝諸方不小貸所嚴者子一人耳盍一言為之發先師關繫此山者甚至子所見也敢再拜而申之開禧末蝗蔽天赤地連阡陌列剎謝遣客比丘主者心印怫衆自用不推消息盈虛撙節而權其變撞鐘伐鼓延接方來如平居無事時寺亦幾殆為倚城社者師齊敓而有之是時髙峯之鬼能禍福人人嘉神休莫敢不至寺則頓裕晏安易溺前日之匱邈如未始見深禪正修漫不復理以蟻蟲飽適為龍象蹴踏本色衲子掩鼻而過之居無何厭足心生去而之它先師來自乳竇喟然曰昔問道于是佛海佛照故家遺俗猶有存者今掃土矣遂收餘衆因陋就簡仆者支漏者苴尤無良者則去諸尊耆艾禮賢乂寬苛細謹程度懷同志之士稍刷前日因仍之耻而舊貫漸復則又曰僧者佛祖所自出今也貨殖賢不肖無禁乃博訪檀施爰諏爰度選能誦法華楞嚴圓覺洎馬鳴肇師言者謂之合格而得度兾昌厥善類然則日暮途逺盡瘁而止矣銘則缺書余聞而哀之繫之以三字八章章四句辭曰網有綱萬目張法依人建勝幢人壞法人自壞法常住竟安在譬諸谷谷有神彼不呼胡能聲聲既沈響斯絶鎮長靈廣長舌矧石鼓章厥號曰希夷洞𤣥奧奧入𤣥昭昭然謂不見誰樊垣生曷勞死奚息所不死靡有極草芊芊泉濺濺天在水月在天禪鑒法師塔銘禪鑒法師名思義月室其别稱也杭之鹽官馮氏子生有吉夢母竒之甫十有三依縣之開福寺僧宗顯刺血書心經與緇籍年既加長扣天台性具之㫖一時宗工若覺菴言車溪榮霅川規空相秀慧光訥皆有徴詰言句獨于慧光針水無疑闡法于阜陵淑妃陳氏寧親蘭若為十方傳天台宗第一代二十餘載凡三却三就卒蛻于此山壽六十六臘五十三度僧二十餘嘉定九年六月初七是月二十有二廣如廣修卜慈雲迤邐梯嶺之原葬焉吾嘗謂三學諸師均稱嗣祖其名曰祖行解相應解不逮行大車無輗行盈解虧小車無軏無輗無軏其何能行維禪鑒師壯則學解以昌其說晚乃不言以著其行一行三昧常坐不行佛立三昧常行不坐于斯二者既三期修半坐半行非行非坐始終次第收效桑榆豈但小智嵬澒觀聽蓋亦自謂能事畢矣是宜得銘銘曰台衡正傳可默可說默固難窮說亦不竭二威之際緘授而已左溪荆溪千偈翻水後世競辨異夫所同以其異同倒戈自攻繄爾禪鑒以身代舌四種三昧寂而非滅既滅幻影非幻者生爰淑諸徒繩繩以行慈雲以西梯嶺之下一燈長然冏此塔户護國元此菴碑隂此菴大導師正三峯之席分座提唱屬之於應菴大士示寂時二三子方畏知聞未露文采故應菴受以死託凡火化穴藏之役舉無遺力或謂葬禮因仍簡陋不足以圖永久應菴從而語之曰竺西葬大浮圗自有制度示尊法也又何以侈麗為哉此菴光明盛大之傳有子若孫嗣而葺之谷可為陵塔固無恙嘉定紀元孟夏既望大丞相止菴致師第三世宜獨禪師于五峯雙澗之濵復正三峯之席未幾師之藏已一新于宜獨之手亦既完好議者以應菴為知言師於應菴行諸父也商今評古潜鞭密鍊不啻已子其警拔可紀者大參政松窗已為之發茲獨以宜獨增修之歲月書于碑隂圓明寺慧通大師塔銘建炎四年圓明厄于火未幾門闥皇皇廊廡翼翼樓觀翬飛堂宇靖深有像有經有師有徒復還舊物者慧通師師默與佛光師景韶之力也公杭之鹽官郁氏子十五出家二十得度于清捷捷以大父事景韶公于景韶為第四世幼而頴悟超然有四方志韶方鋭意起廢固尼其行既從事土木而顛沛造次不忘叢林自經始至落成未嘗茍取于檀施蒞事臨衆凜然秋霜平居閒暇藹然春風韶亦嚴憚之凡所欲為必從之稽疑而後行韶無恙時已嘉成績既而大備嘉定二年正月初八日使諸徒環立付以末後事語訖而蛻龕留三日奉全身於寺之東狀其行來謁銘于北山之東澗銘曰才難之嘆尚矣有才具者昧于因果明因果者不曉世緣善乎鄭禹功之為言猗歟慧通不墮兩邊不昧正因而與世相周旋即瓦礫煨燼而開覩史夜摩之天既息幻景西歸翩然有窣堵波深鎖雲烟樹此新鐫庶乎岸遷谷變兮尚有考焉雁蕩飛泉寺豁菴講師塔銘天台教觀鼓行吳越間假之以鳴者卓然有稱獨未聞稱豁菴乃今得之于嘗聞道于公者使其九原可作駕其說于諸子詎知夫把絳幡東鄉而立者非公也耶公名淨悟字機先東嘉樂清李氏子幼超俗于雁蕩之飛泉十九受具足戒以圓覺為受業師定菴法統則傳法師初訪天台教觀于定菴後見休菴可舟舟曰定菴何以示人公曰演索車義章舟曰寂光土索車否公不領頓覺礙膺不遑寢食舟拊之曰疑端發露矣寶所近也居無何果默識于雙澗寂寞之濵本宗疑難迎刃而解吳越講席髙眂縱觀排闥而入因作而言曰此心無愧折鐺煮飰借大空口對萬象說吾事濟矣所學不充因人成事執數行紙上語聚千百雛道人大厦廣居食前方丈甚于乞墦吾弗忍也應緣之地若雁宕之東安飛泉天台之淨土皆一新于百廢之餘指陳要奧頴脫乎言象之表吟詠情性蟬蛻乎塵埃之外綜羣書而擷英黼黻乎藏通别圓御新學如養駿筌蹄乎牝牡𤣥黃由其言與之俱化而不知熏陶於春風和氣中晚歸故山屬疾大書示徒曰吾將默觀其變問藥尋醫撓吾化也明日巍坐而蛻開禧丁卯季秋二十有六年五十九臘四十一其徒文虎裒衣盂之長以奉闍維耳齒儼然于煨燼之末後三七日樹塔于飛泉之西麓而瘞焉銘曰是為豁菴聽說總持兩種不壞之藏言為虎山行為龍岡夫惟言行之不騫不崩兮愈于左右龍虎之騰驤而宅夫教觀之𤣥堂雖微吾言其所以自著者隱而彌章久而彌芳不然由吾言以探其微異世而同心者將墮淚于雁山之陽湖隱方圓叟舍利銘濟顛舍利凡一善有常者咸有焉不用闍維法者故未之見都人以湖隱方圓叟舍利晶瑩而聳觀聽未之知也叟天台臨海李都尉文和逺孫受辭于靈隱佛海禪師狂而疏介而潔著語不刋削要未盡合準繩往往超詣有晉宋名緇逸韻信腳半天下落魄四十年天台雁宕康廬潜皖題墨尤雋永暑寒無完衣豫之尋付酒家保寢食無定勇為老病僧辦藥石游族姓家無故强之不往與蜀僧祖覺大略相類覺尤詼諧它日覺死叟求豫文祭之曰於戲吾法以了生死之際驗所學故曰生死事大大達大觀為去來為夜旦顛沛造次無非定死而亂耶譬諸逆旅宿食事畢翩然于邁豈復滯留公也不羈諧謔峻機不循常度輒不踰矩白足孤征蕭然蛻塵化門既􅖏一日千古逈超塵寰于談笑間昧者昧此即法徇利逃空虗逺城市委千柱壓萬指是滉漾無眹為正傳非決定明訓為戲言坐脫立亡斥如斥羊欲張贋浮圗之本也相與聚俗而謀曰此非吾之所謂道靈之邁往將得罪于斯人不得罪于斯人不足以為靈所謂道也叟曰嘻亦可以祭我逮其往也果不下覺舉此以祭之踐言也叟名道濟曰湖隱曰方圓叟皆時人稱之嘉定二年五月十四死于淨慈邦人分舍利藏于雙巖之下銘曰璧不碎孰委擲疏星繁星爛如日鮫不泣誰泛瀾大珠小珠俱走盤圓訓二大師塔銘修證大師法圓姑蘇崑山縣之江灣談氏子年十二禮青龍隆福寺僧妙義為受業師二十二祝髮受具足戒陳君清浩見而竒之遇之若子弟圓亦折節父事陳歸南蹌從容而作曰吾欲造寺舍子不足與計事相攸間曠築室廬市田疇凡所宜有者畢備圓力居多至是水雲憧憧無逆旅况味香火社遂冠一方晚節精修愈力長期六年壽七十七臘五十五嘉定十三年十月二十五跏趺說偈與衆訣龕留七日而闍維弟子師訓同里周氏子九歲來侍巾錫十七為比丘能大其家而竟其緒業學天台宗㫖于北禪榮度弟子七人曰文秀文質文杲文達文拱文煥文蔚秀達拱煥不克奉大事而蛻質與蔚承其終杲號古鏡得性具之要講貫淵源操履潔修學者稱之孫如松等二十餘嘉定三年九月二十將示寂慷慨長嘆諸徒屏息以俟則曰風霜龜手暑雨黧靣盡瘁創建所以一多衆革菴居今也反是是吾憂也言訖合掌而逝先圓十有一年嘉定十五年十二月二十二昧爽前峙雙石于西廂偕修證遺骨藏焉銘而列其石銘曰窮佛祖心持佛祖權權衡在茲而傳其傳降斯以還建幢樹剎于有為功不弃毫髮去此二者曰冒吾氏食前方丈素食尸位猗歟修證手開慶寧訓也掎角遂臻厥成吳松以南原隰薿薿悠然梵放遙夜天際善蘖日滋暴俗改習王度卓然默相潜翊慧日宗元谷目齒兩種不壞之塔銘劫盡時火乃扇灾自九地逮初禪皆㶳餘信夫火之為力也大矣竺西闍維法曰火浴灰百骸四支所存者舍利見諸傳記余舊贊五種不壞者鐔津明教大士頂耳舌童真數珠近又贊薦福璉舌銘湖隱濟舍利與傳記合宗元谷信州周氏子受業于月嵓新興寺僧守忠得吾佛照末後句慧日􅖏門歸隱萬壽之西堂遂蛻于此年六十六臘四十二越二日依西竺法闍維火聚蜚辨失一隻眼齒三十六丙丁童子憑陵奮虐死眼頓活齟齬沒齦反睨童子灰飛烟滅明毫屬天旁屬彰教住山上人了此瑞事不起于座銘銘以告衆銘曰眼如月齒如雪火烈烈瑩而徹定業難逃自暴醜拙御史銀青米公復神道銘襄陽米氏祖墓距鐵甕城西南三里黃鶴山之陽六騑度江擾攘甫奠軍逰奕迫墓垣營絶神道無復元禁淳熙間曽孫吉州刺史某請于戎帥者五十餘反武夫徑卒不知講明漫不理寶慶初𤣥孫太平州蕪湖長某舊出今邦伯趙公某之門雪涕於公曰公來南徐重藩宣節制而崇教化厚風俗率嘗先之某與先兄省倉下界某弟太平州蕪湖丞某抱先世五十年不信之恨頗關風教盍為我振之公使盡吐所由恨則油然而作曰王道之本起于養生送死而無憾况一代耆德歲時奉蒸嘗掃松楸有愧其子若孫吾不忍也未浹旬復其故造亭大書而扁之曰有宋御史銀青米公神道雲山增華草木津津銀青洎少儀少師奉直祔窆之靈廩然在茲孰不揖箕翼以為主人壽㑭子孫千億洞洞屬屬如見如慕思所以報公者當何如嘗聞銀青無恙時喜讀書作詩琴瑟日在御射御書數餘事也至於護劍閣守葭萌皆雍容著偉績有田二千畝佃者盜賣族子聞有司逮繫幾百人則惻然曰微此吾飽自若也折劵而釋其縛痛人命困于庸工之手則精究方脉著書三十卷遺後世活千人者封何啻千人哉是以生少儀少師父子受知思陵家聲震江漢文章翰墨照耀一世雲山淡濃盡掩衆作殆今旦評為文德稱首銘曰比德如玉玉無德輝櫝玉可毁德無磷緇嗟今棄德如棄泥道場山北海禪師塔銘淳熙初保福住持證公度弟子四曰真心圓明上字同曰悟在少城之東大聖慈寺中九十六招提最勝處四五禪剎外皆鐘梵花雨三學講演一日四比丘屏息侍證曰咨爾真與心爾母滯名相家盍遍參乎爾圓爾明則掌余藥石服御翌日歸白父母其母鮮于氏賢謂曰自我歸爾楊氏家禱于白衣大士願得佳子俾學佛爾生喪明禱而復明爾其念哉行矣母踟蹰乃束包下三硤尋訪本色宗工見松源嶽于報慈扣無用全于天童遂識無用之用而悟嶽之不已欺分座于雙徑石橋宣之席端開法于四明天王寺邇海衲子不稱心而稱北海聲獵獵叢林中瑞巖大同全以金山薦諸廟堂希夷如淨在南北山掎角沮勝已者止秀之本覺老坡昔三過此所謂三過門間老病死一彈指頃去來今為鄉老人文公發舊有堂曰三過余為之記居無何夷淨之沮不行移湖之道場凡若干年振墜起廢一新土木金碧九年之功也忽暝倚禪板謂衆曰轉息隔生勿虛度日書四句偈而寂某年月日昧爽前龕留一七日全身瘞寺西岡壽六十一臘四十四度弟子若干人大觀從余游久惟余言是信懼人飾虛譽美厥師而誕後世直致其事求余銘銘曰既生而眇母禱而瞭粵如所禱俾皇覺紹及見報慈其瞭復眇眢厥常明發以內照遐香閴逈重昏而曉用晦藏晶扣𤣥體要日漸月摩靡不炫耀嗟嗟末流以竊以剽自罹顓䝉瞑視盲眺其蔽可撤其窒可竅其愚可唁其昧可弔反睨髙蹈訕謗嘲誚鷯安卑枝鸚止蓬藋爬搔餘粒族類相嘯視九萬里控地淺料大方無外不直一笑幻緣盡矣一瞬而了了無可了月湧寒嶠趙野雲墓志銘宋諸王孫趙希㑂字寅父野雲其自謂也常州無錫人弱冠受命補承信郎轉保義郎今天子龍飛换從事郎𣙜衢州酤衢盜竊發攝事有方略改臨安府排岸俸給公家餘則盡付酒家保落魄孤山南北蕩幽尋窅索深探遐眺㸃陳為新作不經人道語弗警拔清麗弗出也非樵山漁澤牧兒竈婦一見􅔰掌能歌之弗出也談謔嘯詠傾坐人解后朋酒罔不致不至不適也凡給侍奔走過不加箠楚長安市為貴游藪一跡不印其門前地零圭斷璧不自愛流落山翁溪叟間好事者方搜訪次第編而裒之鏗鍧其身後慰其九原沉酣之靈年七十二嘉熙元年九月二十三日終于官舍是歲十二月十九日葬于嘉興府嘉興縣胥山歡喜樹之原女歸曹武惠諸孫逾惸然扶護盡瘁辦窀穸或譏其有女無子吾于是乎引古以銘之銘曰忍子啜羮沒身扣閽有子無子烏乎論祭佛照禪師代同參嘉泰三年三月二十八四川兩浙二廣七閩江淮東西荆湖南北參學比丘某與諸比丘衆注香煮茶奉微供于鄮之東菴佛照禪師拙菴大和尚之靈於戲師之所自立亦難矣哉方其升應菴之堂則登東山而小魯晚入雙徑之室然後登泰山而小天下妄庸醜正嘯羣困折不可奈何而後已卒能橫翔捷出縛虎兕鞭龍象摶扶搖跨閶闔阜陵英主也曰兢兢業業當如禪師之言史真隱帝者師也謂其氣雄萬夫陸放翁山隂耆舊也贊其話行四海非有大過人一聖二賢曷以若此它日行輩鼎立更迭而逝師則巋然獨殿諸老紛紛晚進競春爭妍秋新露零一掃而盡于是時也方攬阰之木蘭洲之宿莽凌霜厲雪以自怡收卷波瀾一菴至樂忍死不敢寧居逸體今亡矣夫昧者謂其果亡矣有法門名無盡燈冥者皆明明終不盡則師長在而不忘尚何悲焉祭佛照禪師圓鑑之塔代秀巖嗚呼師乎虛舟悠悠不知斯文壽命所託疾雷殷殷不知蟄户管籥所繫浩浩乎心與理冥智與神遇不知人間世所謂榮枯得喪果何物耶指後學之心則皇天后土昭乎其鑑孚大信于物則海東日本不約而至恢拓象末邈然寡儔顧不肖似敢稱先德以黼黻太空而與世諦流布哉靜惟始終逾二十年潜鞭密鍊倒行逆施雪霜慿陵陽春煦嫗恩積丘垤報未涓塵故山來歸靈骨未冷慚非跨竈誠謂續貂無聲之哀菲薄之奠哀慕之至靈其鑒之代佛照祭淵清叟清叟未發足時商周三百篇漢魏六朝下逮唐宋沉潜反覆得其指歸幡然舍諸亟來相從鄉所藴藉登龍門而洗空禪悅法喜蓋自得之亦復棄之放浪形骸之外髙視塵表若將終焉諸天儼臨無路推轂仁者必壽古聖格言子胡不然我心則折嗚呼清叟其如命何祭錢竹巖於戲竹巖其死欲期謬我不敏乃今始知嗟嗟諸孤不我告為豈不念我休戚以之彼不知者謂之何其匪謗則讒匪譛則擠匪誕則謾匪畏則欺竹巖曰嘻恣若所為恢乎有容空洞十圍吾游四方交天下竒惟古所是惟今所非廩姿孤標其殆庶幾乃于度外悠然不疑前年之官流金欲西約我必偕我病不支蚤料及此雖病輒隨殮不及視葬不我期雖不我期悠悠我思於戲竹巖昭昭在茲祭虞稅院冠卿㑹稽名士靜而樂其樂也全志也敬而誠自誠而明性也嗇其壽中壽而死命也百骸潰矣疇知夫不病不死者冏然而笑我未能免俗也祭于君實宫講異時丹丘有顯者謂于公曰詩騷何益興亡治亂兩巖風髙半江澄秋三柱鼎立而吞潢流維三伊何公與戅翁我輒龍斷並驅兩雄倡焉是酬必反而和花隂晝遲竹榭月墮琅然而歌若出金石山城無人使萬籟寂風雅道大與天同休豈無聖人雜刪並收或曰此道不關亂治四夷交侵自小雅廢公則掉頭背俗子論笑訕譏嘲惄如不聞耆此而生耆此而死易簀之際笑命其子使具大白而次第酌捷出機鋒抵掌諧謔酒盡雙玉玉山不頽揮手整襟槁木冷灰死亦大變了了若此德宜生芻奠竒男子祭齊國趙夫人景獻之母洪範五福錫厥庶民懿淑具並厥庶莫倫丹心日星短卋蒲栁弗變弗遷孰不曰壽金貝珠璧匪飾匪御為善最樂善日以富壽富而康既清以寧天其靳斯勿輕畀人惡石吾師甘言吾賊舉非吾好所好在德識真擬杜教子擬孟手種手穫而考終命命則有終匪終者存昭昭在茲曷云不聞祭趙寺丞公去蘋渚琳館容與我託䕃樾三慶初度芳墨猶濕忽得凶訃一聞此聲如市有虎迄于再三霣淚如雨我淚非雨悲豈兒女云胡能然滴滴心膂湖氓蚩蚩念公如父嚴而不苛威而能恕亦復念公如子憶母或楚或讓爰煦爰嫗昧者不知百喙簧鼓事久論定表表益著日俟公起倐爾仙去經春貧病弔不及赴酒不注觴肴不登爼碗翻素花鼎蔓碧縷接武生芻一慟千古祭上元長官趙紫芝西陵岧嶤之人遙遙西陵瀰瀰之人不歸之人何其雪調氷度豈無它人盟獨鷗鷺官不稱德德榮其身榮不療貧假文以鳴不曰種瓜居無一鄽不曰種豆耕無寸田未就刀圭莫起君死天孫錦裳夜付其子君死不作我恨弗掩昭昭在茲鑒此匪諂祭盧玉堂直院噫蒲江公蚤蜚雋譽頡頏雲霄粵與仲俱翻水文詞九河倒輸拍肩過秦長揖子虛駿騰渥窪翠峙碧梧訪孤山春濯西子湖起我摧頽偕尋物初一笑分携九華絳㡡仲則先之鈞天帝居鷗盟在公雁足枉書契濶十年鵷行峻除復來澗隂策我故吾蓬萊道山夜嚴漏徐種橘賦詩雪枝糢糊黎明繡鞍入承明廬潤色誥盤章明典謨演雅簡繁命騷有餘用不及大澤不及敷志不及行藴不及攄百身莫贖嗚呼天乎祭神林慧元發非吾子親非吾子師以警以飭子不我違子質固渾胡俟我為將子藏怒氣平色怡日俟子成以慰逺期子雖未成大略近之子親子師喜動睫眉足以培㙲壽焉再耆前冬沉綿或謂不支亟往視子子起不疑兩年西湖好音日馳日俟子來竟不我之我去江東子死浙西契闊死生悠悠我思泣子莫聞酹子莫知念昔語子萬化指歸了觀化元月印萬池將子無爽廩然在茲祭覺無象以淵清叟配南北山三天竺禪講之秀者聞覺無象訃音裒金作供祭之于冷泉之上請余文以告之令朴翁讀祭文鷲峯全盛之日衲子一世龍門方是時也渥窪汗血豈少哉兩公已負駿聲于九方臯之廄矣方佛海佛照對揚天子之休命則懲風葉擁趺而自求其志諸方葛藤滋蔓則卷舌冥懷而制乎末流典刑半座冠冕羣英則不矜不伐以為勵志勉力之方羣飛刺天尋即墜地則無適無莫而自髙歲寒不雕之操固兩公之所同也若夫奔軼絶塵超途軼轍黜智為愚寓巧于拙豈無象優于清叟逰戲翰墨藻飾萬象法度謹嚴詞章宏放豈清叟優于無象于以潤色祖業要未足以盡兩公之藴百未一施遽止于斯願力所覃重光叔世則後之建最勝幢者舍兩公則誰與祭蘿湖雲卧菴主瑩仲溫雲居老宿聰首座瑩隨妙喜悅衆于衡梅聰侍雪堂于龜峯淵有珠山有玉華草木媚川谷清明在躬玉韞珠櫝矧二大士並峙芳躅歐阜千仭蘿湖一曲影不出山塵不涴足逾四十年倐于轉矚低侯國命髙雲漢目漁樵爭席蘭茞騰馥著書自樂卷舌自默衡陽瘴靣雲山短服眼底江山胸中杼軸物初幽尋象外遐逐遁必自肥謙必自牧長不自有善不自淑妙喜密付雪堂正續尸素塞路蠢聚蠉族典刑在茲不戰而衄代鄉人祭璉瓌衲大江以南狂瀾日肆問其津涯罔知攸濟障而東之聊資一戲時之所慕已則甚恥時之所棄已則為美煮五合陳答千山翠夫何道人相尋于五乳峯前萬杉雲際開古叢林益侈乎昭陵之賜不動聲色咸自化于顛沛造次酣熙淋漓沛然飽滿不知師者為誰誰為弟子存乎中形乎外者真實而已薰陶發生春風和氣翩然西歸此道未墜匡廬之陽兮萬竅畏佳番陽之東兮月透清泚無乎不在與化終始祭葛無懷朴翁才也不羇命也數竒賦之者天厄之者時騷雅風賦淡泊是師機警詼謔迅捷倔竒素患難則一視險夷外形骸則兩忘是非冠兮峩巍佩兮陸離栁下繫船鷗邊忘機非蟬蛻于塵埃之表而相索于形骸之外者未之或知祭韶維邦天台擊䝉少林直指染指教外具鼎中味方其學教江漢淮濟㑹歸于禪萬殊一揆行天下見尊宿興盡東歸婆娑天育咫尺故廬不一舉足厥疾弗瘳一笑瞑目死無可愧生豈不足惟鐵錚錚惟石碌碌代佛照祭雲莊主變之大莫大乎生死達生死莫大乎空寂學而至空寂則死生之際蛻若露蟬靈學空寂兩忘寂喧即喧而靜心遠地偏方尋訪之南宗北祖擔簦負笈翩然竟去其歸休也東阡西陌嘯月吟風若將終焉折腳鐺中人或罕識钁頭邊事吾固忘言不負所學髙風凜然悠悠我思雲深水寒祭源上人鄉人大江以西支分𣲖别至于東山四分五裂一鼓猊絃衆絃斯絶賞此音者蜀有俊傑蜀叟盡矣遺響頓歇豈無它人奮迅像末為人中龍為星中月猗歟後來不愧前哲弗患不學患不勇決靈則不然油然奮發力挽千乘革此覆轍加以數年拭目超越一日千古我心則折冷泉芳甘蘋蘩豐潔些作楚音慰此永訣代佛照祭珵監寺潮陽人我念往昔水旱仍歲此大道場洗鉢萬指虛倉枵廩罔知攸濟豈無它人及以近事坐困無策飽飰安睡子則奮然慨慷陳誼分衛四方鉢歌其綴一葦杭海深入瘴地錫振千門粟移萬里變凶為豐易欹于砥逋者知歸莩者蹶起編蒲興動復振歸袂日俟拿音訃音鼎至月沉鰐渚雲寒玉几永懷相從南望霣涕祭昭文錢公臨終見佛嗚呼我公歸兮公將焉歸清泰之國在天一涯八德甘芳泠然緑漪瑤肪甃池金沙湧坻水鳥和鳴樹林陸離芬陀利花長鮮不萎一人繫心花開一枝公于是中託上上栖非公等倫姓名弗題芳既騰矣既芳以滋襯步承趾如其所之夷猶倣徉樂且有儀復均此樂滌昏拯迷北鬱之南人自嶮巇罔念作狂愈不可醫斷港絶潢知津者誰又將于公先覺是依公其勿忘為大導師代人祭何康叔嗟哉蒼蒼主司生人胡不均耶胡不使吾康叔壽而康耶某少寡助內交于兄志合氣同弗啻昆弟博約之益于我何多去年之春掉鞅場屋載賈餘勇一鳴驚人國子先生擢上上考俊傑如堵爭先快瞻視兄奮亨喜若已得同歸里閈倐以病聞老我家居往訊所苦歸甫閲月遂以訃聞一再聞之惝恍投杼逮至三四果如初傳頓足失聲我心則折嗟哉蒼蒼獨靳壽康于斯人也何其酷耶祭錢妙明居士惟靈之生惟一真實一真實外孰非長物本之以朴守之以質確乎其心可卷非席凜乎其志可轉非石乃于鄉評無意無必而于宗黨非矯非激又于子孫衆多如一獨于空寂投膠于漆昧者不知謂其佞佛佛不受佞福豈妄得悠然獨見判然剖析寺起百廢橋飛千尺路險持平歲凶加恤有餘是損不足是益起以勤勞享以燕佚白圭之智陶朱之術暗合孫吳不師其跡我萬里客一笑莫逆胡不百年交臂如失酹此一觴為鄉黨惜英靈不死爰昭爰格山門祭吳寺達十萬買鄰古人所願井泉分脉垣隙借光遂令東家不愧南阮弗起于座安若泰山不揮案示徒而講學肅如非通難對機而檀施起敬豈雨花動地白石㸃頭不足干其思慮而齁齁栩栩無用其心哉夫香積國以香飰作佛事蓋用香積故事也萬事有窮一死無缺我作是說靈其謂何山門祭振監寺惟靈跡羣塵囂心清秋濤興盡月輪名氏自逃盍歸乎來愈晦愈韜絶聽反聞聲沉響銷于日用中應念頓超我堂曰頥均賢佚勞靈栖其間飛來爭高歲寒一枝霜茁二毛入甘露門自肆老叨萬緣俱休四山泬寥逝者如斯有些可招代信新戒祭悟侍者同登師門同尊所聞法惟一味相為弟昆臭味草木博約禮文道義講明深禪細論十年歲寒晝窗夜燈栴檀叢林均雨露恩悠悠光隂惜寸及分朅來侍傍席未及溫疾急莫支甚于救焚如可贖兮百身可捐不可贖也遂初反元百骸固亡所亡者存代下竺印祭上竺圭靈胡為乎三綱總持逾二十年厥問四馳又胡為乎老而不衰擁半千徒風從影隨天台慧命廩乎一絲乃登雋髦乃振表儀分半榻雲舉以授之有典有則彼將安歸日就月將冀挺倔竒俾盤石安易纍卵危謬我不敏亦與品題朅來為鄰隙光借輝倐又去我曽不我知克繼克承魚網鴻離人亡人得又焉楚為靈胡為乎其來鑒兹代祭興上座鄉人太白倦遊欲觀凌霄乃于化城一念頓超昔者萬里一簞一瓢欲就有道洗棼釋囂急如救焚喜如聞韶其心則降其意也消惜哉妙齡倐如槁苗秀而不實惟莠翹翹念此永别鄉心寂寥孰知此心靈焉孔昭代人祭印元實吳寺先師避席歸休上賞有薦賢之譽老子被命補處成規如畫一之歌連璧之明冏冏在目斷金之利悠悠同心杲也晚生日敬執友靈乎崇篤時分隙光方懷好音忽得凶訃我心則折泫然而永歎曰霽月兮殞團桂零兮露乾靈一去兮不還猿鳥凄凉兮寥寥空山代祭前人於戲靈乎尸乎此山也春江白鷗兮自然相宜洪川之西烟霏霏雲依依向䝉䝉兮今誰撤之抑山靈得以自私將物各有數兮姑待時錫駐不飛油然發揮勃窣兮伽黎古野兮丰姿巨鏞橫撞兮萬指景隨瀾翻四辨兮四河渺瀰不起于座兮金碧光陸離兹特緒餘耳終將觀其大有為胡不期頥兮朝露晞一燈不夜兮懷哉一夔代祭達首座鄉老人畢生辦死以至于死了了死生乃不負此此誠何如不亡不存其去無蒂其來無根公活于此坐而待祭十虛配食萬象依位風切蘋渚月批雲蘿胙猶可分鉢猶可歌風止月沉四山寂寥冏然心初珠明塵消祭秀州簡上人湖州選上人觴有沆豆有雋些爾簡嘯爾選延爽余望促爽余展執御兮忘逺軸折兮輪弗碾焚爾瓚瘞爾璉霣于有聞兮又何怨達首座索生祭文嘉定十二良月十六靈隱達老宿致雪竇老融所作觳觫索生祭乃具函牛之鼎奏庖丁之技然東溪之菜煮北澗之水肆其大嚼盡身前歡慰别後思贅疣其生可嗤歸根其亡誕詒膠擾乎合離又奚以為是道也謂公不知謂余不知嗚呼其誰知祭杲無外講師下竺元粹直友友我以正遇我以謹爰及我私以振以警孝其所孝敬其所敬旦評稱其義友道以其信寧死去食有生必殞大信既孚風雨不渝損友者三僞飾諂諛鵂鶹晝冥自盲自愚靈欲正之瞑眩取疏罟穽文繡馬牛襟裾永懷髙標一龍一豬祭超老宿冨陽人諸方說禪靈獨種田諸方角逐靈事退縮人皆逸豫靈不尸素八十有三雲閒一龕憧憧水雲自北自南揭厲𤣥㫖密機飽諳昨非旋除老夢更酣萬籟號風孤蟾印潭了了生死以酬罷參采采澗蘋擷芳薦甘祭勤淨頭通泉惟靈欲步大方以稅其駕太白之陽萬機休罷彼上人者或怒或罵直行徑前縱奪陵跨忘言而領與之俱化嫉者或衆識者蓋寡寓以持淨而正用舍臨機專對如逺侍者如顯淨頭寓北山下移錫冷泉閲秋徂夏了本無生分瞑為夜我思古人悠悠並駕祭圭侍者圭羅漢通泉沉默而方剛專靜而明偉似不能言言輒可紀初友萬杉借一鉏地雙劍五乳相高寒翠主賓道同密契針水由吳適越閲兩暑寒培塿貿山問津冷泉一疾弗支倐如蛻蟬於戲圓悟不作卍菴已矣瞎堂别峯化門既􅖏餘波末流無所不至秋池之蛙遂當兩部鼓吹靈其再來任此重寄祭雪溪臯老直節介特如竹不倚與蕕俱生不與俱死雖霜不蕃擬停紫鸞翾蜚啾啾閙叢薄間遂將此耳往雪溪洗亦復小住牛刀初試雞肋之微全力弗棄别峯故廬莆田可鉏舊榻解懸滿榻梵書翳我頽墮身外慵課不扶不携使爾叢脞燕雀風髙墜才須臾風乎不來婁棄路隅人曰爾已我謂未已凌霄巍巍瞰暮山紫祭魏鶴山天之降才生民所繫以其所餘為用于世公生人間鳯凰匪瑞况復芝草明月火齊品有定價不足酬貴峨岷之秀河嶽之氣蚤蜚華問震天下士聞輒意消見輒心死校書天祿咸問竒字西蜀旌旄令負弩矢逮于更化表表愈偉簮不小低望益峻峙絳灌斗筲交口讒詛不獨不用抑又棄置清流之顙澘涕交泚諸老日零徯東山起如魯靈光屹若不倚騎箕而上天弗愸遺官隨身殞不殞名氏青史芬芳終古不墜空聖豫哀辭并引新安空聖豫倜儻有大志喜勝已者雖年小事之謹老叢林有從上爪牙先佛照愛之重之橘洲中飛語故舊匿影公毅然奔走借援于大縉紳諸老韙之余亦韙之辭曰可忘者年不可忘者言可勝者人不可勝者天交以此道匪自棄焉我方耕于委羽寬閒之野兄則峙兩化城于阿䝉宿兵之地而丹明堊鮮簞食豆羮酣嘻沛然不作不食彛訓在前寧即鬼羣耻加素餐視貨殖而傲岸嗟幾何非乞墦志尚與我同兮防愈決而愈堅兄死行羶彼生骨殘贖可百身吾身可捐不可贖兮淚交涕澘我哀不聲兄聽不遷下竺印哀辭并引盛世苦心如公者或寡矣貧而游學隙光席地汗牛充棟反覆沉潜肯綮砉然吾方發硎不則如求亡子如喪考妣百花成蜜味中邊甜豈獨忘言亦復忘意通宗極九難則疾風敗葦虛堂得不前席感般若寂寥則奔川渴驥解空得不奠枕起廢住山名動九重以境攝心觀開九品無生可樂有死無憾哀勝幢之將仆系之以辭辭曰旦講兮花飛瞑講兮雨新換萎一去兮弗言歸優曇閴寥兮芬陀凄其天台正續如一髮引千鈞未即斷者幾何措之于泰山盤石兮其誰振之豈無他人未若靈之簡繁撮要兮單拈徑提於戲噫嘻靈山儼然絲毫不移詎知夫塔中兩雄與諸分身僉曰是真精進是名真法供養如來者舍靈其誰吊池陽郡博盧蒲江喪耦與女池陽郡博蒲江盧申之室人與女之喪也或以韓愈用魚子細腰鴟梟蝮蛇已孟東野失子之戚而已蒲江之悲韓愈之說行吾怨赤子不得養于其父母矣雖然能不悲乎悲而不知止非中也要歸其中而已作而吊之曰謂生可一兮生則萬殊謂其萬殊兮死同一趍胡壽夭之不齊兮夫人所以籲天長號而疾呼彭不貸殤鶴不續鳬吁其來也久矣將安悲乎招魂并引招魂楚俗也天長右統軍吳從龍陷賊賊偉其勇釋縛而使喻泰降至則囑泰堅壁而死于賊吳之中表韓應祥慷慨三招其魂使余為之辭辭曰扄鐍兮失常鋒鏑兮濫觴遜入兮鷙翔跨青齊兮距張拊海泗兮扼吭既反噬而陸梁恩懷柔而霈雱冀小寤其酲狂厥類愈其突唐陽貢琛而偃蹇隂欲䏑于真陽狼烽直兮地近鐵城橫兮天長真將軍兮藐視控三靣兮獨當策羣寇之素藴雖六竒而可箱嗟衆寡之不競聨逸響于解陽死雖死而弗亡盍歸來兮故鄉海陵兮重圍銜枚兮疾馳令兮吾誰違死有所兮得之忠以義持援不我支弦開空弮馬踣不飛忍死兮詭隨登樓車兮反詞大勇兮死弗移彼不乏與數竒洎齕氊兮乳羝斫頭便斫頭兮何怒為齦穿爪透兮氣廪而將軍兮孰分等夷魂兮安之歆余招兮來歸天險兮濤山髙一衣帶兮百虎牢滔滔兮東之孰湔兮腥臊積骸兮山白釃血兮原赤鬼餒兮喑喑人眩兮岑岑鬼兮無人祀人愈兮詈鬼野逈兮不耕望秋兮無穗盍歸乎來兮古登陸之大邦潮打城兮流瀧雪㶑灧兮三江雲帽岑兮􅍶崒石玲瓏兮四窗海物貢兮品夥海塗穰兮嵗康鄰用情兮浹洽俗好古兮厚厖故廬兮在其下音户葉落花開兮朝暮智門能禪師哀辭并引公與松原嶽公同參密菴而嗣嶽或以大溈之于翠巖卍菴之于大慧為之說公輒掩耳出世後提倡大非分座時吾哀之為之辭辭曰發足兮銅梁觀方兮不知方觀方兮知方跨九州兮不越乎銅梁飄零匆匆半生轉蓬可友者親可愧者攻視百世之上百世之下佛祖心之所同兮理之所同劍池兮鷲山頂萬象兮清涵兩鏡造詣兮深穩碧落碑兮無假本心兮密傳意兮在弦倐兮冷然覺後覺兮孰為乎先雲蜚兮水回淵蕙帳凄凉兮嗟猿北澗集卷十
