body:
  text: 北磵集卷八宋釋居簡撰四月初八䟽優曇一花五濁離垢景緯孤朗八紘無雲藐粟散王受命之符恢覺皇子聨芳之應駕紫金畢逋之馭夢兆殊常滿白玉蟾蜍之輪相無不足蓂颭風于八葉龍翻水于九淵祥應初分潔表新沐負克長克君之岐嶷豈載生載育之劬勞嗟珍御之梏身弃金輪于脱屣逆旅絳闕故家雪山揚鞭逾城拔劍斬髪苦形四相雲泥堅宻之身樂止一生枘鑿妙嚴之福閲六年于彈指集萬善而匪躬方掉鞅于三空遂捐軀于半偈非真精進即大闡提與其徐行後長者于慈氏如來逮如實際曷若善價而沽諸于城東老姥忒老婆心叵測叵量是則是傚伏願愍末運迷津者衆以盡為期俾未來補處之尊仰成而已臈月初八日疏六年而成所成者何事一日復出既出而無名以星明處為疑則河清時妄冀玉樓春透金鏁𤣥通謂有得耶弗授然燈之記以無為也逈超彌勒之先初喻日出則高山先明終知根殊則覆盆迷照不齊物之情也行徤天何言哉惟利鈍之參差故偏圓之别異刹說熾然説無說無聞大空勝義空不空不有話頭瞥轉衆目斯張拈花則㣲笑随之乞乳則深譏至矣設吾權變適宜之巧順逆兼資狥爾顛倒所欲之私衡從相濟半字滿字别傳正傳莫非塵沙法門具有智慧徳相泉蒙始達既三轉于法輪雷迅不驚遂一開于蟄户深心奉塵刹諸佛如虛空誓在捐軀式資援手伏願祗夜瀾翻珠璧倘可忘筌渾儀光轉璇璣式慙尋劍二月十五日佛湼槃䟽傳燈無白日開長不夜之光明分暝作黃昏見本不常之代謝與其法固應爾曷若身先徇之故于花笑鶯啼示以鐘殘漏盡輪希再轉曾聞吾轉輪耶道記當成既見子行道矣重摩萬字䨇舉輻文審諦觀于垂盡之時印後至于忘言之頃紫金岌岌一丈六尺烟滅灰飛明月朣朣八斛四斗珠囘玉轉登地以前則嬰児失乳預流以徃則逋客迷家含識以還不言而喻據湼槃岸既云始從鹿苑終至跋提河于法華經又曰常在鷲峯及餘諸住處擬之則失證而乃知尚堪薦供效野人之芹譬夫存羊告宗廟之朔噬臍可媿揆禮為宜本師釋迦如來伏願愍信相思壽量之弗遐室中宣演眷優填幻旃檀之惟肖天上來歸等越僧祇長如佛世天台忌辰䟽古塔開扉半座平分風月靈山在目三周俱付筌蹄摧我慢自高之幢示吾今親證之地陳隋應運蠻貊同文小根小莖毋望洋向若而嘆大枝大葉皆拔茅連茹而征衆丘繞司命遜其高寒諸子駕安車鞭其觳觫生民以來未有愈高太山北斗之具瞻此舟過后更無益重浮木盲龜之難值𤣥珠休景智鑑沉光攪龢酥酪之既成收巻波瀾而遐舉象武方絶塵于無何有鄭聲將亂雅于侏離淫允賴正音洗空邪說謬記刻舟之蹟輙營諱日之齋擷芳于沼沚之毛式資明信展敬于㳙埃之効允荅洪休法空寳覺智者大禪師伏願有伴即來招手勿忘于金地如月初上分身豈間于潢流再振𤣥猷庻昌厥後逺法師忌辰䟽無處繫心憶江蓮之白羽買鄰有地飡籬菊之黃金豹闚心鏡之九流蠡酌影堂之六事大書特書屢書書之不盡盡則重書惟止能止衆止止則旁流流而莫止十七人下風北靣八百年白雪陽春易明未畫則直指三聖之同詩授既刪則曲盡四家之異示共學則懿揚雄百川學海論不敬則符孟軻莫我敬王山北山南野花啼鳥佛前佛後慧日慈雲用則行舍則藏波羅提開遮自若瞻在前忽在後芬陁利孕育芳鮮肯投明月于潢洿必反斷航于清泰爰慿海木式荐谿蘋白蓮社主正覺辯覺圓悟大法師廬山尊者伏願一刹一塵即五老舊遊之風月難兄難弟掲兩雄分座之儀刑車不司南品希直上承天造水陸堂榜小峨眉普賢住止界開白銀大精舍慧感䕶持功盖緇籍種德有地設冥無堂豈因仍而不為亦講明之未至要見聖凡融㑹必先輪奐莊嚴袈裟裹草鞋道者非修造手湏彌納芥子使君結殊勝縁庻補缺文以嘉成績惟心浄土筌蹄九類之苦源焦靣蓬頭絛帽萬間之䕃樾泗州生日䟽既是泗州却在揚州出現茍非列聖盍為散聖之歸蟾規圓印千江羊角清號萬竅香花呉蜀自其小者觀之雨露塵沙是謂大成者也孰不曰萬靈之本豈止于一國之師黙賛盛明顯揚湛寂橫空三百尺障龜山既倒之瀾踞地十三成藐鷲嶺平分之榻矧兹三輔稱此獨尊氷雪炎熇稻粱饑饉醻大恩于誕慶同詠春沂裒小善于㣲茫復祈秋稼普照水陸閣成設冥一月榜于一毫端出現莊嚴藏樓閣超三際外豁開險惡道津梁金山風月平分谷水門庭肇造半空橫亘美輪美奐之洋洋萬目聳觀如岡如陵之岌岌恩兼二利法運四檀後天先祝于大年浄供敢忘于幾月機雲故宅皷鐘禮樂如平時華梵舊章裘褐稻梁于長夜當湖建觀音殿念佛道塲榜白衣幻月輪之相在佛左邊黃金開車軸之花題名蕚上盡是契經所說又于方册重書欲分海岸風烟來壮湖山棟宇化千二百五十之衆施亦如之想十二萬九千之餘見而後已擬超濁刼合辦西資應以此身現此身而説法示諸净土于净土以求生㸔飛檐横不度之雲對懸皷状欲殘之日自憶而念同上九蓮臺從聞而思共入三摩地鹽官慧力寺幹期懴堂榜唐張巡許逺宋張九成皆鹽官人過迷真懴處堂亦奚以為中悟假名在我固如是已矧一身之易集嗟四衆之難盟須風雨大厦之帡幪作釋梵随身之觀闕人天交接事法融通長短期安用他圖前後佛皆從此出波翻五欲滔滔誰障狂瀾塵淨寸田薿薿自滋芳稼鈞天宻邇金地淒凉盍補缺文庻幾具體忠肝義胆格䨇廟之虎臣誠意正心符百年之龍首慶寧鐘樓榜平地一聲欲震驚于天表重簷百尺方經畫于胸中冀先柱石之求副以棟梁之用未任獨力盍扣四檀陳簨簴于重楹着教稳審夢檀蘿于五曉喚起懵騰周匝闌干吐吞雲月部勒山川氣象足成刹土莊嚴鐘到客船半夜何妨得句潮生浦口逺明尤快觀瀾壽與樓高慶隨基壯廣照建藏殿榜百萬買隣依桐山之正直十三聳級對瑶馭之稜層橫陳湖山這邉政在烟雨佳處度經之藏琅函玉笈俱收旋軸之樞福海壽山齊運諸縁易就此殿難成大力量大富貴拈起話頭阿練若阿闍黎敢忘恩紀神龍湧出行看八靣玲瓏賀燕歸來坐待一門超越高麗造華嚴觀堂榜鼎分三觀静于幻寂居先根具三期長視下中為次是謂真懴悔處孰非諸勝善人盡大千刹土之提封着百億彌盧之日月期湏有制觀可無堂敢忘經始之勤終冀落成之喜薝蔔旃檀曉露側布黄金桃花流水春風岑開翠玉鏡燈十界車軸九蓮姓名題在花鬚福報收歸果位道場建千僧行道閣榜幽谷徹青霄雲雨沈沈大厦清池照瑶席鴛鴦翼翼層簷四垂横檻危闌兩以行空複道象龍蹴踏燕雀棲遲老玉堂仙愛此山看不足昔金園客謝諸侯弗為高是真六和合身心盍住千莊嚴樓閣泉甘一勺澹尋君子之交德懋寸田願廣善人之施寶梵崇壽建閣榜院是京師舊制内侍相攸額懸武肅新題宗藩請命欲建妙莊嚴閣以容上尊勝王啓翼䦨複道之烟霏拓尺土寸金之田地童子歛念睡夣覺蓮花開頭陁擎拳所作辦梵行立自片瓦根椽之始承千秋萬嵗之終轂走香塵通八荒之壽域檐栖翠霧渺一亘之仁天既託帡幪敢忘報効育王請雲退谷湯榜直前横床示尊事名勝之禮午後需蜜忍死檢毗尼之文起泉石之膏肓同芝蘭之臭味恭惟某品黒石蜜中邉皆甜祖花木𤓰根性特異一㸃都無菜氣百花具有天香苦為誰甜甘分衆妙小酬沆瀣是中惟一味醍醐畧講叢林于斯見三代禮樂超山建慈氏閣下作方丈榜開山祖師與宏智同行一錫勌游相攸得雲山之勝六傳有託筞勲擅蘭若之雄根椽片瓦皆願力中來繡棟蜚甍如畫圖中出欲借雲霄之便須開樓閣之門上以容百城徧厯之方下以闢二士共談之地重重無盡光寒帝網之珠綽綽有餘量廣王燈之座作塵刹妙嚴之事荅乾坤浩蕩之春旁通教外之傳仰賛域中之大圓明結夏光明經㑹榜常轉如是經盡在筌蹄之外不省遮箇意徒膠文字之繁要結千人萬人豈但一巻兩巻桃花三級㸔喁喁羽化之魚金鼓一聲笑栩栩夢囘之蝶白蓮花寺翻盖法堂榜寺在風篁嶺下肇法師誦經于此蓮生陸地夗央亦能誦經一闡提皆具信根羽禽何與修多羅如標月指龍藏咸詮高原陸地不生蓮花水鳥樹林皆念佛法境如清㤗後夜此堂空月明挑似𤣥都前度劉郎在何處壁疎屋漏雨震風陵持危扶顛因陋就簡菩薩居四依之次姑待重來夗央蜚百尺之簷行㸔先賀請印鐵牛住靈隠茶湯榜玉虎何知先動山中消息雲龍早貢首膺天上平章價雖重于連城産獨珍于䨇璧恭惟某寵光五葉一杯分萬象之甘彈壓羣英數水劣諸方之勝方圓制度清白華滋笑溈源春夢不到池塘眷老圃秋容尤高節操頰牙騰馥四河衮衮無邉襟袖生凉兩腋颼颼未已洞庭君子封下邳箕裘不墜洛誦孫父事副墨文采難藏試從師友淵源欲起烟霞沉痼恭惟某攪雜毒海設醴奚為開甘露門飲河而止直指單傳其來有自俱收並蓄待用無遺荐醍醐一味之醇擷芝术衆芳之助行精進定是上藥草起一生成佛于膏肓見善知識如優曇花慰千載得賢于季孟靈隠修前後兩殿榜入雲表刹化成南度莊嚴倒景浮圖彈壓北高巍峭桂子從廣寒飄下蓮峯自西竺飛來一龕長放光明誰名彌勒孰是彌勒兩地平分風月有是文殊即非文殊欲筞勲輪奐之餘忍袖手顛危之際扶持得起同享太山磐石之安盖覆將來遂有凌雨震風之託妙湛月岩中茶湯榜枝槁不春此外如何采摘樹空無影是中特地婆娑小團破新錫之珍方諸勺初修之月恭惟某圓頓培㙲山林品題正其味于森嚴舌湏具眼回餘甘于苦釅甌已翻雲要驗同盟更無别味肆辯河之衮衮䟽瀹道腴𨗳正𣲖之滔滔洗空禪病耆婆死而百草皆泣世豈無醫良遂徹而諸人不知禪寧負教不須染指只貴㸃頭恭惟某㑹獵𤣥中笑守株而自苦獨漁言外如課蜜以分甘可無一施具有衆毒飲者若諳此味瞑眩膏肓學人未達其源肝胆楚越淨光江月閣榜一宿覺道場傑閣凌虛頗稱松風題榜小軒總勝未舒江月襟懐不湏杜老干間要架元龍百尺隂晴態度看江上數峯青騷雅平章補天邉一鳥下盡除菑翳都著䦨干歌夢生春草之詩快逺送飛鴻之目造鳯樓之手段秦豈無人視井榦之規橅風斯在下龍井法堂榜二士共談必説妙法際元豐元祐昌明之時三人同行必有我師駕難弟難兄賢良之選蜀仙去後呉僧寂寞華表歸來塵世凄凉要見一堂冷澹千古分明還他百世楷模六種成就法空爲座可無高廣之床道直如弦亦有恢洪之地青眼皆逢北阮未稱全提一瓣竟爲南豐休尋别調報恩重修鐘樓榜簨簴不虛任大扣大鳴之責簷楹幾墜思既安既固之圖休論卓地無錐湏信擎天有柱就中獨歩更上一層半江月在前峯兩幘雲横絶頂五鳯造樓手梓人筞相道之勲踈鐘到客船衲子合詩人之轍梅屏茶湯榜攙春小摘不孤培㙲工夫亭午新烹要驗平章手段欲破一規𤣥璧如珍萬選青錢長恐暗投直湏明破恭惟某轆轤汲曉露冷銀床杵血筞勲香浮鐵磨與萬象平分秋色提折鐺自煮松聲腋凉生可御之風湯老却未佳之客被渠搜攪五千巻何以當之喚爾懵騰二三子何濡滯也鼴䑕飲河弗信醍醐海闊黃蜂分釀放教姜杏杯深尋他海上同盟嚥我山中餘瀝恭惟某是上藥草雨露惟新眂小根莖雲泥有異䑛鼎快昇騰而去折肱湏諳鍊而知笑諸方五味不療人饞試三昧單傳反攻他毒非時不食或送客或拒客法固如斯入手便知能殺人能活人吾無别味西菩寺建五鳯樓榜佛奚爲哉妄自崇樓傑閣法如是故從它善境冥心人間旅泊葺一日之居桑下禪棲遵信宿之戒雜花尊貴宗廟百官之美何以加諸圓覺宻嚴天地萬物之情盡在是矣欲舉此役豈圖偉觀橫陳五朶如鳯凰來儀洞開六扉看龍象蹴踏蒲牢吼五更之月留取危層玉函載三藏之文却于平地三千世界徧莊嚴綽綽有餘十二闌干普光明重重無盡鄉講榜火宅只一門出門便了髻珠不兩箇得箇方休居寂乘尤自索車投夜光徒勞按劍于斯三者但說一乘彈偏擊小示性具光明顯實開權掲山家要奥歌太平于無象物共熙熙嘉豐樂于有年民生皥皥吹去萎花更雨新者荅乾坤浩蕩之春安住神通轉不退輪結香火團圞之社錢塘江上寂照寺幹佛殿藏殿僧堂浴室鐘樓兩廊榜黃金田地斬新舍衛祗園紫陌塵埃依舊長安古路層雲渺虛徐梵放一頭低彈壓春潮欲觀螺髻横秋先辦璇題納月更借琅函出海却㸔機軸旋風高架宏撞直湏百尺衡眠倒卧各要三椽祖師有意傳衣莫書墻壁居士本來無垢謾煑薔薇咨爾衆檀成兹六度挿草梵刹竟揮戈慧日西頽隔岸越山多縱目大江東去韜光庵修造榜喚韜光歸舊隠安用草北山之移思白傅詠甘棠尚可明南國之教花偈曾煩招隠白鷗終不寒盟排闥送青來知何日了問春從此去更幾時回宜速加鞭未堪勒駕把茆欲墜隻力奚為萬間倘遂帡幪一盋儘歌藜藿飰援臺畔起四三橡栗之翁布地園中湏百萬摴蒱之手下竺九品觀修造榜持逺與人同學惠不師其蹟劉雷不世出睎顔亦聖之徒無初禪天上刼壞三灾有泰華峯頭花開十丈雲橫小嶺洞鏁香林悉力同心齊肯室肯堂之可否較竒荐巧嘉美輪美奐之莊嚴浮圖合尖公案便了擬議則疑城在目可容錯過了黄靣瞿曇承當則淨土唯心終待重來之黒王相國仙林火後建舍那佛閣下作戒壇于中殿榜堯天雲靜式瞻舜日晶明佛閣門開要見法身充滿梵宇雄雄稱仙逰林苑奎文爛爛旌律部毗尼刼灰新掃之餘天道好還之日横翔百尺巍然複道之登平歩三層凛若齋壇之拜塵刹無非輪奐亰都盡是莊嚴刀斧不痕衣盂有託曲䦨衡檻風雲㑹處扶持片瓦根椽仁壽域中成就普照寺修西方佛閣展殿軒榜真懿大師請作觀無量壽開仁壽以同躋從善𨗳師知宗師之可斆矧機雲之故宅懷持逺之高風燕唐棣之偏反種芬陁之芳潔霜鐘敲月發萬家深省之初性海澄秋笑二瓠獨醒之晩璇題霧暗欹側飛甍雪砌苔封凄凉老屋古寺無錐卓地未免求人華亭有柱擎天何妨借力幻層軒之翼翼襯重閣之渠渠荅乾坤浩蕩之春聽幢樹從衡之說超果教寺展墻展岸造橋砌路榜岸趾深移侵魚鳥忘情之地墻腰縵繞拓象龍禦侮之方雲垂野渡隂隂路透長安蕩蕩何妨鑑水荐橋流水不流弗用占烏㸔人好烏亦好庻幾前人無不了公案抑見超果皆可種福田檀度樂然吾事濟矣井亭橋華嚴院重修榜向來八十一院等華嚴八十一巻之文只今千百億人受菩薩千百億身之託故址淪于八九後生習以尋常晉宋而來典刑不墜一日必葺先資起廢之縁三椽是圖未遂守成之計風雨飄摇既久塵埃湮没居多耘它五福之田作我萬間之庇井冽寒泉食似楊枝徧洒之初珠從合浦還正舊物重收之後神林寶雲誦蓮經㑹榜結香火團圞之社是謂正修荅乾坤浩蕩之春可容虛度六萬言之花偈數百衆之鄉枌入三昧門皆一乘法靈山未散如天台親見之時炎丘正然笑諸子争馳之際中竺造佛殿榜以大圎覺為伽藍豈有方隅建立將此深心奉塵刹可無位次安排不湏實際理上提撕且就事相門中商略坤寧見在佛曾分祗樹之金天寧應化身未託把茆之地看他伎倆累我兒孫俟黃河三千年優曇未謝多彭祖二百嵗寳掌重來如南極現則主福昌效華封祝則聖人壽憲聖太后大行開散道塲疏賛列聖之休光虞嬪易老動曾孫之終慕周母難忘爰啓梵筵上嚴仙馭大行憲聖太后伏願藏海三干刹式資汗漫之逰神山十二樓長燕逍遥之地二南基王化之源丕承前懿五福叙彛倫之本克享天全美鍾厥躬哀動率土大行憲聖太皇太后恭願大珠欺月湛本體之精明飛佩凌空奉在天之睿哲華亭超果幹田疏開山打十方水雲易集負郭無二頃鐘鼓難停且看秧馬追風不放泥牛入海合耦相助斯近古之可書一飽忘饑繼自今而無媿犯人苖稼非我儕流結千年常住之縁享五福康寧之報靈隠翻盖僧堂䟽未除滲漏可容一日安居既已揭翻豈怕七間閒却倘有帡幪之託遂無風雨之虞行住坐卧在其中裒君五福造次顛沛必于是還我三椽覺海鑄鐘䟽林浦在錢塘江上收拾六州之銕盡入洪爐範圍十斛之規方成大器仰而為鼎鳴則驚人作興禮樂于山林號令人天于夜旦羣峯荅響不妨境與心空兩岸皆聞喚得潮隨月上化閻美人冷淘供䟽明月團團鑾刀細縷素絲縱縱雪浪輕浮典刑見高槐葉之詩功業擅温淘君之傳開單萬指培他五福之基飽爾百饑自我一餐之惠建三門旦過浴室䟽薄暮投栖已有客舍并州之夢黎明徑去豈無鼇山雪夜之人不惟妙觸宣明抑見此門廣大弗勞斤斧湼槃三徳圓常重振規橅契經六種成就化煎笋䟽江漢春曉抽簮滿林篔簹夕曛噴飯滿案嵗晚屢形歌詠春風又長雲仍直節虛心敢辭鼎鑊太虛有口也共盤飡靈鷲修造䟽千年箕裘得人則成住一日鐘鼓失度則壊空擬抗衡三竺之雄冀復還兩晉之舊補苴罅漏首法堂翼兩廊扶持顛危襟蓮峯帶雙磵便便惟謹爾誓將以就緒為期戞戞其難哉豈敢言信縁而已天竺靈山寺九品觀堂成修法華期懴䟽五欲翻濤過懐山襄陵之患諸子出户免焦頭爛額之虞欲問津於碧甃涼池先曲突于炎丘火宅四生路滑蟻何啻于循環九品觀成燕敢忘于賀厦借法華三昧之力辦此身心㸔靈山一㑹之人無復枝葉智鎧求僧䟽觸事無心弗從它覔明宗有偈不倩人題身欲等于象龍盟敢寒于鷗鷺橫眸㸔梵字荅未了之恩休露頂洒松風見本來之靣目真如山門檀越二䟽倚門墻則麾之風生荷槖出思議之表也春透梅梢矧脱頴之難藏繄敗羣之當去恭惟某心如古竈内史灰然足謝黄塵將軍手汚友古人于既徃振末緒于將零洗充棟汗牛之書革滯殻迷封之弊市驊騮之骨來千里之權竒彈師子之筋㫁衆弦之嘈雜學到空宗謝歸墨歸楊之嘆民歌至化尊即心即佛之聞至於白叟黃童盡在春風和氣恭惟某荼如語苦薺豈非甘境與人佳蔗何妨倒無補而食前方丈吾不忍乞墦之羞知權而度外直尋彼安知軼轍之騁尚堪布地一笑如給孤園已辦趍隅再拜執弟子禮印可堂住廣福山門諸山兩䟽珠豈知合浦之渾去而忘反璧安俟連城而重全亦何難既虛載月之舟當順回淵之水恭惟某人落落蛻俗兢兢履氷雖捐軀為法詎敢辭勞至踐青折萌未始少忽振故山于將廢必然肯來為此道而扶顛何所不可眷𤣥學葵傾之敬慰紫荷持槖之靈尚堪一行敢怠三請山門因頓入圓江漢朝宗于海彈偏擊小丘陵不至于山續半千間世之燈償百萬買隣之願恭惟某人惟一真實攝諸律儀統有宗㑹有元辯説無礙進以禮退以義去留適宜方欲事𤣥龜六藏豈謂中青銅萬選車谿正令全提又見重新貧女短檠分照何妨遥夜諸山代延慶山門蓮社兩䟽請奎梅峯平生所得瓣香敢負南豐流俗無根别調俄從下里一䕫足矣衆楚咻之欲超絶于諸方革謬悠于雙禀某人犀眸不瞬象胆奚為匪素定而不移抑貿遷而失據太原孚上座笑雪峯畢竟鄊情清凉觀國師與荆谿向背宗㫖懸知口授莫若心傳殆將務勿勝而勝焉以俟弗期然而然者旋掃刼灰百堵皆作别開表刹一塵不生横陳竝水樓䑓合致住山龍象某人戒撿鵠白心源砥平振雪曲于夜弦換萎花于曉砌眷兹浄社咸我同盟授樓煩之詩景英游于千載之下種濓溪之藕題芳字于一花之中賜以惠然諒其勤止右景迂强梅峯為嗣子作䟽闢之赤城山門檀越兩䟽户外都無俗駕雲關赤城壺中别有春風京扁白玊雅宜振起亦可棲遲恭惟某人飽五合陳醉三大部辛勤十年讀自弦自歌凄凉一把茆且耕且戰幼則學矣長而行之釋籖流傳盡得江山之助孫賦典麗式增泉石之光偉兹兩竒伸此三請祖師傳衣任豈不重侯國勸駕禮為最崇還它的的流通副此區區推挽恭惟某人不住學地欲闚性天魚忘筌忘蹄得何所得劍在床詩在手嗚果誰鳴自怜出岫之雲何與㸃頭之石諸賢淵藪請為西晉社之㳺二瓠浮沉願駕東海若之說一菴忌䟽四明中㣲嗟欲斷之縷五世再振回既倒之瀾遂令糟粕之餘即反醍醐之正洗空名相爰立師宗潜符雖應于心弦緘授莫逃于己子如愚不肖實類難齊揮斤長想于當時記劍敢忘于諱日式資後供允荅先期某人伏願䨇輪載馳行與願廣寸燄不滅人亡器存見未散之靈山禮重開之古塔代錢氏請超果主人山門檀越兩䟽太虛觧講經源流衮衮信相徒思壽𤓰瓞綿綿湏善聽于無情庻永延于正命某人中青銅之選青衿影從擅白雲之塲白衣首肯𢋫載歌于伐木藐六震于飛花尚口數窮于心無媿客帆風送葉試參水檻之詩王孫夜簸錢拈却法身邊事先君子再振超果印實相之方丈室久虛䋲床梓竢來者起此廢弊之劇付兹流通之長恭惟某人樂在心傳如適華胥氏之國攻于性具欲栽清㤗土之花自二威緘授之餘至諸老縱談之後悠悠半榻忍負初機落落全提消歸自己孫又生子長開六勝地之門谷可為陵無忘七聖財之益智詮畫觀音求僧疏幻白衣相欲圖白足之歸遇青眼人妄冀青銅之中到此無非選佛蛻塵便是酬恩于一毫端普示圓通境界仰叢霄上霈沾雨露恩光發槁枝春看大士靣刺血書經求僧䟽七軸𤣥文兩回刺血十年苦志一等關心不假修持是真精進粲芬陁利㸃發何難求欝多羅拈來便了買屋䟽代人木上座歇脚院小無可容之單孔方兄㸃頭隣高有可買之屋庇士之心易廣告人之口難開翼瓦侵天既荷包涵之量靣墻隙地願承展拓之恩法花寺建鐘樓藏殿䟽尼摠持塔上雙蓮花開處法花名字源流于𤣥學比丘尼塔石莓苔冠冕于清苕阿練若别傳器重直指才難周雖有婦人焉魯豈無君子者芳騰䓿萏宏開百堵之宮舌粲芬陁宻賛萬年之慶即今隣刹疇曩附庸待扣蒲牢欠稜層一百尺欲栖海藏分突兀千萬間借摴蒱一擲之零洗膚髪一毛之靳有餘補不足登門如變化之魚益寡以裒多賀厦待歸來之燕盧溪盧行者求僧䟽投剗草機國家舉子挂非臺鏡田野樵夫既為禪衲清規又属盧溪故事不如同姓扣諸父之門墻不如待時趁九天之雨露趙智才求僧䟽慕西印古竺乾去依空寂自東嘉古洙泗來覔伽黎囊無半錢鉢有五綴付諸身外奈此心初成佛還一闡提人殊恩當報出家乃大丈夫事小知何堪承九天雨露之餘赴一日風雲之㑹雙峯捺田䟽門户雁宕從䨇峯來喉舌龍湫聼萬象説相傳既久閲名流其幾何所收不多飯遊客者過半漲塗可捺綿力奚為遂游舍衛城中借援善財童子自無心得還如罔象求珠便趂春畊莫遣泥牛入海石佛金地寺塑佛并廊屋䟽定起時月滿回廊空聞梵放香銷處苔生古殿不見瞿曇直湏土木經營然後丹鉛像設寺砌明如鏡何妨路入塵中山房冷似氷小竚春生天上大浮山建寺䟽蜃樓幻出岑樓初非實事石鼓夢符金鼓豈是虛聲如靈山未散時發造物無盡藏驅龍蛇斬蓬藋行且破荒履巉巗披蒙茸何妨尋勝㸃頭便了揷草當成殿閣參差冏冏開大圓鏡風烟彈壓巍巍着小浮圖福我邦家及爾黎庻四祖建傳衣閣于中宫䟽濁港相逢得周氏處女之子深岩示寂載龍眠居士之銘佩中印最上乘為震旦第四祖隂翊王度𨗳萬善于淮西直指人心揭單傳于天下子生孫又生子南陽鹽官唐為帝者師今視昔後視今佛海拙菴宋致天子問拈起話頭雖云記劍欲開重閣名曰傳衣兩朶翬飛一門超出野僧如憨皮袋持盋入鄽母儀在率陁宫肯首領話纎塵不立萬壽無疆小江寺懴堂䟽寺近禹廟小江輔竝惟天福古金園列刹相望似永和脩竹寺墜緒嗟懴堂之廢扶顛非一木之支欲乾五濁濤瀾更息三禅風火盡在是矣豈有他哉幻世塵勞㸔華嚴知佛貴行宮香火觀河洛思禹功誰賞此音我作是説師子吼寺修造䟽葛丞相家邊此寺最古曾聞師子嚬呻它刹弗如佇㸔象龍蹴踏昔受靈山付嘱今蒙大造鈞陶可無頌禱輪奐以承終抑亦扶持顛危而振始叢林改觀式昌衮繡之鄊人物增華願借帡幪之託菩提寺砌撒骨池䟽漾漾涵空安用黄金作底方方裁碧却湏白玊為堤平分一曲湖光闊着九蓮池水看我湘南塔様指出分明比他城外饅頭相去多少城北寶嚴建佛殿䟽佛可師也邁先覺之天民人皆仰之媿後成之靈運嚴事或虧輪奐凄凉忍吊摧頽喚回諸上善人共入普光明殿豐逢大有嵗嵗宜秋旅進同人家家無事當此閒暇之際舉兹遺缺之文裒一錢至億千萬錢若初地至四十一地郊闗之外徹鐘梵于叢霄帷幄之中混車書于四海步帥司在側韓菴顯侍者刺血書法華楞嚴華嚴諸經幹縁盧舍那佛并龕座䟽選盡衆生幻舍那千花之相瀝乾十指書華嚴諸部之文非外馳求是真精進函盛百軸血滴滴苦口丁寧光透一龕月朣朣明毫宛轉慧光菴慧明求僧䟽五十求僧魯叟絶韋之始八旬行脚渭濵入夢之初事豈嫌遲時安可失心空一舉便如登第之人身貴兩全即是承恩之地馬要寺建浴院䟽澡身浴恵始聽滄浪之歌就室更衣要湏盤礴之地土木之事必作苕霅之清可㪺取材于山務選掄于梁棟畫宫于堵盡工巧于凖䋲豈惟沾沐恩波亦乃栖遲仁宅舞雩聲裡詠歸三月和風無垢人前着得一杓惡水勸請明因全維那住傳法䟽黄岩尼寺淵静無滓珠明直透沙渾爐深欲氷豆爆弗知灰冷借諸天一臂之力雨四種錯花之香法固如斯衣傳罔既某人一駒應䜟萬馬皆瘖衆目斯張六宗俱堕要打劉鐵磨孰知流水之音只見漚麻池甘屈黃金之膝離倫絶類轉位回機明月落誰家待尋盟于北道凉風起天末如致爽于西山圓老骨歸澱山塔䟽到處死到處埋聊復爾耳或在彼或在此亦豈徒然化縁易盡于劍津熟處難忘于湖上欲問三姑僦地作小浮圖却教諸子施工干大檀施夏港龍祠䟽菩薩龍依佛而住獨砥橫波清河公御風而行一帆到岸遂輟襄陽之俸來興梵釋之居尚餘龍祠未惬公意揭䖍弗稱坐視何堪敢辭載馳載驅行頌美輪美奐濤瀾帖帖錫多惠于舟航土木區區集成功于檀度修慈受開山塔䟽詔頒三命開壯觀之叢林葬僅百年嘆摧頽之塔户感行嗟于道路忍坐視而盤飡只有求人别無出着起雲門一䕫足矣孰不知歸擬寒山千偈琅然法當嚴事自怜赤手誰豁青眸欲光奮于前修冀復還于舊貫老壽庵湯妙應求僧䟽庵標老壽借慧日之大名姓嗣湯休誦碧雲之新句以二師為準的仰百世愈芬芳要先雨露旁沾然後衣盂宻付一燈續晝發明本地風光五福開田回施當家檀度長興元保光砌路䟽道非墻外何湏泣岐車出門前便應合轍此外别無欹仄是它自作囏難方將行險之時已昧扶顛之歩磨稜合縫經營確實工夫以石代甎成就平生履踐南高峯修塔䟽江分東浙仰西浙之光華塔在南高俯北高之培塿尺五去叢霄之上百尋居壽域之中若非梵釋莊嚴何以人天交接自晉東土逮宋行都奉古德湼槃後身作長安几案間物人人瞻仰增修未有梯媒靣靣飄零坐視可無慚愧倘記靈山宻付遂依輦刹中興集事弗難合尖便了待肅宗皇帝請師塔様留與人㸔如善財童子發足機縁即成佛去祈晴䟽八家力田田則既粒六府重榖榖惟其艱潦欲浄而雨霪秋已高而天怒倘賜宥過敢忘祈哀伏願轉凶為豐退狂瀾于三舍歛隂而霽升晴日于叢霄式資洪休允賴終惠梵天建藏殿并藏䟽半字滿字筌蹄三部之文美奐美輪頌禱萬年之壽殿有帡幪之德藏開容攝之功樞運轉而莫窮經流通而無盡大福田于斯為盛無盡燈舍此何之根大部宗本自龍宮嗅得修多羅教爰從任灌知歸悟海眼于靈岩一期破讀證法華于南嶽三昧見前横迷津洲竪濁世眼誰非施者自辦肯心梵天華觀何許飛來竺土貫花是中拈出如意院幹塗田䟽泥牛入海瘠田有力誰耕秧馬絡頭熟稼無風自下欲嗣鼓鐘之響盍充庖廪之虛孰非可白之人自笑不黔之突文深蘭若舊無市産之章水淺蓬萊新有捺塗之利藉資糧而加行成定慧以謀身退海若三舍之餘借善財一臂之力厥土燥剛之日八福開田黄雲䆉稏之秋十方同㑹虎丘重修池上施食亭䟽冷浸雲根寒碧劍沕龍光煖浮樹杪晴融亭垂虹影巖巘横開有地轆轤自轉無聲老屋凌虛脩梁架險損七財之餘力我欲扶顛開八福之良田君其種德德清集雲建西方殿䟽火後精廬喜瑞雲之再集光中化佛思古殿之重新缺文欲奮前修成事湏乘樂嵗觀無量壽度有縁人非惟徑路之求攝心以境是謂不言之化與物為春一塼一甓皆願力中來美奐美輪豈福田外覔溪浮紅藕酣酣九品之花路入青雲歩歩四檀之報天台螺溪再造䟽十五州之地小錢寺惟崇三千嵗而河清螺溪再振挈頽綱于台嶺㑹新學于狼烟懋孫枝于天竺四明狂瀾既倒傾祖室于震風凌雨一木難支賴惻隠之片言試權輿于百廢美輪美奐皆從願力中來同德同心何必宗徒外覔楞嚴院念佛㑹䟽佛名無量壽初度將臨人生有限身末梢何託必欲脫屣五濁當先題名九花式東林入社之芳塵為西土問津之捷徑半日閒休云易得便合歸來千年調却是難為莫教蹉過楞嚴幹長堂䟽擬辦長堂輒陳短䟽䟽上都無别語堂中儘有同衣湏是寒灰槁木道者無心管取華屋朱門諸天打供清磬是非外數聲又送斜陽生涯鉢盂中一飯不憂明日蘭溪宻山寺建佛殿浴室翻盖廊宇䟽寺虧殿宇網未提綱殿欠佛天衿猶缺領欲頌它時輪奐試㸔今日權輿無心便脫根塵拊令反顧有酒先澆柱石囑使毋傾紫金山一一横陳白銀闕巍巍化出雙鴟棟脊乘時直亘層雲千輻輪文指日重光偉迹憲聖香火寺修造于中殿䟽憲聖在天之靈福康後聖天台傳心之教光賛上天顧香火之蕭條避簷楹之欹側𤣥穹后土随覆載以為春凌雨震風惟帡幪之可託新涇浄土寺修造䟽新涇浄土開天台教觀之坊舊日炎丘幻水鳥樹林之地既擅此方之勝又居列刹之先闚見室家墻虧數仭入見宗廟户欠重闗屋老欲支湖堙將浚然後樂所求之道身貧道不貧却來瞻爰止之烏人好烏亦好白蓮寺建千佛羅漢閣䟽白牛大比丘僧一片瓦皆成佛事芬陁利寺千花臺雅稱樓居未見勝光明幢已住大莊嚴藏周遭闌楯透徹根源倘知是中無地高卧元龍湏信向上有詩不題黃鶴方廣馴𤣥虎莫非阿羅漢神通華亭近白牛盡是王老師檀越南高峯建五通殿䟽篤實輝光之德聰明正直之神欲大顯于南高暫小休于北塔可無環堵雖百堵未足為多只有五通那一通何曾欠少華亭南禪展三門藏殿鐘閣䟽展拓三門寛着廣庭明月接連兩廡平吞大厦清風東開貝葉之輪西架蒲牢之閣舉行衆役式賴四檀福皆可種之田心等無偏之施鶴鄊蕃衍佇觀華表之歸雁塔標題追復慈恩之盛請寶幢維那䟽雜花繁于圎覺義在約觀圭峯黙契清凉印叨真似試筌蹄于諸部歸槖籥于斯文恭惟某人千偈濤瀾未酬初志十年燈火擬筞新功八十巻一嗅無遺未盡善也百十城徧參便了反太速乎属兹縁遇風雲政爾果薌霜露圎融行布發明言外之文講貫流通仰賛域中之大開元改三門為殿并塑佛䟽佛者覺也盍開先覺之權天何言哉當示不言之化幻跏趺千輻相如光明七金山即自舊之門可無餘地揭維新之榜别有奇觀風動鋃鐺聲沈萬籟春生枯朽歡沸層城分輝月滿千江據令草深一丈浮圗揷筆清苕寫盡隂晴梵放薄雲大施增成富貴建康天寧脩佛殿䟽佛者覺也出乎其類神而明之存乎其人殿宇有嚴人境無别古殿欲壓此心敢安湏大力量大富貴來振顛危則小招提小比丘均䝉休庇霧沈半壘盍觀用晦之時潮打空城試聴翻瀾之辯四安梵慧院普賢閣䟽開白銀界莫非功德莊嚴截紅塵區盡是旃檀樓閣菩薩分身之地信心種福之田湏輪囷捎日之材飛突兀切雲之觀欲識普賢住處何必它求試㸔童子來時端從此入廣教水旱後化齋糧并修造䟽相國師斷際備無求斷際之徒祖師摧六宗來不拒六宗之黨石混俱焚之玉沙藏未汰之金惟反己而恕人聊抗塵而走俗損餘補不足盖惻隠之常心持危扶其顛在秉彛之懿德領言前意湏箇中人歌有道之朝廷九年水七年旱笑不靈之佛法二生受三生寃試聴八十嵗老僧之言來下百千刼信根之種浄慈請明晦翁山門諸山兩䟽鼎湖龍去追嚴敢怠于夤昏印土花開分布已周于華夏須空王入室之子奉先帝在天之靈恭惟新命某人轉位回機别行一路息隂休影不羨羣飛弗打諸方葛藤是謂邁徃自有一種風度孰非蛻塵九河翻四辯之瀾一髪引千鈞之寄盍觀反擲毋藏奮迅之威所向無前更試峥嶸之歩禪教並作魚鳶自樂天淵劍佩相譏肝胆徒分楚越小低高韻以慰同盟恭惟某人志在聯燈明集聯燈三十巻氣吞列祖語無遺恨知我罪我惟春秋道不虛行以指喻指齊天地鈐鎚妙宻鐘皷鏗鍧老圃澹秋容更持晚節鄰燭分餘照竚望强宗試眼親手辦之機免唇亡齒寒之歎臨平佛日請度老疏􅖏門著書曾千萬乘提藍撼盞已落諸方翻身巨闢重關拭目橫飛一鶚恭惟某人了行脚債是到家人披龍藏而徧探過屠門而大嚼水遶臨平有路舟橫野渡無人紅藕香中數聲柔櫓蒼茫外碧雲句裡一箇閒人天地間凢馬羣空法輪三轉矮道智辯砌路疏道者少機闗得路塞路矮人多計較要平不平辨心自我笑談間得力在他行履處磨稜合縫踏着便觧通方就下平高蹉過休言不道行者求僧疏教必尊僧乃佛祖所自出人能𢎞道非將相所獨為將探道之根源豈竊僧之形服望禮部牒如蟾枝入手之榮揮長者金過驪頷得珠之喜開散楞嚴㑹疏具足圓覺住持圓覺金屑猶存示等虛空證得虛空蠟人何與那伽在定佛頂旁宣衆口同音諸天聳聽伏願六殊勝地展升平磅礴之基一闡提人同盛大光明之選三月安居圓覺伽藍具足一音宣演普門風月平分當盡反于聞聞豈獨忘于見見伏願光明佛頂燭蔽天㝡勝之幢久逺僧祗厯磐石無疆之祚海上白峯山慈濟寺三身中粧普賢䟽髙宗曽到合水和泥三大士曾同出現縷金間碧獨普賢不受塗糊深藏此段光明曲為今時開發寒潮震海激二千酬瓶㵼之機滿月無塵壯億萬嵗龍游之地巖少瞻住其兄杜仲喬菴疏伯氏吹塤仲氏吹箎静聞逸響楊氏為我墨氏兼愛橫制頽瀾把茆寄罔極之思一枝託勌飛之翼恭惟某人曽分半座略露一斑將軍䠶虎而不侯聲名益振諸子索車而出户童穉何知遲遲去父母之邦落落掃箕裘之業平生嫌佛不做袖手藏鋒行止非人所能隨機應變五峯請愿毒果疏鳯兮德之衰嗟光明幢之將仆虎哉角而翼知霹靂手之難藏無心借重于王公據令折衝于佛祖恭惟某人金雞䜟粟鐵舌翻瀾尋臭味于芝蘭略𤣥黄于騏驥深涵厚養半生有口慵開捷出橫飛一笑與時俱奮㧞乎其萃鳴則驚人試尋海上英靈來㸔闗西雋傑一老住紫籜院疏高卧白雲花雨從渠狼藉不題黄葉姓名何自知聞雖蟠縱壑之鱗孰掩騰芳之麝恭惟某人三池養駿如渥洼千里駒四辯翻瀾是曹源一滴水方其學也譬如農夫是穮是蓘語其證也圓同太虛無欠無餘白岩十載鴻祐三年親曽小試冀北一空青銅萬選竚看全提宻贊弦歌斬新鐘皷川行者求僧疏不耕不桑所難出畊桑之右忘寢忘食所急在寢食之先誓委質于六和敢負恩于四重是真法器可無位次安排雖百伽黎亦有龍天辦集請慧愚極住華亭北禪疏奪得驪珠光照夜不枉登靈鷲一峯自有鸞膠續㫁絃試聴取華亭一曲當仁不讓快便罕逢恭惟新命某人教外别傳機先三應經歸藏禪歸海向來已属平章翼有鳯足有麟到此豈容隠晦太守從公決擇大衆咸願諦觀由西溪而來三級浪高魚尾俊向北禪而去九霄雲静鶴程遥設最險闗談無義語要于火冷灰寒處喚醒馬耆更待風定月明時招回船子北磵集巻八
