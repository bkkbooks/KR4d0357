body:
  text: 北澗集卷四宋釋居簡撰澄心寺華嚴閣記通泉佛富貴具諸雜花雜花富貴備諸大莊嚴藏不得其門則重重帝網歷歷鏡像無邉剎境何自而覿閣名華嚴作而象之然則行布圓融理隨事遍圎融行布事與理融理事一如事事無礙而土木金碧較竒薦巧曲盡人為豈能倣佛是故童子斂念六扉洞開於慈氏彈指聲中及其既入六扉還闔譬如壯士屈伸臂頃果圎曠劫不覺不知身遍諸樓閣中一一樓閣皆有彌勒從初心至究竟處處種種事得妙法門與諸前聞如海一味得此味已無量差别無量藴奧翻瀾之問二百建瓴之答二千於此味中染指可了是謂童子一生成佛淳熙十五年澄心院比丘覺如建大閣造善才南詢百一十城與所詢知識於其上繪二十五圎通於其下則師照智演為之微三比丘願力所成就何以格檀度樂施而懋厥功也耶越幾年落其成而系之以辭辭曰陽精升雲岑樓先明溟渤潮生畎澮後盈月印萬水罔間渭涇風鼓衆竅飂飂同聲法霆始震蟄户撤扃意大乘器即觀厥成如日之升如海之淳如月皎皎如風泠泠矧乃中下其智挈瓶既自滿假又臧厥貞各衒其照爝火腐螢朅來會中瞽視聵聽遂使巨鏞噎於寸筳是閣之作惟儀惟刑盍於是中破塵出經長興箬溪樓記代人舊亭枕溪因溪得名某年月日某建縣有重客館縠必於是閲歲滋久屋老弗治流為旗亭躪蹂不禁寖圮寖斥椽差梠脫藩垣委頓吏困簿書期會加以悍俗嚚訟汲汲剖決日不暇給及瓜者欲去未行逆旅狹隘回翔意緒庸免悠然獨酌栩栩半炊之嘆於是喟然口與心語曰萬室之邑舟車要衝因仍固陋若是其至也乃紓厥思規橅於胸中未以語人一夕風雨仆亭若相厥志豈天地間物乘除於數而存諸其人耶抑山川之靈思革其舊而新夫清淑之氣以振厲文物耶於是凖直市材俾其樂輸鳩工於豫不􅟃其時撤亭而蜚樓若干楹於亭址作於某年月日逮某年月日而成略其巧堅以圗其久去其麗壯以圗其固學官再新相與面勢練澄漪漪半樓夕霏鴛鋪翼翼崇簷曉碧市聲逺耳萬竅風止卞雲露青雙瞳電明部勒山川氣象成一都會可以拊長筵展清流策休暇餘景婆娑吟嘯商評得失求無厲於民以告夫志尚與我同而登斯樓者如護吾廬嗣而振之俾勿壞因作而歌曰安得大裘長萬丈與君都蓋洛陽城再歌曰安得廣厦千萬間大庇天下寒士俱歡顔某也魯敢用前聞以俟來哲善拳圓通閣記宜興代人徴心心忘執忘自戕辨見見泯執泯亦爾瞿曇所以最初開示如來密因為新學修證之本策勳密因安住大乘勵大乘器擇圓通機應圎通根以教阿難及諸四衆文殊承旨領此妙選二十有五登地亞聖各陳昔因補陀大士青錢萬中餘雖審諦弗當其根是故大士獨任斯託眼既聞聞耳亦見見六用互舉非證不識此方教體其惟音聞聞性精明所入常寂風豗偃溪礫抵庭竹若合符節如空涵空自昔至今得此門者其數無量終盡未來巧厯莫數閣名圎通蓋取諸此俾圓通根從此中入爾時北澗從座而起駕言出逰步向上層式瞻輪奐倚楹晚眺賀燕未乳求友鶯老悠然一聲啼破幽寂方是時也普門不鑰洞開六扉八窗澄鮮昭晰萬象塵剎幢蓋薿薿原隰窈窕澗壑嵌谷邃竇山雲溪月莫非大士小白花岩自它受用境界種種殊勝種種如莊嚴藏宏博壯麗不勞彈指如大圎鏡物來斯照如帝網珠交光相羅影見重重無在不在則是閣之作也直顯勝妙家風革人險隘邪偽同歸廣大之正惡習日霣善日頴楙更相漸磨丕變風俗帶牛佩犢知所深恥是道也佛四智中成所作智之所成就豫佳住山某闖此妙而發明之故申之曰透山兮泠泠蜿蜒兮沕珍璇題兮宿雲呵護兮山之靈大軍倉廳壁記鎮江代人倉敖基兩漢餉道不絶也淮東一道貔貅萬竈所仰給厥任重非錯綜精練之佐分掌出內會稽雖有應變宏才偉略終倦於獨振倉實今使長總侍某官發軔之地毫忽利病罔不備悉每以獨振惟艱白諸朝乞去甲仗庫官别增監倉一員依舊銜止添兼監甲仗庫五字俾事集力裕若已蒞事時等而上之逮今使節駸駸黃閣紫禁而惠被四表自某官至某官歷三任壁記未始建恐改作之自久而不聞遂疏凡居是官者在官之日與夫爵里名氏悉書於其下庶夫往績歷歷可考大軍倉庫記鎮江代人罅必補漏必苴風雨飄搖之必支挈挈惟恐緩家居者之為期與子孫相終始圮西則就東圮東則就西移敝居完居安辟危往往棟欲壓梁欲折乃去而僦他屋官居者之為滔滔者皆是君子則不然居日必葺園日必涉急公於私操心慮患泮然有以異是大軍倉庫屋老矣脊頽厲風趾摧潢流某官不遑寧白使長某官朝聞夕報鼎新於多事之秋不日而成比舊益壯麗于以見使長孚於其屬恢乎有容不靳也若此因作而言曰魚川泳而鳥雲蜚豈獨專美於唐三百年之名流也耶紹定辛卯四月旦兩記同日植齋記山居玉立萬竹當疾雷破山羣蟄斯奮時稚子濈濈見頭角不浹月駸駸拂雲亭在深處日婆娑其下客有傅氏某適至拊竹而作曰能自植者也余以植名齋盍借竹以識余所植則謂之曰植立也致力於植則必有所立確乎不搖若頽瀾砥柱行富貴行患難綽綽見於事修身齊家虗心徑節皆事也身修矣有類乎猗猗介特不衡不倚不言而信不令而行曰齊家林林而羣矗矗不亂正家而天下定矣虛心若可以受道道集虛虗者心齋也徑節則寒暑不移有常操也安節之亨承上道也具是四德也王馬曹拔庶類而君之指以謂人曰何可一日無此君天下後世至今莫能易雖然始植而立求無愧此君矣未見不倚不撓於晚節末路不自免庶類俱靡者善乎詩人之為言也不羞老圃秋容淡且看寒花晚節香當與孔子所謂戒之在得同一關紐微此君孰與論夫植碧雲藏殿記宜興余視碧雲崇明篆旬有七日會諸耆老及久於其事者商略一家之政宜所後先咸以經藏為缺典不覺喟然曰經佛言也言心聲也在則人亡則書不尊所聞何以見佛心非藏何以􅍥經非殿何以舍藏矧事不避難勞人自逸非是是役也繄我職取材之待用者振之不足則市之雖朴􅈪弗棄斧斤一施輪奐在目作於某年月日越明年九月日落其成然後屈衆力於藏雕礱塗棟付擅時精巧者八觚稜稜玲瓏八窗實以琅函玉軸承厥終於戲梵釋之居殿止有嚴堂止有容廩出內庖舂炊剪虀衆法會稽庶務止於所司賔客檀施奔走給侍止厥攸處貴堅好不貴侈靡與其過制孰若適中樓層閣崇戢戢璇題涼觀月榭炫耀浮俗得非聚人而役之何以聚人曰財財豈天雨鬼輸必首之不可必有之怪説申之以不可妄冀之甘言蕩莽忽荒詭誑譎誘吾不知古龍象尸林塜樹間逆旅天地蘧廬千古又何謂也密印寺記湖州或謂梁武崇佛不永祚昭明造塔廟不永年佞佛以祈益何益耶秦并六國欲帝萬世竟弗再傳扶蘇胡亥夀考安在不聞佞佛過秦第云仁義不施攻守之勢異也密印昭明所造考訂舊聞索斷碑殘碣無所得埃壒埋古刻卧廡下洗刷而起之倣佛少師米公友仁小楷西南大長老華嚴公祖覺序寺僧行昭笵銅為萬二千斤之鐘所由鑄大學馮公楫為之銘宏偉典贍言太子施園造寺今祠於東廂為護法主掌寺事者云舊有記聞諸故老罔知誰為碎於廣明之盜墜典未克舉盍嗣華嚴公大手筆俾二大士翰墨文采照耀於蕭寺寺檀越常選文章貽後世非暗投也敢請於是受柬而作曰此大道場肇自天監二年文孝皇帝居東宫時用祗陀太子故事以園為施時富名流江惣沈約在帝側豈兩公文字乎石泐於會昌例廢時抑㶳於張雄猖獗時或廣明盜所壞皆莫得而知也樓殿崇崇冠冕衆剎跨龍庭面檇李翼車溪枕青墩梁曰報恩唐曰咸通悟空吳越時曰吳興皆禪居我宋錫今額會昌之禁解鹽官安國師嗣子如縱昌厥由緒克觀厥成土木金碧壯麗於前日既老而寂無著嗣子德會守成規惟謹張雄肆虐罵賊而死白乳湧數尺行欽與其屬三四輩整而完之至是三學比丘未始乏為天台賢首之學者相半曩聞清裕者神異卓絶里社所嚴神異吾所不道由梁逮今逾八百載成虧有常數武宗之廢武宗之愚也張雄肆虐張雄之虐也揆之廣明亦莫不然固已雲散夢掃吾密印自密印主之者存焉耳辭曰嘗聞蕭梁以弱為仁仁吾不知弱是用評景臨天威顙不及仰惟其能然夫豈弱喪文孝夙慧衡鑒古制英搜竒獵珠貫瓊綴手開僧園如祗樹林呵禁不祥池湯城金棄德作威身殞威逝德明惟明芳流世世曰縱與會真竒男子縱舉百廢會罵賊死握拳透爪嚼齒穿齦易地皆然不忝厥生爾德爾心洎爾四衆髙躅曷承企會與縱江東延慶院經藏記教有半滿藏無小大般若寶積華嚴涅槃合八百四十一卷自五千四十八卷出近世蜀之昌州不動居士大學馮公以無量夀願施五千四十八卷凡四十八藏八百四十一卷亦滿厥數往往梯此有大小藏之目非古也藏也者藏也涵容融攝為義琅函玉軸則有海宫龍伯之所嚴祕密意玄義則存諸其人爰有大智破塵出經會於一乘如海一味一鉢香積飽均四衆貧女寸熖不遺遐隱師子手足一金也江河支别一水也諦審機器利鈍隨應玉象徹底偃鼠滿腹各稱其量乘此大乘至究竟地豈丹雘金碧雕礱塗棟幻出龍鬼扶持淩空虗之所能倣佛時有比丘名曰智日聞如是言矍然而作曰我之所居康廬送青彭蠡闖户賜號延慶巧當勝處嘉定壬午作此佛事明年落成實惟妙演書四部經則有智玉矧二化士厥惟艱哉鐘鼓殷床梵放薄雲妙髙四朵夜摩諸天如風忽旋如海忽翻樞應無窮莫盡其極一機休復海湛天碧八窗玲瓏塵消鏡空萬目仰瞻夙負惡習不鉏而拔信萌善頴油然發生審如所言則徒取檀施靡金粟勤人勞衆從事於不急之務哉則語之曰吾所陳理法界彼所為者事也實際理地彌滿清淨云何是中更容他物事法界中或一其缺單輪弗馳隻翼弗飛理隨事遍則逢原左右事得理融則千差一照理事無礙事事渾融則藏與經非一非兩及破塵者三無差别陳致政施田度僧記施僧欲其四事具足一意參扣餉僧俾正命充滿邪解弗作舍僧解風雨飄搖之憂浴僧拂妙觸宣明之迹至於度僧則如上種種盡在於是教必尊僧蓋佛祖所自出度僧度佛祖也責佳實於良苖非雨露之所滋耘耔之及時必稿於烈日萎於雪霜又何所妄冀區區舍家林林服勤稍頴異者皆良苖非恩霈自天則一伽黎亦何所妄冀故叢林有賢勞之澤等而上之逾一二十寒暑乃能得就令得之必四十五十筋骸盡瘁欲求如佛祖因地勤苦精敏時所為心至力殫何以至大究竟為大福田發生富貴夀考報效檀施毫髮反常如經所云可怖可懼爰有信善致政陳公洞見此理捐膏腴三百畝嵗度一僧芳聨世世自一至多傳無有盡推此願力亦無有邉天竺巍巍靈山未散此廣大心與山俱髙蜚閣廣堂助增壯麗光明懴摩屢嵗隨喜是不可不書也噫塵勞之儔各知資生財知其豐勢知其崇業知其廣位知其穹孰非為子孫計若蝜蝂踣而起不知積而能輸輸而得所歸於佛隴教觀家與佛隴之傳相終始獲善應於斯文如公者鮮矣故吾表而出之為區區若蝜蝂之戒通泉廣福院記廣福皇覺院制度小而最古翠屏諸峯皆歸彈壓輪藏鐘閣普門內院復道翼翼巋然門闥立數級之上煥燦照耀靡不華好古殿再新諸莊嚴事如開眉目如被錦繡又如李郭一交旗幟十倍精明紹榮倡於前祖因法一紹粲惠燈各致其力相與應和成此殊勝法深宗鑑逺歸自南層砌重門兩盡其巧跨鼇以東幢剎鮮儷典午渡江時異僧來此鋤荒榛斬蓬藋草衣木食而大有為十數傳後稍弛鄰邑惠門蘭若思靜再振於唐之中葉逮今鐘梵薄雲天當一方宅心純想進善悔過之地吾廬距此僅一舍淪棄江海足迹未始至端平改元秋鄉州某寺某僧移書訪問生死屬豫紀嵗月噫幾千年矣世果有千年之國乎歷年之多莫如三代夏商之厯莫如周周之季建空名惴惴立於地大衆富強有力諸侯之上年不加少豈能盡八百之厯哉揆之操墁圬者之言則百年之家亦復無有然則樹一剎於深山邃谷更歷如此其久獨何如由吾師淑諸徒以戒定慧為之主慈忍精進為之張正心誠意發其用以遊人間世利已利物以成厥志後世雖未必盡聞盡明聞者不自棄自棄者虐也明者不矜衒矜衒者賊也故能通神明行蠻貊久於其道而綿世守若夫焚蕩於強暴毁斥於雄罵如風吹花如刀截風持危扶顛以大此宗以承厥終禪龕院毗盧殿記禪龕為聞剎自唐僧文公文公道振自杜少陵由唐而宋其道益明自漢中師古修信師因麟菴悟開繪公像律者法印請紀其事刻諸石悟超者出凡土木金碧壯麗皆其所成就晚乃作毗盧殿幻華藏世界海莫不備悉權輿於淳熙辛丑越九年始訖事實麟菴策其勤乃大作佛事施百物於同衣而落之芝茁龕趾嘉應荐臻不可以一二數人以吾宗人喜言誕厖故不録超質而不文遊人間世惟一真實以真實故感人也深茍不合諸心必言其所不合者侃侃不小下雖負固好勝罔不服故集事先難後獲不計疾遲志其成而已殿之成也榜曰毗盧遮那云者竺梵之稱中國譯曰遍一切處語其遍則無乎不在其在也無所不遍大而無際小而無間雜花所謂三際悉在無有餘作而象之理亦左矣雖然盍觀夫遍與在乎一滴一涓具十香海一塵一沙彌盧咸在十虗滉漾而莫見其餘毫忽微渺而莫知其欠一椽一瓦尺丹寸碧孰非莊嚴藏大樓閣得其門者雖宗廟之美百官之富何以加諸不則疏不云乎積行菩薩曝腮鱗於龍門上德聲聞杜視聽於嘉會故系之以辭辭曰覺雄富貴載諸雜花帝網重重幢剎振華天人鬼龍肅而不譁一音震潮洗空萬差爰及後世模倣百為雲母水晶琥珀琉璃匪雕弗塗匪巧弗施美奐美輪雲繞璇題惟道人超身如椰子云胡成兹大功德聚惟其有忍屹若砥柱百阻不移以願力故一殿之作曰惟艱哉載賈餘勇衆善克諧民之秉彛本自固有攝以善境日勉日懋江西後城觀記旌陽許敬之斬妖劍血未洗江西一道被其惠奠枕者幾何年矣昔嘗至處莫不華觀闕嚴醮事以系其思某觀則唐魏鄭公讀書處故基曽此築壇場拜北斗前臺後城山如髻鬟水旱必祈札瘥必禳子息必禱禱輒響答唐某年賜額為觀住持者曰李大業胡濬哲則為之副居無何遞迭而逝袁濬文又繼之振墜起廢殫力不小懈胡紹宗則結萬善人聚施者興土木營舂炊棲道侣擇其善者分掌出納既罹兵火堂宇復整整稍刷鄉來狹陋之恥松蓋竹箭幽草怪石逈與人間世遼邈年七十七則畦芳浚碧曲水泛斚養恬育和泊然頽然逰於造物之表壺中有天以佚其老吾嘗聞旌陽在時言其身後當出八百地行仙尋師豫章江沙過井口則妖荐孽人吾必再出觀夫樓居列仙在天地間無别營獨排患難殄災異安生人為已任滿足功行為鈞天廣樂之歸昧者昧此方疾其奉安之侈不知崇德報功不如是弗足以揭虔妥靈辭曰道固在人人則逺之人不即仙惟仙即之猗歟列仙不與世絶志存生人隱顯殊轍巨妖既血發蔀撤蒙行不厭髙功不棄豐劍飛上天龍光敓日逮今繹思尋刻舟迹風清玉虗月滿瑶壇綘節霓旌泠然往還寂照院記幢剎盛於典午大備於蕭梁佛圗澄天台顗所造幾百尺椽片瓦皆有深重願力不計百艱而後成視長安富貴人崇先香火非不壯麗勢穹力巨氣雄熖熾咄嗟可辦畫簷繡棟絢粲山谷一再過之已有間矣又過之則圮弗治甚者逐其徒而家焉更甚則撤椽梠挑瓴甋無所不至勢力之與願力遼邈如此寂照院之作惠通師因其先富儲蓄基造寺之役君子謂其不負所託逺近響應百堵皆作殿以舍佛閣安千優曇藏載三乘堂庫廊廡容衆四事凡所當有靡不具權輿於嘉定七年八月越十三年而落之浙江橫陳潮聲與梵放相答吳山萬井越樹如髮風帆沙鳥倐聚忽散漁樵響沈可禪可燕車馬喧止可誦可讀延騷吟可以寫壯觀待雲水可以暫磅礴一香一燈皆夀聖人福兆庶及其親族檀施之存亡不留一簮直使後人三常不足驕吝不萌於胸中却步反求以為道毋貨殖為扳貴鑽勢之具母諂誑為王化之地惠通師嘉興徐氏子為鳳鳴惠雲院清抃弟子坐幾臘年七十三辭曰槖宜充耶或宜枵耶不枵其充豈真出家猗歟所先豐乃儲蓄我則捐之樹剎結屋相厥攸處大江之滸匪侈惟壯帡幪風雨有來水雲悠然憧憧解腰午鉢投棲晚鐘七尺單前疊足巍坐月滿璇題孰與分破振策舍衛肅容正觀美見宗廟富窺百官我作是説應無所住拍枕潮聲是真實語明真宫記寧國明真宫成雖非真牧開山而本起之因自真收寧國之逢雖自真牧而其有以自致者易災為祥屢格於中壼變隂為晴曩見於郊祀密贊慈明靈異外著未易一二數錫號不名于以示尊禮革菴為宫于以昭寵數特旨蠲免于以防誅求親灑宸翰榜其宫而雲漢昭回于以旌其法裕以倉廪聚其徒而學徒萃止于以致其久非神存樓居迹在宫掖持心純一與道𡨕契何以得此經樓華閣左右翼翼方丈齋堂各有攸序簨簴棲鐘耒耜在田星冠峩峩象簡雍容日洗齋鉢逾半千指至於九宫撥南畝之賜飽學其道者數百掃建炎殘局之燼則武當紫霄一新佑聖上升之地長森萬嵗武昌太平九江夀聖是三者不特土木金碧之助抑奏錫奎畫以鎮之疇一明真哉蓋其量大而志平緣勝而事從蕩蕩弗偏泯是非利害之畛齊物我於各適其適之地法宜識載以侈千載一時之遇俾居是宫為是道清淨齊潔於無窮贊坤寧聖人成關睢之義而母儀天下如漢孝景皇帝竇太后喜黃老言卒收修文偃武之效不然何以仙遊之日於明真猶拳拳不能忘寧國倦酬應上告老之請以住持事授其徒通妙大師俞守一明真大師趙守正則副之井井有條理如寧國無恙時寧國真人王其姓宗成其名於真牧為第二世瓜瓞綿綿當有大其家者西亭蘭若記誠禪師號船子蜀東武信人在藥山三十年盡藥山之道逮其散席浮一葉往來華亭朱涇上下百餘里林塘佳處意所適則維舟汀煙渚蒲間詠歌道妙其言與志公玄覺諸老脫略筆墨畦畛處若合符節識者味其滿船載月未嘗不歎其汲汲於得人以為不負祖宗計夾山去後覆舟而歸乃知佛祖在人間世斷無他事西亭三詠照耀天地雖乳兒竈婦能歌之即其言觀其行廪廪所不死者不與凡輩共盡自是松澤山水益明秀至今稱水國名勝一經品題千古改觀妙賢企遺烈結茆於詠歌處曰西亭蘭若樊圃樹藝一竹一石皆有次序菱芡浮實蘋蓼交映落帆半夜荷笠亭午開扉相延抵掌嘯詠冀遇如船子者求一言之益而拔俗於千仭之上使其徒若圭問豫所以相遇之道則謂之曰船子之昭昭如日麗天爾之拳拳如水在地彼以不息照臨爾以不息流注均具不息之道故曰天行健君子以自強不息又何俟一語之益然後為得哉書以授圭使歸以告賢雲安德英藏記佛菩薩語無乎不在窮山邃谷曠敻遼閴靜勝林野諸漏永斷者所住處靡不有龍猛一嗅八十卷則於龍伯宫茫茫禹迹一幢一剎未始不具純陀供後則曰鹿苑初轉鶴樹終談從始自終不説一字結集為經又復為律昭昭揭日月後之論著更相發明合而言之總曰三藏琅函玉軸煥粲心目其不説者了無餘欠雙林大士特出新意忉利夜摩及與四朵龍天鬼物扶持淩空虛載之以輪發之以機樞正厥中其應無盡自梁至今説無有終有大施者是謂吳桂住夔子國聞此真説既聞是已宿習開爽不謀不諏欲顯此妙擲金如泥鳩工如雲入林選材作而象之藏以庋經殿以舍藏幻五十三大士於其間諸莊嚴具一一稱是自乙酉春逮庚寅秋厥功告成會建龍華以落之衲子出三峽罔不挂鉢問舟能言此段竒想象輪奐莫不𡨕見德英比丘訪豫於飛來隱居述經始之勤信紀嵗月之請以侈吳君之施為之辭辭曰兩崖束江萬馬駿奔灧澦豪據一涓不渾遡流以西江樓對飛碧瓦參差子規夜啼翼然招提薄雲梵放籟虛不鳴山香酬響龍藏斯作爰載梵文使聖人夀轉如是輪如轉金輪王四天下物物化成賢罄遺野幻小白花與彌勒龕俾一生佛參五十三此華藏海莊嚴殊特攝散亂心以殄姦慝峽山矗矗蜀江流玉此輪載旋何千萬年欽山禪院記建炎末荆湖南北列剎㶳於賊環千里為盜區澧之欽山在唐咸通為大蘭若最先罹此酷時人命如葉州郡閉關自固坐視剽掠焚蕩方迂辨曲談聊忍須臾一馬渡江再造區宇遺墟掃礫剪榛棘圗厥修復當紹興初楚安方來創僧堂藏殿厨庫大殿法堂則枯木誠作於乾道丁亥紹熙改元宗譯建三門鐘閣逮嘉定辛未善應又營諸天閣五百阿羅漢殿至是稍復咸通之舊閲數傳歷百艱摧折於奔馳挫抑於留難莫知其幾也僅克成之其他力弱寡助遂為強有力豪據而湮沒者何限先是枯木鑿池瀦水溉田使穀不稿種藕禁採捕示人以好生之德清心亭古溪橋則憩逰觀者發竒勝於觴詠吟嘯土木之役至是不可以加矣昔欽山負邁往之氣死於德山蘇於洞上昧者以為躍冶於德山殆不知其從容駕兩雄之時反睨直前微巖頭孰能柔其剛挫其鋭雪峯逶迤曲折養其胸中所未發終至大究竟後世仰之如華山三峰峭峙半天上清風泠然可望不可及故書之使講古尊德之士知師友淵源之正因作而言曰三峯青中雄酋三人焉德可侔是謂欽山雪峰之與巖頭白日西頽黃河北流天地所不能老兮廩乎千巖之秋鹽亭藏經記非耳目所及不近人情茍可以澒洞觀聽雖愚無識知罔不曰怪曰誕其事著其迹彰十指十目無遁形則市虎投杼何自而信於是有志怪者焉某年某月日梓之鹽亭雲溪洲渚間黑月夕如晝溪民惶惑聞有司使即光所自發而觀焉才一尋許得經一龕貯般若華嚴寶積涅槃合八百四十卷屬李友賢安奉於家粘綴完輯歸於圓覺精舍道隆比丘造殿建藏護持維謹幻十六應真環四壁千手眼大士居其中蜿蜒金虬繚繞朱柱慶元二年三月十二日樹嘉泰三年九月十四落其成豫先人敝廬距此兩舍許淪棄江海未始見此殊勝莊嚴鄰里人來中朝能詳其説適契某人之請為之記系之以辭辭曰什公翻經於秦奘公載經歸唐竺錫振華華竺相參分布海宇雖三家市把茅鐘梵之地靡不具較之五竺十不二三奘公之西心傳賢公賢以七象載貝葉華其歸殑伽遇風淪于河譯於貞觀者般若楞嚴心經諸部而已太宗文皇帝序般若房相國融筆授楞嚴今兹水滸所出般若六百卷在焉豈偶然也哉言心聲也瞿曇太宗之心卓然獨存於天地間天地可壞此心自若也豈一塵一沙所能錮終使之潛照而不耀於世耶揆之以魯壁汲冡非人力所能也褒能寺記苕霅間雖蕞爾招提輒擅林塘之勝褒能邇南林梵放市聲相喧寂慶元二年僧彥康白禮部請今額於故宋少師恭敏公香火寺首建法堂庫院未幾而彥康寂自是殿宇室廬翼翼修廊廩庾庖湢垣墉四周棲衆之具罔不有復敞華閣擬天台方廣為半千開士分身應真之地如佛世比丘日赴四天下供作勝福聚後先嵗月則載諸梁題較千礎萬指大叢林則具體而微而一日必葺之戒庸敢或墜寸椽抔土皆自普明出嘗語豫曰始豫徒手來自鹽官而僧於此痛康之緒績弗嗣遂然五指繼以一目誓續先志志大力弱曰惟艱哉如蜂采芳醖釀為蜜不務旨蓄何以集事珍苑名葩籬落野叢擷英獵竒取不務多昌厥餘裕晨露夕霏沾曝寒燠日計不足月計有餘旦旦勞苦弗憚也遲其成割而藏諸以足吾用蓋嘗聞諸故老云錢如蜜一滴也甜吾則曰蜜如錢一錢不浪費盡以作此土木金碧光明殊特大幢剎吁三十年矣九年之功精盡於此矣于以拓夀域墾福田俾嘗獵之叢一色一香稱法界性隨其心初應所知量根莖枝葉華果敷實與此山相終始若夫掠功以美已衒能以僥譽規利以豐槖肆誕以詭俗皆非吾所謂道明雖不敏不忍為也為我記之俾後之有此居者知厦屋之為帡幪警懼修省為佛之所以為佛者以當施者之心思普明之經營結搆之難也如此證覺懴院記華亭佛世淳俗如結繩過則許懴一經懴摩永不復作再則擯斥不入衆數佛滅度後人無所依乃詣上座或詣佛菩薩洎諸天像作佛在想收攝散亂肅莊六根發過失因絲髮無隱祈哀請命洗濯刮磨不由往轍生則自列死屬後人掃清積瑕不留宿蒂絶輪回根涸生死流浙江東西此法特嚴長期短期各有常軌於戲擾擾萬生逐順而往順輒弗常必以逆濟理逆則舛於是輾轉成就黑業初於涓埃久而穹深翻五欲瀾增九仞巍愚公漫移精衛曷填一跌一溺沉墜罔測於是有菩薩僧作長生懴摩愍此淪沒晝夜六時誓于生生此錢公某許公某長生觀堂所由倡普照寺紹隆比丘所由和遍扣諸檀希六殊勝經營結搆起已廢之剎於闤闠是難能也隆滅度而修定作殿堂廊廡厨庫凡所當有者悉具然後敞華閣舍無量夀環以住世應真樹千手眼大士與閣稱稼有田樵有蕩微錢許振其始隆何以奏厥功微隆成兩檀越之志定何以承厥終舊寺曰無礙浴院太平興國二年施徐可潯舍宅建大中祥符賜今額今為長懴觀堂一法也匪濯熱午氣必暍不浣垢膚腠必𤸈何自而知妙觸宣明成佛子住懴淨心垢悔滌熱惱穢濁盡除入清淨覺莫非今昔正信願力冥契而宿緣所追再振法緒扶此勝幢惟此勝幢如日之暹如月朣朣與國無休與天無極施者受者亦復如是普照寺千僧堂記堂容萬指燼於某年之冦亦既久矣逺人偉其名至是務先覩為快今也漠然人以其名在而實亡也乃與桞柳州鐵爐步志同按崇教大師祖祥寺之楨幹愧此缺典聚族而謀曰有志者勇有為樂施者不吝嗇吾僧於此逾四紀凡所興建根椽片瓦罔弗與舍我事罔集且吾生平不妄受受則必辨禮義而不及私信稍孚將有以相吾志誓鼎新以終吾老市材僦工正信響答輸貨惟恐後權輿於嘉定庚寅春仲輪奐於辛邜季秋越明年而崇教寂又明年雪脊界天璇題闖簷翼翼前榮設坐備物靡不具嗣孫智淵能繼其志而復其舊成不愆期美不踰制惟壯惟固弗事侈靡窗牖洞啓床榻衡直匪雕匪琢隨宜加飾華鯨吼月巨鏞橫撞鮐背在前犀顱茁霜旃檀無雜簷蔔有序本無位次如法而住十剎五觀敢忘講明以福君親以康兆民謂吾素餐吾餐罔素於昌明時密贊潛輔華亭南橋明行院記華亭圗牒載春秋時夫差三女子墓田曰三女堽聲詩則播諸唐令尹詢宋荆公王介甫都官梅聖俞邇堽之剎曰安和石晉天福五年蔣漢瑊環堵中芬陀利花擢於陸聚族而謀曰是八吉祥六殊勝處盍施諸釋梵家遂基此役楨幹於是者曰本立病潮嚙岸址白漢瑊議徙於此改曰明行用錢中令歸朝所請之額堂宇樓殿金碧煥粲雲棲鴛瓴月行璇題具如經説凡所當有罔不具藏乘二千餘卷棗柏大士華嚴合論在焉鐘梵壓萬籟為一方宅心純想之地遷善逺罪者咸知嚮方一燈長明四檀委輸規矩準繩有條而不紊五季方中水立晝昏真人應期民登袵席聖聖授受逾二百年未聞識載固自若也云胡慧日求紀述為日曰故國喬木其大蔽牛其髙垂雲可無封植日冀懋長風雷之鼓蕩雨露之膏沐而至此也一剎百堵容數千指功倍封植惠戒剪伐人天之所瞻龍象之所懷不啻故國喬木罔知創業之艱難則將怠乃訓盍講明以詔後世不亦可乎因其説系之以辭辭曰五季中民迍邅沸如糜號無天中令君吳越錢奮一旅圗萬全玉節徑金城堅王海國遮中原振義聲開福田空寂崇經象傳幢剎建泉貨捐為帡幪持危顛誓子孫銘肺肝摛錦繡色山川歸有德同永年帶如河礪如山與竺乾無黨偏北澗集卷四
