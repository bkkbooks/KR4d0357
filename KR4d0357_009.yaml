body:
  text: 北磵集巻九宋釋居簡撰育王席煖簾疏零亂收來全身入草見成拈出八面當風休論做處工夫領取卷時消息玉樓起粟春歸雲㑹堂中金鏁開關誰在夜明簾外宣石橋開雪豆語疏龍藏不能容攝是謂重𤣥乳峯曽未流通斯為缺典襌士本儒林之秀副墨乃洛誦之孫文采難藏印板打就佛迹山幹田疏挿草建精廬徒襲瞿曇氏之迹開田説大義抑觀先百丈之心丘園隨分經營道徳敢忘耕獵異苗翻茂因中果惟我能知别甑炊香飰裡沙知誰咬着修兄淮南持盋疏諸方曲木床邊葛藤弗少箇裏死柴頭上火種無多且續光明不須狼藉等心分衛何妨直入長淮卒歳忘憂佇㸔香炊别甑臨海尼如奉求僧䟽覺無象族人毗耶室内横機在家菩薩娑竭宫中奮辯學佛威儀是真出家決定成佛四十年此心如銕猶在半途刹那間一簣成功不妨全節化席簾䟽本自玲瓏却作無邊障礙放教周匝打開自己光明雖然枯木霜花自是春風和氣機機相付還它日用工夫面面皆同要見歳寒門户宇文樞宻精嚴請涓公䟽肅愍公跨虹霓去衣鉢親傳稜道者從象骨來典刑不墜義膽忠肝輝天鑑地深禪宻行續焰聫芳委寄得人承當無媿恭惟某人淮山夢斷又移茅舍入深居笠澤春歸只有湖水無行路松痩鶴立雲踈月寒霹靂手藏袖間軒昻氣蟠胸次丹𠂻貫日結皇天后土之知表刹摩霄付孝子順孫之託銕牛住霛隠䟽三首石橋住浄慈同法嗣道北道南自是同工異曲難兄難弟孰非跨竈衝樓四蜀兩翁一門雙駿恭惟某人建瓴不竭側管徒闚如雲無心等一身於土木尊法有體重九鼎于山林長蘆起刼灰之前小朶在屋簷之下袖中有東海豈錦衣不榮故鄉屋裡販揚州携紙被便歸方丈時在本寺西堂右山門見謝公不住大溈神交方外識荆州不願萬户道契環中判將車子横推不碍襪頭畨着恭惟某人忘懐于衆無媿於心要潑除臨濟一宗風清下載未拈著正因二字草没前除如當來彌勒下生時有不待周文而興者豈無它人不如同姓乆俟來歸若論此事眨上眉毛早已蹉過右州府弗㑹佛法得黄梅衣盋求之與抑與之與指隂涼樹為黄檗兒孫不為也非不能也要眀宗于度外須領話于機先恭惟某人不重巳靈匪從人得一千五百善知識邪法難扶四七二三諸祖師死灰欲焰近龍床角踞鷲峯頭八千歳以為春嵩呼祝帝九萬風斯在下鵾化為鵬真相火後建法堂䟽禮兄受業甲乙傳家砌草深逾一丈丙丁失職刼燒幾至三禪豈遂無雨花新好之吹尚堪聽瓦礫從衡之説白雲為蓋可無位次安排頑石㸃頭自有虛空證㨿控此情于大施依舊經營揮老淚于遺墟斬新建立化菜䟽栽培不得到海方知撈摝將來望洋而嘆萬錢無下筯處八珍有絶交書入五綴盂同一鹽味春浮波面夜潮載月明歸驗在舌頭午盋隨香積去百官渡惟一建藏殿䟽毘盧藏海面面莊嚴大士家風人人具足枕回廊之寂寂開厦屋之渠渠展茲壯圖補此闕典舜井作推輪之響舜井在寺首井中聲如雷半年餘已有先徴夫郎詠伐木之詩式觀後効講合䟽僧䟽藏海莊嚴染指莫非圓頓法源浩𣺌濫觴終至滄溟以心為宗囘頭是岸恭惟某因標見月得兎忘蹄三大部談笑無遺何濡滯也百十城刹那便了反太速乎眷此頺綱煩公老手文字語言之外盡力提持難疑答問之間全機獨脱義烏縣東江接待䟽陳道姑賣田創建無休歇地寧免奔馳賣藥石田以創接待從它下榻噇眠解腰共飯然後擔簦取友負笈尋師大厦終成便是營巢之燕一餐必報何殊反哺之烏離相請光老䟽舍妻子入道錯自南來悔鑄六州之銕又隨流去洗空萬馬之羣不甘涇渭同流何苦草木俱腐某機迅飛電身如槁株笑領言前選佛得甲科何可當也陸沈衆底有朋來逺方不亦樂乎一念萬年全身半偈力追逸駕又移茆舍深居自撥寒灰暫向人間借路䝉養正建僧堂䟽梓人畫堵巍然相道之尊圬者操鏝徒爾楊朱之善願施宏大以振摧頺湏知百念灰時不守三條椽下盤根錯節咸歸剪伐之餘凌雨震風盡在帡幪之内臺州請宣老住瑞巖䟽惺惺人去萬牛回首難追莫莫機横千偈翻瀾未已儀刑龍象眼目人天恭惟某二仲名髙百念灰冷捧紫泥而去方快横翔眷赤城而歸尤知靜勝為法來當酬居士買山住應笑支公㸔明月憶峩眉毋復詠謫仙之句下喬木入幽谷不妨歌伐木之詩黄巖慶善修塔頂䟽再經回祿萬牛難挽如山獨御蜚亷五鹿易摧其角三百尺規橅之壯八百年輪奐之虧逺目未瞻寸心先折八觚著地是中發多寶光明一舉沖天向上寫四檀名氏錢昭文直香火道人求僧䟽現童女身聽宰官身説法居環堵室來方大室飛花欲為白足之歸未就青銅之選雲霄有路穏騎鶴上揚州雨露無私亟㸔魚翻禹浪諸暨牌頭建藏幹田接待䟽八靣玲瓏不動中間樹子三乗半滿撥開向上機關發明自己霛光來吃家田米飰立錐無地運斤成風儘教聖凡雲水倒卧横眠坐看龍天鬼神左出右没謝孔目舍縁作道士䟽刀不利筆不銛弗與蕭曹異道突不黔席不煖未應孔墨殊途欲託黄冠以干青眼蜕九衢之塵土已覺灰心兾一粒之刀圭重看換骨慧峰建僧堂䟽坐對聖僧折足牀無安著處卧看水牯支頭石有轉移時莫言一宿桑間不似三條椽下選佛青銅萬个驗在堂中賞音青眼雙明春生筆下湧金門外砌路䟽樓吞山翠賦踈影於横斜路遶墻隂詠甘棠于蔽芾積雨秋滛潢潦康莊日困輪蹄平髙就下可以扶顛厯塊過都咸資履坦等心持地布髪掩泥此段難能誰人笑領前者呼後者應時行時止於王畿朝而往暮而歸無黨無偏於周道下竺智仁求僧䟽拙直較遲禮部牒不期而至蹺踦務速福田衣得亦奚為與其僥倖圖成爭似囏難耐乆我作是説殊非誑嚇閭閻汝勿他求直下相逢特達炭頭䟽燒榾柮柴單丁何媿無賔主話萬象同參欲知槁木春回試待寒灰豆爆出爐黄獨旋收冷涕垂頥炙手朱門一任諸人進步請梅屏䟽姓名住持問此心有媿無媿口耳授受揣自已曾明未明直饒六反軒騰更俟四花紛委阿師領話老子忘言恭惟某人水可投針囊非藏頴不立文字孔方兄有絶交書深入山林張乖厓要捩鼻木是真精進豈錯承當水國秋髙難駐横空虎錫海山雲靜來登踞地猊床少慰同盟全提正令蘄州東禪幹鐘樓䟽禮獨山出世時求此二疏髙著簷楹為我横陳簨簴重開闌楯從它平接風烟試從複道危層直眺岑樓高處客愁千緒斷魂白叟洪撞何許一聲開眼黄粱未熟蘄州東禪幹僧堂䟽東禪乃盧祖傳衣之地墜腰石尚在此觀水觀山一飰之恩易報聽風聽雨三椽之地難圖終看凡馬空羣始對聖僧無媿丁寧北秀自今莫惹塵埃問訊木平誰道不勞斤斧西菩造五鳯樓挂鐘於西偏建藏于其下䟽辨才参寥受業寺自昔山川已屬兩公彈壓只今樓觀要看五鳯翺翔幻成京様規橅收復潜川氣象嵐昏翠掃烟歛霏開下容龍藏横陳上有華鯨待扣俗子摽于門外倚則麾之何人合住其中與之進也城東楊相橋再造并修五里塘仁和縣尉為首求䟽橋名楊相扣子産濟人之心事屬梅仙試相如題柱之手春至甘棠夾道秋來潢潦無根咫尺長安淹回半路欲展扶顛之力平步青雲要知架險之功横陳砥柱南翔遠老幹麥豆莊䟽南山荳稀又見歸田之作崆峒麥熟難忘憂國之心勿從有麵處提撕湏向未芽時薦取一鄽不受二者何先斷大千維摩詰神通還它願力盡大地王老師檀越歸我福田自在發生徒勞助長淨土移寺造觀堂䟽避溺于一溪雲外遷後盤庚求友于九品蓮中夢超清泰顧刼波之可畏舍樂國以焉歸作而象之誓将去矣惟心攝境就䋲墨之權輿聞性見前聽樹林之宣演智盧求僧見李知省䟽人惟求舊水必朝宗豈遂忘選僧未了之羞亦自負嫌佛不為之勇龍門無宿客懸知速化何難驪頷有𤣥珠勿謂弗求而得開夏講䟽師者人之模範厥任非輕學者世之津梁所繫至重徳先務學吾豈無師某人蠧簡潜心十年燈火白蘋滿櫂幾度風烟直須六萬餘言隻字三嚥然後五千餘巻殊途同歸㑹㸔名相俱忘始信虛空解講南薰入奏無絃不是無聲上士見幾為法元非為座普光教院山門檀越兩䟽杜氏香火芳池生葑笑陶靖節顰眉别甑炊香聽支離䟽攘臂佛法元非竒貨金湯可是虛文與君大方同歸為我一粲而已恭惟某人擅跨竈衝樓之雋掃同經異傳之譏欲觧背時之嘲一窮自判弗瘳稽古之癖此樂渠央黼黻新功筌蹄舊學如虎不用則䑕凡馬皆空入户闃其無人先師猶在射虎秋深飲羽方知是石嚢螢夜老披沙盡汰非金破讀從它全提自我恭惟某人鷙鳥之鶚大章者䕫曩事先師一仲父二仲父今皆北靣猶昔人非昔人直饒良遂總知正是𤣥沙未徹城南諸杜被尺五昭回之光天下三支奮九萬控摶之舉代人持盋買屋䟽地上錢流方掩鼻過崔烈句中眼活盍沽酒飲陶潜敢辭辛勤三十年有此廬安得突兀千萬間見此屋寸金寸土西子西湖各開竝水樓臺誰念滿城風雨一枝足矣歌歸來出無車數竹蕭然賦可使食無肉梨洲化主䟽諸方羅籠得住肯上梨洲一盤苜蓿無餘更分香積倘可儀刑七佛何妨教化衆生與其令逐客于陪堂錢則吾豈敢曷若登壠斷而罔市利于汝安乎我固丹心誰開青眼日者陳氏命子作道士䟽入王屋山無錢粥牒隠成都市信口談天顧豐財有道拙不如人雖異傳同經猶懐䑛犢相逢求售直欲圖成老子五千言誓忘筌於紙上令威一千歳期化鶴於遼東識破話頭何妨注脚諸山為李臨海昌宗保安眼疾於千眼大悲殿䟽禱爾神祗感通乆矣為民父母休戚以之惟杲日之行空掃昏花之無蒂借千眼司明之助罄乃先心筞三年治劇之勞俾其終恵伏願金箆刮膜增冏冏於雙瞳蓮掌舒光副拳拳之輿頌黄檗湛愛堂造房舍䟽大雄黄檗歸來滿船載月青山不改半榻眠雲玉川破屋難支金地髙風欲喪桑榆遲暮風雨飄搖古人之戒三宿無留君子之居一日必葺真箇蕭條四壁未免求人假饒突兀萬間莫非報德大雄寺白龍殿幹直廊䟽去年旱魃膠斷港之舟航傍寺蜿蜒霈隨車之雨澤涸轍見重甦之喜槁苗起九死之餘吏答恩私遺像有嚴于輪奐神非尸素妥靈無媿于隂晴欠回廊三十間盤飛磴一千尺宻雲不雨既孚京尹之求三日為霖敢後傅岩之助杜寺普光幹柴蕩疏足食足兵京兆曾稱武庫無柴無水家風渾似踈山鼔鐘自可忘憂樵采猶當軫慮欲㘽葑草直從白鳥明邊不礙釣船横截碧蘆深處豈獨烹飪以奉祭祀亦可樊圃以代垣墻何患日生便為歳計造鐘樓䟽鼎老請作振此洪撞百尺横陳壯麗舉斯重寄數尋直上青冥不曰才難孰云器小閻浮以聲為佛事必有因縁斧斤以時入山林可無梁棟財當配法福自開基普照寺修西方閣展殿軒䟽寶閣横陳樂哉如佛淨土刼灰屢掃巋然如魯靈光支大厦之將頹湏真才之起廢爰諏匠石以扣檀門自四十八萬至四十八錢滿法藏比丘之本願由千百億化接千百億衆式雁門伯仲之芳塵要見異時花内標題便是今日䟽中名氏超果無礙浴院幹前軒䟽無碍浴院前榮未舉脩梁叵量福基後効須還大施要爾同起濁土為渠辦取涼池尺土寸金千金易得一湯二水滴水難消雖無位次安排只貴寒温得所成佛子住行㸔妙觸宣明舞雩詠歸不在春風洙泗華亭證覺觀堂教院檀越山門兩䟽末流所至濁涇清渭何當分齊人所知管仲晏子而已矣渠方合耦而助吾欲同途殊歸有可平章毋忘推挽恭惟某淨覺梅花樹下十載掩關永和修竹寺邊一枝容膝自打諸天交道儘教諸子揶揄似不能言扣之則應九花開觀作興清泰宗風一步到家來問華亭船子相羣炙手陸梁井底奚為何補承家醉飽墦間未已自守臺衡計拙放教燕雀風髙真箇流通何妨冷落恭惟某寸田可稼丈室曾開負循循善誘之宜扣止止不譚之要柯橋水逆笑射羿之逢䝉谷水秋深豈鴆人之叔子買山且置擇地徒勞判一生硬兩脚根跨諸方出幾頭地延慶觀堂翻葢䟽直明生死欲空冀北之羣横絶娑婆大勝終南之逕惟此觀堂之設示人淨土之津一花題名五濁離垢矧刼火洞然而不壊恐梅霖霈霔而難支滲漏不除帡幪何託鴛鴦翼翼可無望於同盟之人荷芰酣酣結有縁于未歸之客陳寺修圓通閣䟽處處普門迷隔弱水三萬里巍巍重閣何必崑臺十二層是雖土木之成寧免隂霾之蠧蠧須再振成則中興豈敢擅千金獨創之榮要當致萬福攸同之助三熏海木式嚴檀施之家百囀宫鶯同入圓通之境淨慈冬節䟽兠率荔枝中老素三種毒灋昌橘子欠韋郎一夜霜驗人只這些児笑我知它幾許冬年觧結自非舍富從貧南北東西誰觧生心受施智門能老開堂䟽表海大邦杳杳蓬瀛有路住山本色明明刀斧無㾗陽春不是無聲霽月豈曾諧俗恭惟某人名晞盧老墨盆毳衲猶存脚跨智門荷葉蓮花便用先師意㫖未夢見在諸佛法印可得聞乎試露鋒鋩要知源委嵩呼祝帝八千歳以為春鵬舉摩天九萬里斯在下昭慶淨土池䟽載笙歌去門喧北宕之船聽樹林談花託西池之藕斷尋常之擾擾開丈六之巍巍即俗明真事則有成有立惟心自性人皆無欠無餘欲謝炎丘必尋涼甃由初願至四十八願佛不虛言捐一錢至百千萬錢君其樂施妙湛月岩中開堂䟽向來擊小彈偏掲單傳第一義譬夫尊王賤伯尚六藝黜百家永懐先物之難要見續弦之斷恭惟某人諸天響合羣衲影從明明百草頭邊㑹其有極落落九淵之下亦與之俱學妙屠龍機深陷虎偶虛蕙帳不須賦北山移休打葛藤佇㸔行摩詰令寄居䟽太虛無口誰翻四辯之瀾頑石何心自領重𤣥之㫖至若墻壁瓦礫洞然見聞覺知凡我簮纓式此龍象恭惟某人家有哲匠心㝠正傳㑹於聞處知歸肯向説中取辦務到不疑方酬半偈雖曾小試未稱全提雷欲驚春潮仍吼月非男女等相不須問境中人碎佛祖𤣥關便豁開頂門眼碧雲建藏䟽達摩耶藏要㸔八靣玲瓏娑竭龍宫未見層簷峭峙事竟成于有志珠固得於無心坐令海嶽旋時盡在機輪活處日暮碧雲合鉏雲耨種徳之田雨來修竹鳴題竹俟登龍之客正海爭徽廟道場不應作貢院遭别駕之暴使求僧以償其勞奉先帝在天之靈仗節死義惟空王入室之子荷法忘身珠中業影分明柱後恵文寛大燭不勝月嗟盆覆而不遭魚漏吞舟雖網踈而弗漏甚矣割支之慘徒斬春風懐哉圓頂之逢霈沾徳澤心老住道場疏叢林止黄葉之啼一䕫有托廊廟中青錢之選十目無私泥登埏埴之盤翼駕扶摇之御重増九鼎喜抃三山恭惟某從道場來成佛子住象皷聲前不死塗毒休撾泥洹震徹無聞知音猶在盡掃百廢方屬半提瞥轉一機何妨全璧西湖乗興有如雪堂居士留石塔師北磵揮毫大似太原上座勘石門句淨覺法師齋忌疏淨覺與其師四明法智辨論不合遂歸天竺慈雲懴主後人目之曰山外宗異傳同經等述一王之法家雞野䳱咸歸八法之書雖統有宗㑹有元始可流通必青於藍寒于水方堪付託受斤有質投針不疑毫釐少差腹背大敵金石𤣥中逸響筌蹄紙上陳言脱頴難藏當仁不遜智齊范橅則師減半徳技經肯綮則目無全牛仰事激揚俯從振厲以咒以詛敢辭旤出斯門載馳載驅未知鹿死誰手具位伏願山無外界勝幡樹十丈之紅水有四淵孤櫂反九池之碧下竺修造疏殿古雲深一㑹靈山面勢閣蜚天逈九花芳沼為隣此外皆椽差梠脱之餘於是乎雨震風凌之甚礎難勝任未聞澆柱之箴梁昧持危有待架虹之手行將壓矣坐眂惄然思剏建不曰惟艱顧因循尚安敢肆三檀應無住相兩磵不盡恩波矧王舍城乃古佛國春風著力齊吹入此門来梵刹重新何莫由斯道也拜郊臺天真院移普賢塑佛䟽玉象回顧在法界中古殿重脩出人意表鮮明如爛銀闕象設如七金山江月洗空不見塵囂之蹟樓鐘逓響時聞梵放之聲城南尺五雲霄花藏三千幢刹大功德海大富貴人只有皈依更無擬議生心受施敢貽居士之譏住相生天莫負如來之記小白花橋䟽雄跨中流玉局老仙曾度大書巍柱綉衣使者重來陋溱洧之乗輿快雲霄之得路比石如櫛擬芻尼銀浦之髙寒飛梁繞雲為儀鳳甘棠之伯仲此費實重小才罔功振百年皇祐之規橅増一曲蘋洲之壯麗㸔卧波之峭峙未雲何龍若遵路之坦夷其直如矢請亨老住報恩䟽睡虎眼開聽它搏噬孤鸞影動還自回旋是誠彰教兒孫孰掩丹山文采某冠冕萬指筌蹄百非等將淵奥根源付與緒餘土苴有口挂壁早嫌葛藤無心出山已成途轍來作鄽中佛事式慰同盟撥開度外塵機掃空邪説婁公瀆中興接待䟽古婁公瀆舊化城基藏雖八靣玲瓏缺殘衆相地乃千年常住縁募三檀畢命為期亟圖接續餘生未泯便欲圓成祇陀太子開給孤獨園刼刼為前佛後佛舍妙眼善女䖍修破損像世世生天王人王家試聽八九十老僧之言必享百二十長年之壽常熟道友焙經得舍利無數榜蠧不在魚在執紙上語者焙非待火待忘言外詮時本自清涼何曾熱惱珠回玉轉單聫複貫無遺霧濕嵐昏一暴十寒殊甚歸諸藏藏白不能説藏諸身身在則有餘第二義門恢五福聚佛法不怕爛却死灰不復然乎弗於鼻觀上聞經安能火焰裏説法墻壁有耳分明於此知歸舍利無根畢竟從何流出烏青鎮廣福火後修造榜炎炎三毒競起無明落落千間遂成烏有可惜千年常住適遭兩木相因罙壯罙明不激不發厄㑹驚喧兩鎮刼燒幾至三禪玉石俱焚鬼神弗赦掃殘瓦礫重布準䋲豈憚辛懃有此廬行㸔突兀見此屋工師得大木莫非佛刹重光太子布黄金便是法輪再轉長安明兄修造榜逃虛空時倐喜足音之響過長安市遙知日馭之髙弗超火宅炎丘誰識涼池芳甃殿古將仆閣今欲蜚懐哉一木難支偶爾四縁俱順幻出九花幢刹宏開百尺簷楹複道行空落日懸皷佛無髙下莊嚴萬徳皆同土有西南淨穢兩途相逺長玩壺中日月盡收刼外風烟更上一層不移寸歩髙閎大第母求住相生天林樹水禽等是無情説法南翔修造化糧榜鶴南翔去幾時華表重還錫北飛來指日祗園側布寺占蕭梁之地浦停博望之槎風嫋經幢蓮開品觀六萬字誦芬陁偈半千僧同梵音聲未策歳功先了日課開梵天之壽域為王者之福田佛放光明瞻之在前忽然在後法城峻峙壊者既妄䕶者亦空徒欲捕風還如繫影盡大地是王老師檀越庇託萬間取上方皆維摩詰神通香酬萬指虛空有盡一鉢長歌實際無私百堵皆作龍華寺火後修造榜雲蟾樓觀天開三㑹風烟水鳥樹林地接九花池沼錢氏五王舊徳皇家萬禩丕圖毳衲星居瀟灑半千之衆鑑堂塔在流通四十餘年司烜氏玉石俱焚古寺基乾坤獨露殿宇衆法次第重修嗟撞鐘伐皷之時欠展鉢開單之地要見百世楷模六種成就還它一堂冷澹千古分明大富貴人盡是王老師檀越小聲聞衆願觀維摩詰神通天道好還老胡有望侃都寺重開大慧語錄疏濤湧瀾翻尚想衡陽瘴靣雲開天霽式符江漢歸心撚指一十有七年信口八萬四千偈人天龍象在則人亡則書草木芝蘭出乎類㧞乎萃奎文寵錫海藏珍收雖非魯壁之藏甚于秦火之酷欲裒衆施盡與重刋掃古今螢爝之㣲還皎潔蟾蜍之照遺音猶在妙賞湏逢如金聲玉振無遺免邪説暴行又作祥後堂住天童疏東晉髙風想見蘭亭勝踐後人表刹遂成蓮社清游典刑懐古衣冠氣象壓今叢席與選掄者皆竒偉人某人峭峻全提淹囘半座雖云借路是亦明宗便當捷出横蜚未有長行不住佛法扶顛之際春秋責備之時水迷涇渭之分如何著眼烏藐雌雄之辨只合忘言莫論三種住持要見一門超出印老住天童州府山門諸山三疏有法付國王大臣金湯惟固無法付空王真子衣鉢親傳斯文欲並皇明王度敢忘隂翊某人身藏北斗口吸西江滕公三代後跨竈衝樓肯堂一着先摩頂放踵康莊失歩指陳自己珍竒死水觀瀾又屬它家風月與其輦轂曷若山林指碧巖石玲瓏達四聰于丹扆觀黄河水清淺導萬𣲖於銀潢右州府疏㑹佛法人何啻稻麻竹葦無隂陽地不闗水旱豐㓙幾箇知歸其誰踏著某人浮華消盡真實獨存一㸃無私十年超廢春去桃花片片綠繞庭除夜開月觀沈沈翠磨星漢孰謂平常是道安知坐死平常自憐計較俱非不觧巧生計較出乎其類少慰同盟豈無它人願觀盛作右諸山疏名徹前朝得松巖之奎畫道叅中貴服稻畛之金襴道人分上安用多般明眼人前不直一笑某人勑住天竺勑歸天童靜退于演遁菴機尤峭峻遭逢如清道者寵更光華欓谷成隂睦州擔板佛燈珣後佛燈印又聨芳事法界中事法門當再振右山門疏修造疏住處不支嗟前修之尸素傍觀者哂見後進之因循適當承乏之秋妄冀中興之業門庭大敞囊槖無留想翼翼之修廊悲涼故老眷沈沈之古殿懐仰空王闕典猶多成功尚逺需側布黄金之手於豁開青眼之時意在鈎頭春生筆下蘇公堤南屏寺修造疏臻公寺老門掩斜陽西子湖春堤横緑水楊栁芙蓉富貴栴檀薝蔔凄涼屋既摧頹僧尤寂寞因陋何妨就簡惟新豈易圖成瓴甋再翻帡幪可冀柱石重振棟梁欲堅大福徳人修大福徳人受用明因果者壽明因果者承當此話纔行施心便廣四衆塔疏湘南潭北層落落影團團天上人間峭巍巍孤逈逈雖示兩雄分座何如四衆同歸一路湼槃千年矩範腐胾朽骼有菴中不死人華屋朱門賞絃外無聲意留十方常住之地駐一原不老之春壽君壽親利彼利此西谿接待建華嚴閣疏天上雲開兠率靡不涵容門前路透長安可無接待庫院修廊未建廣堂傑閣方營不知法界無邊豈信雲霄有路朝往西天莫歸東土何日到家南詢諸友北謁文殊一生成佛盡是華嚴富貴孰非藏海莊嚴法法圓成人人具足東陽雙魚接待疏騷人著語好風千里吹來劉禹錫在京師作詩來山鬼挑燈清曉一時逃匿天巧無從自獻地靈遇物斯彰起乾没之峭巍如蠖信平聲之雋傑佛宫儒舘鐘鼓絃歌試看止息化城孰若詠歸沂水創物惟智聚人曰財堂扁生秋掃大暑去酷吏山有飛瀑如白雪停隂岡絶唱雖髙同聲必應延慶修造未辦疏四明道場蕩而復振一乘法味流而不窮自寸椽尺瓦重新幻傑閣崇樓如舊菴虧藏六義欠函三缺典猶多全功未既上方有世界化菩薩無路摶香厥土惟塗泥東海若隨潮退舍先資糧次加行始一簣終成山扣富貴人㸔鄉里靣致道觀副觀化朝真法服疏明信在躬沼沚蘋蘩可薦蓬心飾外文章黼黻奚為欲振殊儀先崇内照不脱走塵之屣難覲寥陽未更漬汗之裳敢延真馭必辦盛服其如空囊只有求人别無出著含風疊雪輟侯家舊賜之餘垂佩采香昌桂窟巍攀之報吳江聖壽脩造疏三江既入松江如畫圖中萬壽無疆聖壽絶囂塵外起於石晉側布金園刼灰再掃無遺天道好還可俟堂無周屋欠翼翼之鴛蜚鐘未上樓噎鋐鋐之鯨吼其它罅漏以次補苴善人樂捐有餘君子自求多福人惟尋舊事不避難祝大哉堯南極春秋翊壯哉縣太丘風化華亭普照置柴蕩浴疏鼎容百斛注不竭之滄浪衆浴千僧盡將來之垢濁未建瓴于温室已脱體於汗膚楚言刈于錯薪賈特髙于丹桂獨無樵疃㑹有檀家直從芳草連天逺至平蕪盡處壽拓八荒之域妙觸宣明福開萬頃之田諸塵清淨證覺買地建延壽堂疏剏十方為老病老病未安厥居歌一鉢飽蕨薇蕨薇未實其腹旋欲經營餘地永為種植良圖顧朝虀莫鹽之缺如恨尺土寸金之難致革東鄉笙簫之地掃去腥膻騰西方菡蓞之芳同歸清淨梅里勝法起三門修造疏皇皇四達春風吹散天香翼翼層簷夜月隨行道影梅里一方勝刹檀林四衆禪栖風雨飄摇梁柱頽圮欲振尊卑次序别開壯觀門庭如正人心以致其敬凡淒涼之老屋擬輪奐于新規淮海貴人既受靈山之囑枌榆野衲遂扶小刹之顛崇徳普寧接待疏官塘暑晝暍思待扇之人水驛雪時寒軫欲囘之櫂不斷商胡衮衮方來雲錫憧憧熱須潄滌清泠息免淹回叢雜菴宜竝路亭可臨津開千年鐘梵家作九夏茶荈供渇者易為飲涼于滴滴醍醐逋者不忘歸笑彼區區逆旅不勞三宿擬報一時昔賢有志酬恩今日其誰負徳慧日僧堂疏摧頽老屋何以安單欹側櫺窻若為掛鉢一木巍撑不得千金改作猶難要見一堂冷澹千古分明還它百世規橅六種殊勝載觀出著只合求人豈無王常侍與臨濟同遊亦有張無盡為永安撰記彰教法堂上梁文法道隆替存乎其人土木壊咸繫之于類顧行藏之由是在營建以何如細為桷大為杗取其長而已矣斤者斵刀者削審厥技而庸之庶逃盡力之訶抑免弃才之謬北磵老子錐也無卓盋猶可歌信開百福之田壽拓八荒之域不求侈靡以取譏嘲人其人廬其廬哂愈之强為辯也爾為爾我為我於恵也初何傷乎願聞堂下之言以悟雪中之立劍須髙挂慰徐君九地之知梁欲横飛相匠氏一時之巧缺兒郎偉抛梁東疎雲薄霧鎻空濛霜鐘􅒱月回僧定人在烟蘿第幾重抛梁南稚松孫竹間楩楠沾沐九天新雨露參差濃翠影交參抛梁西雲從黄鶴度雙谿千載子安呼不起來依蕙帳隠淪栖抛梁北北阜深雲鉏不得長刀短笠斬荆蓁留取梅花伴薝蔔抛梁上雪巻水晶雲母幌自是丁山壓衆峰一泉一石皆宏放抛梁下泓碧濺濺生石鏬張公名字至今存清清不改消炎夏缺上梁之後伏願人安里社米熟家田恢釋梵而鼓行贊唐虞而隂翊衣傳止六代已分北秀南能我獨有二天得依龔遂黄覇大梅䕶聖僧堂上梁文絶頂有天宛與壺中不别深居無説誤從紙上虛傳衆含薝蔔之芬衣倣芰荷之制榮公長老來踞此座不負大梅住山無刀斧㾗談𤣥有虛空口斵輪自若血指紛然掄材而為棟梁挂椽以庇風雨一堂冷澹道南𣲖别清流千尺婆娑濟北涼生大樹賀厦燕雀展單象龍彈指翬飛何必指將軍之廪聽渠豆爆不須然内史之灰欲相脩梁爰歌善頌缺兒郎偉抛梁東曈曈海日上空濛晴巻烟霏横獨秀光摇寒碧沕羣龍山有潭湫極霛抛梁南俯瞰諸峯鎖翠嵐秋攪千林吹桂子影高羣木綻優曇抛梁西一牛鳴地兩招提山噎曉聲鐘斷續烟消晩翠玉參差抛梁北風滿天香浮毳裓佳士能來似有期俗駕自囘安用勒抛梁上鳴鶴在隂飛逸響畫簷低與暮雲平覩史夜摩無此様抛梁下整整斜斜排萬瓦要知身是太平僧善頌不妨歌至化缺上梁之後伏願雲歸雙嶺門掩孤岑松花有餘聽松風此山老梅子當熟問梅仙何日歸捲百衲于三椽選一麟于衆角育王姚氏子裹飰奉母主僧宗印墟其廬利州定裒金新之上梁文仇餉既讎貪殘自斃嗟來可食禮義誰明某愚魯有餘困窮無告執䏑可曾知味頡羮妄冀封矦變從顔子墨埃旤逮杜陵茆屋墮卵覆巢之酷震駭鄰人牽衣頓足之哀怨咨行旅青山不老感桑麻燕雀生成黄粟難賖嗟兄弟妻子離散眼空環堵心折分羮經之營之不日成之衆擎易舉至矣盡矣不可加矣此恨難平方自貽草創之羞笑渠墮茍安之計先事後食從今忍渇于盜泉傑閣重樓自古閲人如傳舍缺兒郎偉抛梁東剪剪茒茨枕鄮峰卧燕歸來尋古壘飰牛歌罷撫長松抛梁南一眼平蕪接大涵霧雨漲空無處覓曉來依舊色如藍抛梁西家家茒舍擁疎籬淺深野草空縁砌寂寞閒花自滿枝抛梁北松奮老髯空翠滴不隨桃李嫁春風可自春風無氣力抛梁上咫尺浮圖涵萬象為問劉郎安在哉一聲清磬深雲響抛梁下小小數椽如大厦為誰革故為誰新山中千古成佳話缺上梁之後伏願春囘玉帳光透金壜駈虎豹于山林致鳳麟于郊藪洛陽都葢正須綾襖横陳寒士俱歡不管吾廬獨破華亭楊木浦朱寺法堂上梁文楊木隂隂人在輞川圖上浦雲冉冉僧歸清泰城中發露天藏幻成雲構檀越某人孤韻絶俗半生如僧願輪拂盡銖衣結習洗空紈袴只勞精舍不築莵裘豁開重閣大講堂招延三觀法檀度聽經之浮圖是中湧出隨身之宫殿何許飛來刀斧無㾗林泉增氣蕙帳空兮夜鶴怨賞機雲二仲之音潦水盡而寒潭清印持逺千江之月一堂冷澹萬象證明潮聲雜善頌洋洋行㸔賀厦劍氣與遙穹蕩蕩盡屬鈎簾華觀欲成修梁爰舉缺兒郎偉抛梁東江流萬折繞吳松長憶法華新道者㝠㝠千仭没孤鴻抛梁南南翔老逺是同龕此堂後夜有明月更復與誰相對譚新道者乃開基之人死矣南翔逺勸請造寺抛梁西隂隂翠樾鎖烟霏風急蜃樓髙突兀烟消鴛瓦碧參差抛梁北莊嚴面面皆殊特若非胸次有規模此段風光總乾没抛梁上雲垂平野開屏障諸天無路花不飛梵放有聲山答響抛梁下桃李無言時自化衆角雖多貴一麟驥子驕騰空萬馬缺上梁之後伏願歩武龍象筌蹄兎魚白石㸃頭黄金布地梅熟許同朱老吃覺林泉四事之饒山髙豈礙白雲飛㸔賔主一時之盛碧雲藏殿上梁文殿舍藏藏庋經擬海伯宫之輪奐樞發機機運軸尋山檮樹之根源曩聞十二部所詮指歸遂得八十巻重𤣥嗅出記所見者作而象之以境攝心與人為善北磵豩叟貧也非病剛而用柔浚眢井而罔功墾廢畦而弗穫寸才如玉斵小貽工師之羞尺堵畫宫用大笑夫子之拙所住之刹斗大所臻之雲鼎來茹苦分甘共作同息幻成四朶跨出叢霄月車日馭東湧西沉牛鬼蛇神左出右没哂乃閣蜚樓逈燕雀風髙眷兹地轉天旋鵾鵬路濶三轉法輪如舊萬年玉厯惟新舉爾修梁聽吾善頌缺兒郎偉抛梁東碧雲峯對紫雲峰冉冉碧雲歌日暮紫雲峰下聽疎鐘抛梁南種杉僧老雪毶毶却憶閩山生處樂驚猨空守緑蘿龕抛梁西淹田秋稼與雲齊未必侏儒皆飽死只令臣朔一人饑抛梁北平地獨山無草木山名天生墝确不中樵如何容得牛羊牧抛梁上雲際何年埋石像舉頭雲歛建招提祗陁太子金園様抛梁下禁韎侏離隨俗化自是陽春調絶攀可但只今人和寡缺上梁之後伏願帶經成俗佩犢變風鶺鴒在原視弟有愛兄之道虎豹逺跡耻人懐食子之心繄崇佛乘隂翊王度式全父愛陋袁彦道之呼盧庶答母慈嘉潁封人之錫類下天竺造僧堂上梁文靈隠前天竺後三千刹外風烟西湖上畫圖中尺五天邉雨露旁開仁壽幻出莊嚴性具為宗法門有議兩雄孰先孰後聽法華經二瓠載沉載浮寓東海若住山某人行輪碾霧戒香逆風萬指影從四花雨集追惟故事半座穆如清風來歸舊山一㑹儼然靈鷲既滿户外之屨頗隘堂中之單欲旃檀薝蔔成林以枯木留香為式旁捜柱石出深山大澤之耆髦聊布準繩付盡堊斵輪之妙宻缺抛梁東一川風物在壺中砌下水明深湛染樹頭雲濕小玲瓏抛梁南上中下竺寺分三四山如畫開屏翠中有青青小蔚藍抛梁西山髙孤塔與雲齊層層落落琉璃殿咫尺叢霄路可梯抛梁北一奩寒碧瀦明玉放開三板雪虹飛疑是飛亷翻地軸抛梁上覩史夜摩無此様萬竅無風籟寂虛隠隠薄雲聞梵放抛梁下隂隂壽木藤蘿挂近寺時聞鐘磬聲莫隨風雨飛遙夜缺上梁之後伏願一单如倚岡陵百禄長于箕翼崇功報徳嘯月眠雲得覺道成同結内官之社使聖人壽祝如華封之人丘運使後堂上梁文昌黎獨歩辛勤三十年有此廬浣花何時突兀千萬間見此屋曷若本支餘慶共承先緒幽光整頓丘園團欒長幼某官心涵江月髩老淮雲三徑就荒夢想歸來之詠四郊多壘敢忘蜚輓之勞揀盡寒枝莫如喬木龜筮叶吉祖宗妥靈凡曰同盟之人共存諸父之國安昌未老尚堪弟子趍隅太傅欲歸又見君王前席缺抛梁東梓匠輪輿欲奏功故侯新築生和氣稚耄喧呼賀燕同抛梁南湖光雲影兩相參六月涼生清晝永荷花落日正紅酣抛梁西門開深窈止輪蹄古籐細栁成行列時有子規來上啼抛梁北催詩急雨油雲黑璧碎珠零在筆端四座喧譁翻醉墨抛梁上鸞尾掃除雲物障八靣玲瓏一鏡中主人胷次同昭曠抛梁下莫論少室山人價百家姓裡聖人名無道桓文之事者缺伏願上梁之後紅塵擾擾明月朣朣始知弓未嘗亡益信珠元不去舊巢燕子喜歸從百姓家初日寒烏弗湏占丈人屋慧日僧堂上梁文門如市心如水喧寂惟人山有玉淵有珠秀整超俗此大蘭若如小祗園自跨虎野哉僧來相攸壯哉縣一堂欹側十載經營今兹策勛老當袖手北磵老子閲世欲槁與雲俱遲絶憐買沃洲山大似捷終南徑究此生無生學畢命為期絶諸方孔方交于吾何有至若土木興建與夫金碧莊嚴力非不能智弗可强誦永安僧堂記為平生座右銘咨爾後人遵予明訓式陳善頌以相修梁缺兒郎偉抛梁東扶桑初日上蘢葱霞明髙下叢霄碧光透東西兩鏡紅抛梁南童子南詢五十三一從去後無消息懶聽行人説徧叅抛梁西水通清泰九花池宗雷靜社人心别告戒丁寧不變移抛梁北舊井依稀言子宅千古弦歌在武城鄉邑至今為軌格抛梁上太平無象天垂象捷書夜報甘泉宫江東諸葛猶宏放抛梁下閣扁景言誰並駕小戴經從大戴傳不察不苛民自化缺上梁之後伏願利兼百衲徳懋四檀食于斯息于斯勿云當得迷于是悟于是切莫它求如是則廣居正位汝尚堪任不然則夙負昔因人誰與代謝州府啟多種藕花邀淵明飲肅瞻卿月與阿戎談良既友于白眉很失防於傲象清分涇濁蕕雜蘭薫蓬未直于麻中枳已蕃于江北罔遵粗有𤓰葛之訓勇證攘羊不識抛示鶺鴒之書動輙紾臂是至親者况他人哉生知本地之風死媿延陵之鬼勸之或不足道沮之亦奚以為樞得環中環去樞轉車在門外門開車亡假為深夜之談真成正晝之攫私𠂻盎面公服趍堦鏡虛而妍醜分勢迫而情偽見本心自喪昧江有氾之遇勞家醜外揚謂墻有茨之可掃謬將槁木死灰之士誣以曉風殘月之嘲自貽帷簿之羞甘出閭閻之下兹葢伏遇某官雲開月霽水止沙明照姦無毫髪之遺律貪有氷霜之厲民躋袵席視前日為何如雲冷狴牢嗟鄉來未始見昭用儒之速効盡得士之歡心至於山林采若葑菲某日老一日時非曩時抱湘瑟倚齊門則已死矣聴先生歌梁甫尚復悠然冀長在春風和氣中當不啻錦里烟塵外知雖有素託千指之帡幪恵豈無終安一枝之風雨北磵集巻九
