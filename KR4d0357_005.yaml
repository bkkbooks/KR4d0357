body:
  text: 北澗集卷五宋釋居簡撰喜華嚴傳釋善喜震澤沈氏子字無愠頤菴其號年十五白父母曰願聽我出家家去蠡澤應天寺一牛鳴地素崇佛莫奪其志十六受度以有明為受業師法真師㑹則禀嗣師訖戒品飄然振超方之錫時法真駕圓頓之㫖於三吳負大機器之士憧憧自逺惟恐後公以妙年方軌老成雋秀染指法味窮日夜之力旁剔遐搜疑必問難必通纖毫不礙膺乃已日用疏鈔研墨外無長大布不華一飯不背衆不過午五講大經楞嚴圓覺則十數遍撮八十一卷之要則述法界觀搜英記序臺說圖合三卷以發其奧指圓覺類雜花而言約則述㑹不㑹篇續教章復古記三卷以統其離金剛辨非注金剛纂要記同教問答合五卷則以定五教之分齊破㑹三歸一破三宗說蘭盆辨正闕評連珠合五卷則以一異宗之紛紜皆法真師晚年所欲為而噬臍於鐘鳴漏盡應緣之地則平江之寶幢閲十四載嘉興常樂三年臨安南山慧因十一年皆西浙勝處故得益者衆皆斬斬有所立壽七十八臘六十二嘉泰四年正月初二無疾而蛻於慧因方丈留十日闍維舌不壞骨石舍利入香嚴寺衆塔遵遺戒也贊曰五竺特葬大浮圖尊法也大法漸醨此土妄一衲子忝厥生巧飾其亡悉力假援鑿幽邃擅形勝以掩其朽骼腐胾神隂陽家荒唐謬悠妄冀夫所不當得欲利其後可哀也已公之所成就雖扳竺西大浮圖何歉焉而決定明訓廪然在兹於戲賢哉菩提簡宗師傳戒定慧三學必先戒越戒而學定慧邪說也菩提宗師師簡由戒而求定慧遂昌厥毗尼字仲廉號止堂嚴之建德任氏子少好讀書少長學舉子業暇日遊景德寺聞應堂惟定講蘭盆經若有所感遂超俗於杭之法顯寺事景瑫為比邱受具畢即往不空學於法海師一鉢亭午終日淡如非勝已不友非衆法不出本宗文字沉潛反覆雖前輩未發之藴必了了乃已一時宗匠盛稱賞普救寺首座元印師號精律學諸師畏敬解后相遇以資持㑹正同異卒然相詰難隨語剖析不少竚思聞者悅服後見宗芬宗晏於永嘉芬器之留三年至是總别持犯雙單止作之疑無復礙膺已而歸杭依論宗大法主智曇師學唯識百法華嚴台衡則次第與其宗之翹楚者抑揚商略無相宗印師稔其籍甚虛第一座以俟出世於演法寺其次不空兩記並行取舍適中臨壇巋然有南山家法晚居菩提九年而寂嘉定元年十二月十二日也度弟子紹聞行依孫曰文秀得其傳而潛符密證者梵威首選垂寂之頃謂行依曰平生苦心以律自嚴不空了然師知之深舍是莫可囑身後言既而逝端莊如生壽七十一臘四十七龕留一七日而闍維骨石舍利歸普同塔贊曰經律論三一戒定慧昧夫擊小彈偏以頓歸漸者罔不流於諍論簡以律部自任而博約諸宗之所同異故其成就者如此無名子傳無名人與造物游於蓼水之上生無名子商周時應采詩之求不知其幾世鄭衛淫戰國雅頌不作采詩官廢㑹摩騰竺法蘭西來與烏有生歸焉或曰子名且不有實將安在烏有生病焉子曰象教中微人心潛怠主文譎諫上則二雅旁法九歌下雜謡言託吾虛名駕其說而正其失謂余無名妄也無實妄也汝病之吾辨之亦妄也生踊躍曰然則子罔象之流亞與子怫然而作曰罔象生罔兩厥類惟錯冒吾法為竒貨飾佞壬廣厥類愚無識知卒莫逃君子之誅汝何從比余於罔象乎雖子異姓而特蕃衍散諸四方挺挺有祖風烈隱德不耀可無傳焉北澗曰無名子與烏有生名實之辨辨矣名且無烏乎實所以諷者微而婉又何俟借風雅託名氏然後為得哉兩窮傳朴翁銛文頴惡凡子如仇反譏余涇渭太分則語之曰方將以是告子則把手一笑而忘其病此反以告人也他日婆娑冷泉鵙舌嘲哳譁而侮之遂過天竺逮還故棲天竺之人依依有去思以儷語為謝其略曰獲依虎臥之浮圖政類鶴鳴於華表閒吟古句青山豈礙白雲飛却憶先師老步只堪平地去屬余賦解嘲所謂不能助桀遄至吠堯一窺豹斑五窮鼠技含怒蓄怨於彼其久也覆巢墮卵於吾何有哉嘉定甲子冬尸玉几者祖冷泉故智將不利於我正論橫制厥類妥尾朴翁述其事寓狸不執鼠寄四明地主李雍之云堪笑主人偏愛惜容他籠裏咬鸚哥則又囑余曰兩窮併述為佳傳留與叢林作笑談昔老坡南遷遇歐晦夫於合浦誦梅都官贈詩云吾家無梧桐安得久留鳳坡亦自誦送老泉云歲月不知老家有雛鳳凰謂歐曰梅二丈目為鳳者例窮如此嘻鸚鵡也窮且爾矧為鳳尚何加焉北澗曰小人道長莫如六宗六宗不除禍天下後世何時而已哉東西壤斷不啻十萬里風殊俗異小人滋蔓而難圖若合符節彼蒼者天盍亦殄此羣醜庶乎畏天之威于時保之重刻永明壽禪師物外集序能使所居山大於天下鼎望禪苑永明與達觀盧公之於雪竇也空寂藴奧公尤為先知出人間世為龍象任祖宗九鼎之寄宜矣開禧初余登㑹稽探禹穴陟華頂度石橋窺曇猷逸蹟雁宕攬勝訪客兒蠟屐揚帆處回乳竇觀千丈飛雪住山石橋宣無言與余登中峰公昔著書地老頭陀出公肖象碧眸廣顙氣廪廪如生屬宣整飾書余贊其上曰客吟燈殘猿啼月落衲被蒙頭千巖萬壑起破凡夫為等覺妙覺齊大小乘於錢索井索縱大辨於談笑寄虛懷於冥漠所謂百軸宗鏡之文如太山之一毫芒巍巍堂堂煒煒煌煌非心亦非佛破鏡不重光兹又得此集附益於毫芒然則公非用力於騷雅者亦不在多少間獨喜某人講明舊話重刻以壽古宿為書於僧統寧公序後仁王護國般若疏後序仁王護國般若疏天台之極言言心聲也天台之心在焉循聲而得心忘心而得法庶乎小酬百囏顯晦淪於遐陬海隅復歸中州也見而不誦誦而不通通而不說說而擇授均得罪於此書嵩山朝騎尉序之為詳北澗申之為約雖涓塵增溟嶽不在乎多少間其於宏贊弗以異學二乎中則同出一轍嘉禾古石蘭若傳教行彬重刋以永其壽為書之注心經序蕩相明宗者大般若經之極致而司南沉空滯寂也凡六百卷卷凡幾偈偈無量故字亦無量字無量故義則叵量如是展轉各無量數欲彰其目必提其綱欲窮其量必執其度不則塵沙要奧廣大𤣥閟雖巧歷莫能悉數心經之譯二百六十字茍得其要如上所陳若指諸掌推而廣之不知六百卷浩乎其博也斂而藏之不知二百六十字藐然其約也提綱執度舍是而無所準的也然則此經般若之靈扄也心之所之法之所由也心之所止法之所歸也天地之大萬物之富一稊在庾也若夫不知復不足以見天地之心隘此心不足以語此經之方迷此經不足以知此心之妙即一而三即三而一三智大觀於是乎在孤山造疏數千言揭此經大明淨覺則肅徒振旅全師而攻之百年宗徒未卜孰詣宗印師作哂乃末流無所適正異其所異而同其所同將締其言而一之賫志而死元粹嗣其志旁羅契經冥搜𤣥文參諸往哲斷以已意句析章分㑹殊而同理貫義條反違而從孤山之說必明淨覺之難必通夫今而後自本然衆相見無相空即蕩然大空識真空相因指得月得月忘指月與指俱忘也不忘者忘乎哉集注圓覺經序覺而不圓者有矣夫未有覺而不圓者也圓而不覺者有矣夫未有圓而不覺者也昭昭日用之間而不知也一性圓具不知故不覺也性之所具曰圓圓也者凡愚不虧聖神不盈自本自根與生俱生圓同太虛而無缺餘太虛同受而與之俱良由習與性離情與智違背大明即大暗悠悠長暝不了此覺縱復亦了覺而不圓惟其不圓其證亦爾遂有修證之目為三根利鈍所以别也所修者何修此者也所證者何證此者也所修不同所證則一也故曰一切衆生皆證圓覺非覺之以妙覺則止於其所覺非圓之以至圓則止於其所圓自四十一地以前皆止於其所止而不知夫所由止不修何以達其證不證何以明其修亡證而亡修而妄冀夫所謂圓覺者是今日適越而北轅也修而後能證證而後能忘則十二大士未始有聞也十萬大衆未始有聞也六塵不濯而清淨四病不藥而瘳也靜幻寂非一而非三單復圓無前無後也如是乃至圓裹三世清淨平等皆光明藏也圭峰發明此經造疏教萬言反約於廣博浩繁之中略為别本由唐至今廣略並行西南學徒家有其書江淮荆蠻稍若不競天台再造於五季亂離之際鼓行吳越間作者輩出嶄然見頭角由是二家之言肝膽楚越彼所宗尚我得排斥我所宣演彼得指議異已之卓識與共環堵必羣咻之務其說之不售同已之固陋逺在萬里必羣嗾之欲其喙之必信使二家之道不淪於必爭之口者幾希古雲元粹師所以憤悱慨慷集注此經而示其同也以本宗之義發他宗之言以他宗之奧揭本宗之𤣥本諸其理不本諸其宗參諸其心不參諸其人黨非其同伐非其異平持其衡婉立其言俾滯於一曲者知夫師子手足一金也江河淮濟一水也毋求異於圭峰亦毋以求同也異其所異而同其所同非一人之私所能也送張少良序文章不學而能乎曰唐栁子厚始以童子有竒名李長吉七歲長短之制動京師今也有諸曰括蒼張少良十五六時從父學稼方春耕破霧漫不分畦畛輟耕而歌曰似雨元非雨如雲不是雲翻疑天與地渾沌未曾分鄉先生常祕丞建聞而竒之內諸孰已而置諸庠今為名諸生富春秋將偉其衣冠嘉定二年春相遇於丹丘巾峰之陽朴茂沉默直亮簡正鄉不遇常亦豈遂自棄於耕稼之伍吾不佳張之遇常而佳其不忘常又不佳常之得張而佳其始卒於張異夫相驕相諂彌縫為市道也逺矣其去也書以識相遇之歲月以為贈送一上人持鉢序平地登雲南北一舍强半梨洲瞰杖錫為平野逺如之峻陟則倍蓰在昔單丁今有衆一踵門而言曰育王太白衲子古洙泗比以萬錢汰舊學萬錢何從得哉梨洲門不暇􅖏有來轍容我則持鉢出山高原使來相勞苦余聞而笑曰梨洲失之矣歲荐饑妄一夫據把茆足以傲睨髙蹈以振其賈鼎望且學其為梨洲胡不為與雖然我知之矣智海云僧者佛祖所自出拒僧拒佛祖也芙蓉則曰可粥則粥可飯則飯若去與留在彼而不在此高原之心有是夫一曰然然則不可以不書以振梨洲學古之志云清白堂叙歲荐饑所至散席靈隱印萬指厭餘而百堵皆作忽中飛語㑹稽之籍毫析厘剖無參差宫講大監劉公靖之曰請自今以清白稱播于聲詩和者不約而同噫魏文示樂羊滿篋謗書燕惠遣騎劫代樂毅士無賢不肖入朝見嫉山林奚為哉是諸君子昌之以言隱然有不得其平者書之為清白堂倡酬叙送夢書記序詩人于君實問豫識天台夢乎豫曰天台舊遊夢想常在于曰吾問夢書記豫曰書記今備數非夢也于怫然而作曰浮圖曰夢掌天台宗徒之記子何愚甚蔽甚耶則應之曰吾非不曉子問也古無書記自積翠老南領徒行腳叢林稱之後世嗣其遺響僅得積翠之一體餘則百步半百也吾冒其名屢矣未嘗不惴惴自憐也吾車覆矣蹈吾轍者翹楚乎容止誇大乎語言行行若出積翠上不待兩端則黔之驢人以其不足道而去之猶喋喋不已使同類謂彼不已若故去故謬以應孰謂子攻我至此極也豈毋望於洗空凡羣張吾軍哉于曰審若子言豈特此已儒吾之宗釋汝之氏仁義本根禪教源委彼以其真我以其僞姑且置之萬事勿理夢則固異乎如此尊師友識禮義孜孜問學進而未己他日與夢語乃以于言為是私自謂入亞夫之營視棘門灞上如兒戲爾因語之曰鄉所望於空羣者子其勉之夢起避席頓首曰唯送上天竺月光逺歸四明序四而喜三而怒衆狙也加之以非常之寵而不喜臨之以無故之辱而不怒斯人耳吾於月之東還也以是二者酌其淺深則曰曩來自東今還自西造化也昔當其舒今當其慘喜怒何與中山之拔謗書已盈篋其子可信方織而投杼事久論定真毁譽者出甚矣才為妬媒能為忌囮彼以我為才能不奪不饜媒囮是徇若幸顧我何戚乎容是豈知我浩乎中也則謂之曰我將駐若之轍於兩竺間俾志衡台問竒字刁刀魚魯毋母肓盲相承月曰噫勿崇吾咎含沙搖毒中而未已虛舟飄瓦悠然不知彼有畢弋又倚城社萋兮貝錦以成文章詩人嫉之投畀豺虎豺虎不食其嫉彌甚造化寬假以華其歸城南吾廬有琴有書自艾自懲自卷自舒飛光須臾高山蒼蒼流水湯湯以遺其音以思古人以獲我心送高九萬菊澗游吳門序少陵得三百篇之㫖歸鼓吹漢魏六朝之作遂集大成離騷大雅鏗然盈耳晚唐聲益宏和益衆復還正始厥後為之彈壓未見氣力宏厚如此駸駸末流著工夫於風烟草木爭妍取竒自負能事盡矣所謂厚人倫美教化移風俗果安在哉山隂菊澗高九萬得句法於雪巢林景思於後山為第五世嘗出唐律數十篇活法天機往往擅時名者並驅爭先加以數年沉潛反復樹離騷大雅之根長漢魏六朝之幹發少陵徑正之柯垂晚唐婆娑之隂擷百氏餘芳成溜雨四十圍俾困頓於風烟草木者息隂休影方有事於吳門吳號多士趙靜齊子野盧蒲江申之柄此能事苐往必以吾言為然頑石序欲叢林復古必綜核名實名實正而叢林不振則正因可毁大乘可焚修飭諸其內而略諸其外抱道懷義特立不撓譽不喜毁不怒不曰有常不曰君子實將焉處將有人焉肅威儀懷佞壬正辭氣事容悅不曰鄉原不曰穿窬實將焉居故君子務實實振名名不振實也審矣咨爾頑石是警是戒庶乎粹藴奮乎頑質實而若虛也實若虛此余所無愧也送四明賜越州源圭往華亭序若知驪龍之頷有明月夜光也夫非逶迤曲折巧運其智極九淵之下與之相周旋終莫得所欲不然虀粉之不暇敢妄冀徑寸哉寐而得之非得也道非九淵之下甚邇而不逺非驪龍之頷甚易而不難茍無其方則逺近難易或相千萬二三子來自東也東州師友尋訪殆盡復將問津於華亭是行也須其寤而探焉字三子序開禧丙寅仲春既望豫自鄮還西湖解后二三子於冷泉之上扣其所從來乃知其為天台者也幾月而後去其去也請更字于豫豫曰字所以代名師友命之爾更之背師友非是茍循子又安知他日不復更於他人而反吾言耶三子相視而笑曰子何見之晚也天下之所同者理也理之所在則終身踐之茍未至必至而後已子烏乎辭遂命圭曰瑩中俾鑒諸內而略諸其外命源曰叔進俾不舍晝夜而朝宗于海命賜曰無言孔子曰賜也不幸言而中是使賜之多言也賜也於是觀焉圭也源也舍是而無所繩準三子有得焉則豫不幸言而中也言而中是使豫之多言也送陳原父詩序壬申季秋永嘉陳原父侍仲氏解四明定海少府之組借榻於北澗數月束書外無長物蕭然如僧奮然有志當世日與此邦之彥遊歸輒三鼓余未嘗不遲其歸原父歸亦未嘗不至豫臥內言是日所與游與所為所見而後寢自首及末風雨不渝且未嘗見其評論人議已者不問豫游四方得見有常者蓋寡若原父非有常者耶男兒有志事竟成非有志者耶其往也素齊領客載酒賦詩餞之於江滸盧氏小圃豫亦賦諸公訝余獨醒以序代罰送柴生謁東嘉吕守序慶元丙辰豫在鷲之小嶺有偉衣冠來謁者曰我漢太尉棘蒲侯裔也越明年復見於鄮山欲緇其衣求益於余余顧何有哉去年秋七月用岑太華悼佛智大士故事作詩弔余不以示他人而輒見投憐其暗投也則幡然竟去謁宜獨將因宜獨以見吕東嘉是舉也適足以濟前日求益暗投於余之兩失也既得所依歸而不志所求吾恐其失倍於前既無以昌其行又無以濟其需命之曰子之謁東嘉郡侯侯固好義郡文學吳越錢竹岩天下士也與侯道同氣合子無意於六義之㫖則已茍急於此舍是無獲焉無極序或謂太極無極之辨起於無極圖豈濂溪務為後世爭端耶昔游康山臥龍菴見劉淳叟擘窠大書亭柱曰是日與朱南康論太極無極吾謂太極無極非古人意裴回四顧恨不見劉子而畢其說有以無極自號余使之坐而問焉曰若知無極之極乎盍以我告有以我告則知有極也如其不知則知爾將北面質若之不暇何暇為若說若歸而得之得則忘之則太極無極是古人意非古人意不俟問人而判然胸中矣潯溪酬倡序經子史傳記皆序下至雜録小說亦莫不然序棋序飲序畫未易一一數然則於倡酬為尤宜畏齊何智夫遲次家食容與三益笑塵間二三友更倡迭和以相勉使書其後序所以申導志義詩者志之所之發於言而義在兹尚何序贈儒醫聞人晦叔序觀中朝名勝贈儒醫聞人晦叔之作因作而言曰儒與醫二而一一而二醫之誤一人耳儒之誤誤天下後世獨能兼之諸公所以亟稱亟揚之余病愚懶如根盤錯古野發其用工如林乃不一售嘗試其技觀兼之之妙又從而申之曰儒則儒醫則醫果能一之大章者䕫愚輒毒已圖蔓莫冀萬金試良請從隗始元谷禪師語録序慧日目齒兩種不壞之藏既銘之矣越二日復見此録此老臧心不施心苖發生以無作有脫間漏架如猩猩屐如刃上蜜又如深穽文錦䝉羃其曾中毒故能中人以毒曾落穽故能陷人以穽吾於是泄其密機使觀者知需水蠱室毋飲涓滴破絮敗繒勿行榛棘康逵八達平等超越五泄留題集叙佳山水如王佐才可就不可致天祕未籥隱德弗耀非胸中丘壑捫蘿陟險履嶔蹈崎極幽邃窮遐隱何以發竒怪之藴暨陽五泄越絶佳處相攸者默唐僧也編茨拾橡不啻大厦廣居食前方丈洞山諸老嶄然見頭角自是始有五泄之名喧傳浙東西由唐而宋名勝接武把麾而至者自集賢校理刁約始所謂近模雁宕形容小逺較廬山氣勢高乃其詩也持節而至者自尚書主客楊傑始則曰堪笑興公游未到都將佳語賦天台自是枵巖虛竇嵌石倒澗竒詠芳什翰墨相照映往往蝕苔蘚著薜荔日逺日益漫某人萃而裒之欲鋟諸梓示游觀者使其新思油然而作然後窺五汲問兩源濯縣水躡飛磴襲諸賢逸蹟釘兩公舊題援毫而賦賦罷而歌勺泉以酹此山之靈而勒回俗駕或未己也禮書記歸葬弟序志學而貧益祟玉其成也貧而成初何傷付用舍於行藏捉襟肘見弦歌在床貧也非病也賜也逡巡而返也視其髙車駟馬不啻桎梏古潛禮從余學貧而青於藍昆弟之喪俟其舉戞戞乎其難哉噫死喪之威兄弟孔懷歸而勉之當有相者月巖序一喜怒汰念慮風絲萬緒何自有發不中節損中害和澄湛之體果安在將有大勇却步反顧內則見我外不違物方是時也巖前月升縱其所如漫不復理蕩而弗反靡所底麗方是時也巖前月沉方其升時天籟自鳴逮其沉矣天籟自瘖巖中禪心氷枯雪深開先性語録序圓悟等間道出四個字道言如枯柴道盡陳尊宿近時據曲録木牀三日五夜努得箇上堂四句偈以顛為倒以逆為順因邪打正必曰因正打邪指鹿為馬必曰指馬為鹿反是謂之順朱噫不知朱順耳此弊僅四五十年餘波末流渺不可遏開先老子提倡一編度火金虞其或變度海囊虞其或滲反覆指擲了不可得異時商榷一言半句言猶在耳今非吳下䝉也兵車㑹同請辟三舍月潭序一漚不作際天一碧磅礴地維天為其底鑑萬象而不有其照涵十虛而不有其廣霜蟾驅轂玉輪碾空空澄水寒景在萬水崇山嵌巖石壁土囊鈞獲其明而不分景云何能然以非水故因作而言曰月在潭景自天形弔景光漣漣潭以虛為任月以虛為眹惟其然物以虛應道集虛兮物莫我違既堅凝兮爾其咎誰鏡潭序鏡鏡空潭涵虛空虛無眹鏡潭無滓鏡忽塵拂之則明潭忽雲豁之則清可以觀德可以鑑止人知鑑夫止水而莫知其鑑夫所由止惟止能止衆止止之為義大矣哉綿蠻黃鳥止于丘隅知其所止也知夫所謂止雖雜然前陳摐然旁午弗俟制而止矣於是觀德德亦大矣惟鏡與潭如空合空與吾寸淵洞照無外噫曰鏡曰潭矣又曰心何區區之名數其多乎則又曰體同也量同也雖名數千萬何患乎送鍾賢良序漢西京取士設非常之科待非常之才如縱綆千尋縣五十犗不在鱨鯊鰋鯉瑣屑滅裂故人才輩出內則為卿相外則使異國窮河源笞單于斬樓蘭六騑渡江中原戴舊德而歸我者曰王宣子未幾登甲科賀者及門則蹙頞而作曰吾僅費數百金買麻沙一沓紙故而至此也何以賀為或謂其輕朝廷非知言也輕場屋耳永嘉鍾君少負不羈少長作舉子業壯而恥與瑣屑滅裂者伍十年閉關夜燈曉窗博觀約取習大科業成而不試遊大搢紳間不小低簪落落寡合無餘資有兩佳子天其或者俾責償於斯乎老我山林無用於世惜有用者不為世用豈拙於用大者獨惠子之與漆園吏也耶送永嘉黃上舍簞食瓢飲不改其樂其樂也全華冠縰履能安其貧雖貧不病彼結騎聨駟朝燕暮趙奮三尺喙馳聲譽利富貴沈痼於游說何其遼哉百世之下言聖門者兒童能判賢不石崇入太學見顔淵像謂王敦曰人生當使身心俱泰敦曰子貢去卿不逺吾嘗謂崇之禍自身心俱泰始永嘉黃上舍貧遊江湖非好遊也將交四方賢雋以自廣牛腰行卷含雁蕩花木香眉宇清整帶龍湫烟霞秀嘉定初豫居丹丘巾子山下寺臨海長曰某者其諸父也表表卓絶政尚簡入寺行散輒忘返智父似之知其為永嘉文章家代有偉人積學而厚蓄約守而靳出若農之望歲則大有之獲可量也哉天其負耕吾不信也易紅丸子為神竒丸序市井所謂紅丸子雖䇿寬膈消積之勳特時暫耳今此則異於是羶膩凝停壅隔翻逆血滯氣積效驗立至售雖廣於士大夫未孚衆易名曰神竒取楚漆園吏神竒化臭腐老坡聖散子之類庶幾新見聞而利及人也逺譬夫水並流孰不善渭而惡涇泉分酌孰不賤貪而貴廉豈特水哉釣渭之叟志除暴亂安生人於釣絲謂之釣則不可歇後鄭五喜滑稽玩人物於流俗謂之相亦不可由是觀之名不能美物物能美名名不能美人人能美名也審矣藥更是名也吾恐其混殽廉貪渭涇賢不肖無别而失其濟危急之實靈叟序古靈提撕古佛堂藥厥受業師之沈痼謂其不識症則不可至於劑砭則非瞑眩謂其識藥則亦不可且靈光洞耀其身在光景中矣將使同在其中者超絶景蹟豁然青天白日難矣哉古也號靈叟抑有取於靈乎天下孰無受業受業豈無師者茍取於靈當取其未發足南方已前不然吾恐刻鵠不成反類鶩也信翁序海具八德吾取潮不失時為海上人别稱曰信翁祖云佛法大溟渤非信莫能入不入則安知夫傍無邊深無底廣大涵育之量百谷東注不加益虛受也尾閭泄之不加損持盈也學者知此則揚子雲所謂終至於海也不然溝澮皆盈而不知其陋曰吾海也倏然而涸始悟夫不信不學以至夫噬臍故吾嘗以信與學告夫相從者兹又以告吾海儻未喻厥㫖盍觀栁栁州東海若反復尋繹與吾言同異何如溪翁捺海塗序過剡必先問戴公廬指㸃阿猷回櫂處賢不肖然也㪺清飲渌濯纓濯足賢益賢不肖亦有瘳則溪山人物遞發竒藴或以縱適自賢登名士之目視天下治忽若風馬牛不相及以有為為不足為卒至於不可為吁何時哉溪居緇褐某翁者訪余來澗隂扣其所存曰將不以事物經意自賢邪抑山樵溪叟爭席專此勝邪是二者皆非吾之所謂道翁曰子何見之晚也不耕不桑殆不知吾用吾力甚於耕桑之難也不工不賈殆不知吾用吾智甚於工賈之勞也閲古髙僧史得開田說大義服膺焉殘山可隄剩水可陸驅海若活餓殍當不啻千萬什一以供吾千指洗鉢於以泚食前方丈尸素怠事之顙子何置我於碌碌無用因人成事之域哉吾聞其言若先得我心之所同然者申其志道其義䇿其勤為是說送觀書記序合而離從而違茍不愆於義離合從違皆中也誾誾不為從侃侃不為違夷險百艱適於義交道之正也反是必强笑語諛媚以相悅飾僞貌佞壬以相下進則詭隨退則揣摩茍合詐從伺隙俟間起而乘之以相賣聞一善言見一善行冀其協贊以澤人利物難矣哉晚得吾觀物初從容於大中尊所聞强記覽未見其止睡再鼾吾伊聲猶在人耳偕來虎巖當妄庸爭奪甫定掉頭舍我而他之吳越家林深眇一枝可以憩倦翮去不俟留還不俟速懼其去而忘還也則謂之曰琴川苕溪一葦可航日損日新勿謂蜚廉慵而不我告嘉熙戊戌春下浣北澗序物初而與之别無外序閬州逺書記盡已以盡物物斯應物應則虛受已則沖然漠然游於孰已孰物洞表裏一邊幅之地振大方之轡允蹈於其間胸中天地無復畛畦而備於我者眇中邊背鄉之殊蓋道之所在而已因作而言曰反觀匪內遐眺匪外而我與物等此大塊嘉熙戊戌北澗書石樓序一炷清香滿石樓大覺焚龍香應量器後乞還山林進頌詩於慶歷天子末後句幾二百年潼川普明比丘摘石樓二字以見志石樓得非岑樓之謂歟仙好樓居抑有慕焉則莞爾而作曰攩谷成隂去作金鑾上客黃太史序忠國師也不知風葉擁趺同參先讖豈巖間半芋付深夜讀書十年宰相可同日語圓通却萬乘詔遣弟子行或以為尊法有體未若一舉萬里勿以纍大覺之為愈也當寧虛心方外將搜巖剔野可無藴經濟甘隱約者出其治豈四十二年而已哉石樓自名蓋惜圓通不知出此而大覺歸山林之晚書其言使後世知石樓之自北澗集卷五
