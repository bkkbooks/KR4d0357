body:
  text: 北磵集巻一宋釋居簡撰石賦飛来天竺講徒聚石作供為之賦石竒而怪兮有惜不惜石眡人兮猶人眡石夫二三子悠然㑹心攀髙陟遐隠搜細尋捫蘿鳥輕籋雲景沉俯闚嶔􅲝側行岑崟磅礴巖阿裴回磵隂洗濯雨蝕摩挲蘚侵獸駭始蹲鸞回欲升介如其質鏘乎其音如考琮璜如戞球琳如獲大貝如致南金室邇兮其何能及石逺兮輦無傭直屹如林兮若拱而揖百夫睨兮無用其力若夫坡陁兮盤峭峙兮桓王佐才可就而不可致權竒兮巧玲瓏兮小市廛隠可致而不可􅎗俯踈簷而巍挿挂綺䟽而環植立中不倚禀姿淡如却歩欲前傴僂反趍匪卑媟尊匪親簡䟽匪璞貴雕匪瘠貴腴䕃之以緑蕉宻葉之凉友之以青琅方寸之虛澤之以金莖沆瀣之清鐫之以石鼔斷缺之餘堅不可鎸頑可澤與將為魯叟之堅乎抑為瞽叟之頑乎或曰是石也皆有飛来之一體始焉飛来終将飛去固蕩誕漫詒兮不可復據夜半有力者負之而趍吾恐昧者不知兮防之不預因作而言曰小子識之庶乎一得兮有補千慮水仙十客賦子墨遇毛穎於𤣥泓謂淩波仙子曰頴也情與幻俱思與化侔爾能壊色衣乎瑶叢瓊墀意象倔竒玉臺金甌精爽發輝既寫真以寵而乃觸類而友之丹兮焉加鉛兮焉施山黛弗埽額黄奚為妙衆態於一緇革殊轍而同歸感意足於色盡歎朝榮而夕萎仙曰既聞命矣凡物之生豈不曰友有枤之杜亦孔之醜梅兄在前礬弟居后蠟英騰馥兄黨之秀寄林處羣無人自芳並驅争先瑞香國香是皆臭味之偶較等夷於兩忘我有横榻縣之北窗楚英不来餘烏足當起而些之曰花中隠者兮與秋澄霽故家東籬兮剪金繁碎宿莽兮苾芬羣空兮㧞乎萃雖卧樓百尺可也豈特上下床之間哉英避席而作曰走不佞請言志簸之揚之秕穅是懲為天下先曩書諸紳海棠豔春山茶駐春桃源霞蒸李溪夜明族大衆富草木知名其可為吾下乎仙憮然曰吾非不願交也以色媚人寡德也英曰子何見之晚也可以攻玉它山之石也不賢則人將拒我若之何而拒人也仙乃曰唯莫敢不承延之上座死毋敗盟相索於形骸之外兮相忘於寂寞之濱死灰賦已矣夫斯其已焉矣積之何益宿之何閟擁之弗煖任之則已撥之則尚何俟既掩之息棄之則孰有是無用之地始或病其燎原終敢忘於祀帝星之沉螢之翳却燧人謝司燬非石中撃非鏡中起非海中光非木中燧雖千炬之連綿與一龕之明偉眇不得其所従又安知其所止初疑陳編㫁而發是殘照又疑踈襟虛而粲此冷蕊肇自一傳煥乎百世惟取之者深則用之者秘豈顯晦之不常固行藏之所係必遺魄而潛影則輝天而鑑地翳妄兾於復然粤西京之内史雖再振於餘㶳已見溺於獄吏逮辱極而榮来亦背芒而顙泚矧漆園之老仙傲楚䀻而髙眡槁形骸與方寸投綸竿於濮水寧惡富而賀貧寧去此而就彼将貪得而徇財抑舍生而取義將豐犧之衣繡抑靈龜之曳尾孰若摶扶摇跨鵬背翺翔乎九萬里拾齊物之餘論續齋心之㣲㫖寓兎穎於逺思作蝇頭之細字捜精爽於空濛使飛㢘而馳寄些而歌之曰盍歸乎来兮吾其為逍遥之逰自無何有兮奮於廣漠之野而烏有之林丘䪥室賦向斯塞戸斯墐甫容膝僅休影雖晴而隂不夜而暝進則面牆退則坐井柱忽不支壁忽就殞豁然而虛漠然而冏如䝉之擊如震而警識天地之大全見造物之遐隠盡草木之態度極川原之畦畛萬緒紛紜一瞬而領沙平露背山層透頂髙木呈枿孤塔出穎風煙慘舒化變俄頃如無盡藏如大明鏡前山送青若壯士之排闥後山囘闖擬良工之御駿撫鴻鵠而晚眺入𡨕㝠而逺引笑雲煙之輕去漫悠悠而無定駐落日於西崦延初蟾於東嶺皆是中所得也於是因陋而飾就隘而整力不足侈志不足騁儉適茅茨静惬幽屏自抱窮獨自負不敏信吾樂吾樂也或曰蕩蕩四海茫茫九區結客締交春生吹嘘木李木𤓰利兼苞苴志之所之稱其所如今也跼促如轅下駒所樂只爾將胡為乎吾為子不取也則語之曰履仁正途蹈義廣居仁義而已安知其餘惟正則廣安知其拘一簞之陋同躬稼之濬哲千駟之富媿采薇之瘠癯我則謹終執之如初我則守約執之如愚客則貎敬其心揶揄反復之而不聽則謂之曰子去矣子非吾徒食力賦或訝余游兮廣居大輿墮兮豐饔華裾殆不知吾不素食也宏吾說而反諸凡吾有兮四民樂輸入吾籍兮縣官索租不耕則荒不植則蕪不則蠶食且獵且漁屢空不顧坐觀其逋踣而後已不其晚乎今也反是安知其餘勞心治人勞力自劬墾闢田莱罅漏補苴先事者餔怠則削除僅支兮目前旁捜兮古初無愧兮自求屬饜兮自愉大人先生可扳援兮竒字是咨窮老惸獨相喣濡兮閒情是娛粟吾粟兮瓦盂樂吾樂兮道腴茍不吾以兮縦其所如亂曰力可強而有也智不可飾兮既盡瘁也我心適兮雖百紛兮我心匪石兮問景賦謬我晝與衆作夜獨短檠顧景而問焉景乎何闖闖於此其久也止同廬行同途傴同俯伸同舒不戚吾戚不愉吾愉不巧吾拙不智吾愚不砭吾頑不充吾虛豈所謂危而不持顛而不扶而累人者邪景曰爾何見之晚也我生之初豈父母且爾之未生我何有乎我非累人爾誠累余反以我為累也如之何而勿思爾特立兮示爾至正俾爾正焉是守爾不倚兮示以大中俾爾中焉是居爾競爾躁我固自若爾静爾勝我方澹如將極𤣥窞兮我必爾俱抑臨崇臺兮我亦爾俱顛沛造次未始不爾俱也胡喋喋而問歟言既而寐夢㳺濮水授我息隂楚漆園吏寤而反思爰得其㫖極景所如罔知攸止香魚賦海賈得水沉之木於絶嶠巨口細鱗厥狀惟肖矯首欲驤揚鬐欲掉腹背逾尺首尾倍尋渾然天成不刋不鋟将市於通都大邑則燔灼刳剔秘而藏諸則匹夫懐璧與其市而藏之孰若寘諸八吉祥六殊勝枕玉几供佛頂此念既作鯨波砥平天風飽帆悠然至鄞嗟物之生豈不願才臃腫自全不鳴者灾才不才亦各繫其逢也方其窮髪之北落落盤踞排震風傲凌雨不知其㡬千百年婆娑垂隂終其天賦蠧根反初槁榦速腐所不為速腐之伍者嶄然鱗鱗郁然圉圉一遇賞鑑遂奮於遐陬窮荒卒臻禮樂文物之土向也不遇曷以至此雖然銕鏁鋃鐺鱗鬛振迅殆與獄戸之劒雷澤之梭跨騰風雷變化而去夢賦曉世以夢謂其頃刻變滅了不足恃邯郸一炊槐宫半世栩栩齁齁冀所妄冀鳥跡空雲既寤猶寐然則至人曷常無夢與其夢也舒舒其覺也蘧蘧得傅說游華胥錫九齡奠兩楹所存者誠所兆者神惟道人銛夢尋幽潛上東山上瘞老龍象出數百言辯如湧泉覺而繹思了無孑遺致書於予曰吾夢為東山瘞骨語覺而眡之宛然畵像讚子盍為我辯之使反命曰子真夢為東山瘞骨語覺而為之讃豈緣名失實以夢為覺與語真是讃而得之於瘞骨豈責實於名以覺為夢與抑兩忘夢覺而適意與將一致名實而忘言與詎知子之夢為東山而東山之夢為子與不然説此夢者不知為誰而原此夢者亦復不知其為誰與昔人夢鹿鄭相輙疑曰無黄帝與孔仲尼茍能辨之果辨者誰殆不足以語此理之所在十日麗天物無遯形人自眊然諭以日明竟沒沒焉彼有目者不言而喻盖不待黄帝孔子而能辨作夢賦幽情賦和于君實隠約兮窮執徳兮洪菑畬在經水旱在躬揮毫落紙兮十吏敏供滑稽怪竒兮解嘲送窮思逺兮雲莫掉鞅兮誰馭貂裘兮塵侵大笑兮出門去付萬言於杯水蜺豈虞於讀誤勇一歸於半生問征夫以前路駕言入郛官舡載書出無者車長鬚者奴委羽黎明中津日晡稚子牽裾野人挽鬚方寒温兮未既倒囊錦兮畜儲弔氷玉兮貞姿撫莓苔兮槁膚國香薦芳不為無人淩波弗来淡交竹君俗駕可回姑射可賓結商鼎之佳實待方山之怪民擬奏賦於蓬莱載擷英於典墳補既往之缺遺尊平生之所聞攬萬象以冥捜濯煩促於秋旻哂富貴兮不義母憂貧而賀貧種竹賦二姓争竹山竭産不肯已仙居丞王君懌来囑余諷之作賦示二姓而訟止自余耕稼於委羽之西頗復精於藝樹搴瘦竹之雲仍著清飈於忩户叟過余而問曰子習吾土竹才不才豈願聞之與鰻尾之細猫頭之巨桃絲下考江南别緒石如早晚之筀簜異青黄之苦磅礴萬山之麓綿亘千溪之滸大則乗桴浮海小則惟筐及筥驅水則頃刻百畦挂椽則裴回百堵横濤瀾而為扈代垣墻而樊圃既制牋而紉布復為薪而充炬雖刀斧之不赦豐貨貲於善賈凡子所植咸出其下或斑而跼或紫而傴從然而横直然而竪待價不售待用無取既蕃而滋於事何補余曰叟之所陳匪利奚務嗜利者矯䖍於隣里争畔者陸梁於道路養睚眦以成俗觸憲章而乘度吾與之淡交者也天下之竹皆樂為吾䟽煩而滌慮一日無之萬鍾不顧未嘗擇而居焉盖不謀而同也若夫濟深渉相窘歩騰荒陂釣煙渚未嘗不與之俱也濯炎熇忍寒苦留天風伴月露未嘗不與之處也睡足廵簷踈莖玉立莫不仰夷齊於首陽㧞千丈之俗飰起息隂宻影金碎又若軰㳺夏於泗濵踵多儒之武倚衰殘冀其生抱節之孫撫幼稚欲其肖遺清之祖利動貪夫摲夷畢舉地忽異姓俯仰百主膾雞肋者何限得蠅頭之幾許抑千畝之就荒将九苞之失據始竭澤而不戒終反裘而未喻繄叟之惑滋甚與吾之言齟齬載㗃㗃而往復愈儚儚而瞢瞀聊抗手而語之曰我勌欲眠叟姑且去梅屛賦北山鮑家田尼菴梅屏傾京都髙宗燕殊宫嘗令待詔院圗進屛梅於閒暇之際固足以當一面之託况夫花時不數孔雀之金塞門之樹兮城南悠然蓓蕾露零旉腴酥乾玉頽可扶雪妍可編又若堵立十丈於蓬莱千仭之巅北枝奔而不殿南枝徐而不先孰不願斜入屋簷横蘸清漣殆將小抑髙韻兮從其權也雖屈折而拂性終秀整而全天盖智巧所自出愈出愈竒兮麗澤乎芳鮮豈吳宫小隊艶冶於長虵偃月兮與之比肩哉雖然物貴守常失常則舛反常合道何患乎反牛可貫而任重馬可絡而致逺水沛然而東之決之西而弗轉又何以異夫結婆娑而亭亭直蘧廬之南榮瀹乳雲之甘兮駕清風於玉川倚紈素之潔兮障順風之庾塵使浪蕊浮花知夫大邦維翰兮公侯干城吾将取古今騷人墨客盡䟽録其姓名首之以石心鐵腸繼之以孤山逸民俾登是選者不啻㧞山之與籋雲寄風雅於晚生發先覺之典型廣平之貂兮不可復續暗香浮動兮尚堪擷英是舉也得非東家捧心兮效顰於西家者耶糴賦黄巖之西竹樹之利埒禾稼富民積倉不競縣南新陳相望據廩増直要突不黔者不仁哉富賈也作糴賦北磵遣介問糴於接壤之多稼者夕陽在山徒手而歸惄然如瘖長噓而欷撫而勞之曰吾遲若之歸也與若解腰而共飯何遲遲其来乎介怫然曰東方既明草露未晞請命於邁徃扣富兒自卯及申庾不及闚守者瞋目畧不見治懐魯將軍指廪若遺嗟今之人彼何人斯計其耕也㡬觳觫之扶犁幾桔橰之灌畦其穫也回江潮之駿奔巻天雲之暮低其歛也渺然基簣之山倐然横浦之坻其入也豈斗筲之足算汗牛馬之載馳介也淺中卒駭且疑乃歌而喻之曰起予者誰兮必斯人者考古騐今兮吁嗟里社長日難西兮生民不暇麰仆麥萎兮大田如赭粟方堅壁攻之不下阿瞞小斛洛陽髙賈秦漢不威唐虞不化文具之文墻書壁挂若夫貪夫徇財烈士徇名矯矯虎臣藐萬虎賁魯英周豪目撃道存既慷慨而内交豈瑣屑之足論漢鼎未分髯孫髙眡周不引類而東鄉誰及帝王之畧荆州倒屣孔明借助魯不交言而逆擊誰空赤壁之戰生有斷金之利死有絶絃之嘆鴻鵠之志非燕雀之知虎豹之文豈犬羊之變繄橡栗之四三擬樗蒲之百萬世愈下而愈紛鼓之者誰兮吾得之於黄耉鮐背之所云謂龍斷之賤夫每朝隮而莫登幸飢嵗之相仍偶新榖之未升乗顔氏之屢空肆盜蹠之不仁弗思殆辱奮其并吞瞑未睫交家如土崩可以懲矣然猶不肯悟載脂其車言秣其馬於覆轍中星言夙駕雖争馳而並驅可拱立而俟也糶賦予既作糴賦鄰氏之好義者曰某㢘直以沮某氏増直之告復作糶賦而申之謀富而忍其惟糶乎糶亦吾之義也不義而富果為祥乎富亦我所欲也儋石無儲大田未稼食難圗續鄰不可借帖敢忘於乞米色幸憐於欲炙賑或謀於移粟均豈殊於宰社如涸鱗之垂盡遇西江之沛㵼昧者反是悠然待賈控臨嶮塞暴殘鰥寡扼其吭而拊背頫其元而出胯鉅橋紅陳獨夫叱咤割惟雋永眂若土苴凡啼飢號凍者皆起死以歸仁而執銳披堅者咸賈餘於更化或開八百之基或貽萬世之罵吾於是乎知粟愚商辛也奪其飽兮以恢逺圖民不附兮吾誰與餔錙銖聚歛兮縱操特殊豈在周則智兮在商則愚秦皇極奢漢武窮侈漢亦㡬殆秦訖二世至道之本起於貧富之相支一閧之市必立之平八口之家可以無飢方今盛明革秦漢非爾甿云胡瞢若不知蓄而能輸是謂善積虜方守錢雖積奚益器滿則覆獸窮則廹彼乃疾眂我方燕佚恐季孫之憂不在顓臾則舟中之人盡為敵國自速楚人之炬不戒匹夫之璧惟賢者而後樂此庻㡬乎不俟終日竹齋賦君富於蜀漢中㧞萃洋川之濵霧擁煙蔽滄灣嵌竇殘沙賸水平原萬井沃野千里其類實繁既昌而熾胸中千畝坡戲之耳蘄黄之産伯仲叔季陶瓦是代不才者棄竹樓文章簡古新麗湘江雨餘籜龍養雛為筏為桴可稼可蔬船歩漁梁雁户水居汲湘然枯欵乃清婉於桞桞州一唱三嘆乃今勌游委羽買隣荒岡猗猗崇山嶙嶙蒼蒼含煙矗矗連雲農事方隙揮斧運斤萬山答響千筏銜尾蔽溪入江送江入海巨賈萬艘運入諸國盖不知其幾也惜無品題以配三子乃今賦之刷此君恥嗟嗟竹齋植無寸地盆盎之間筳篿而已鮮風徐来大火方熾金流石鎔背汗顙泚望屠門嚼乃雞肋爾繄子所樂固余所鄙竹齋主人囅然而作曰吾聞外物者容膝之隘甚於廣宇不則寛曠擬動輙拘尺土寸金中都吾廬一屈一信倏榮倏枯禀姿虛心嵗寒燕如吾梢止簷清則厭餘彼笋當道屢干剪屠縱懐是中馳神物初心交也親迹求也踈鄉子所陳各天一隅今子所有不傍子居豈不爾思子居所無吾於是泯而黙囁而嚅四顧而躊躇豈䕫怜虵蛇怜風而不自反與吾其風乎吾其風乎碧幢賦祗樹函丈之制肖臨卭之四壁藐然容膝之餘地尠一鉏之隙簷楹菑翳竹篠蒙羃垝垣四繞盧橘孤實非廬而穹非葢而仄可以休影可以息迹團團然童童然命之曰碧幢直曠欲牖旁虛欲窗颼飀怒號屋頭秋江弔楠樹之既摧嗟杕杜之不雙霖收宿梅溽散初日絺技小奏箑勲試策吟酣而嘯喧止而寂益者四友坐者五石四友之外自撫其一方其風甌自鏘霧蟾自呵閒雲自留好鳥自歌古恨如海古愁翻波萬化可搜萬象可羅余則散生蕉衿掻短髪顛惄然如瘖泠然欲仙乃命丈人鈎𤣥既磨既研楮生不約巻舒在前生不事邉幅展盡底藴潔而直方静以俟頴頴探𤣥津分命馳騁聲吾胸中所無者欲其清露莖泠泠欲其古玉軫玲玲富麗則金谷始繁豪壮則秋潮未平語其雄徤則騄耳不調鯨鵬勇鬬語其沖澹則南山種豆桞州種桞至於典雅竒逸軒豁縝密精贍深秀平漫湍激正而葩腴而瘠千彚萬狀各稱其挑剔微四友輔相裁成也庸須㬰其間哉於是㪺碧苕之波采北山之薇些而落之又從而歌之歌曰幢兮枇杷菴兮桄榔惟榖與臧俱亡其羊又何以異夫迹相踈心相忘者耶弔駐春賦山茶雪中著花萎於首夏取張右史老紅駐春粧名之曰駐春作弔駐春云余自孤山南巖止宣之丁山春用季琯月行霣團茶彤而葩倚檻可扳低回欲言羞澁靦顔殷肌兮凄黯丹臉兮消減宻幄兮紛披羽葆兮摧斬有蕩者都言采其英有㳺者姝言搴其榮壓帽簷厭鬢唇舞天香㸃文茵殆不免夫豪虐之手盡瘁而不得制也方其猩染玲瓏犀剪蘢葱酣酣絳明童童綠濃謫仙不来况復謝公羌落落兮空濛疇孰予兮為容翳封植兮眇林自陶寫兮華風欲鉏其色式遂厥性愛莫助之不曰同姓爛石寸芽詩人薦嘉屑荈碾荼碎圭破觚味與諌嚴甘與薺兼方物兮職貢寐睫兮㾕􅂒髙制作兮品評昌蔡録兮陸經配萬錢兮析酲雖百紛兮曷顰嗟艷冶兮是矜若青黄之自迍将苦釅以廸人抑擁腫而引齡矧匪徳兮翹晶焉所如兮全生北磵集巻一
