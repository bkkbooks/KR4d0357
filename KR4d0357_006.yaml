body:
  text: 北磵集巻六宋釋居簡撰玉泓銘碧雲菴在洪崖西雲峰東近唐處士陳陶故廬址多石堅而難攻嘉定十一年季秋九日四明僧如潔落菴之成得泉於堅址中翰林直院留公元剛適来自匡廬名之曰玉泓方不逮尋深半之旱澇無盈縮甘可飲浄可鏡於茶為尤宜莫原其自或曰人與泉感聞者輒笑噫是誠可笑也卓錫而得泉久矣為誕拜井而水湧久矣為信信與誕相尋於無窮而莫之或辨豈忘言者所以不言有待於知言者耶銘曰堅方方碧漪漪雲生隅月剪規鑿而得之或稽或疑然則是泉也固在兹固不在兹泉禪師髙原銘或謂水出髙原曰髙原則萬斛泉源不擇地而出又何謂也或曰髙原陸地不生蓮花此彈偏擊小之辨皆非吾之所謂道為之銘銘曰峻極兮層稜巋不可登吾非雲顛逈閴兮坎窞杳不可瞰吾非九淵雖然彼習夫崇深曷嘗舍旃兮不扳不援弦直兮砥平哀今兮匪中而邊正因兮急難思鶺鴒兮在原彰教石雲板銘兩朶雲峙中可貫考之清越而渾圜刻詩五十六字曰莫翁題不書姓名寺無耆宿可訪訪諸野曰建炎初雲居隆藏主來住此山過湖口得於民或曰徐氏舊物二説未知孰是寺盖李氏有國時徐魏惠王墓田王温第六子名知證字義明距寺七里有江南翰林學士常夢錫所撰碑太廟令王崧所書屹立驛路傍元祐元年龍圖學士蔣之竒制置江淮荆湖時所作碑隂則在寺物之隐顯固有數嘉其瘖而復震銘曰切堅兮采英剪雲兮賦形在縣兮審厥聲聲聞於人人惟聞聞寂寥兮歸根塵消兮不痕張公井銘由彰教而東一百三十九弓曰張公井公不知何代人當時奚為者缺甃瓴甋不古疑其去今未甚逺深不及丈冽而甘宿不滓宜茶宜墨宜釀嵗大旱十里仰給病者投一錢煑藥輒瘉舊有亭樵牧躪蹂既弊不復理丙戌仲夏望住山人北磵淘井勺泉而銘之銘曰泉瘉疢人以泉信信必孚相與為命余病愚泉不瘉曰余弗信泉弗余予潄而瀹以樂其樂慈感寺蚌珠羅漢銘某年月日苕溪漁者剖蚌得珠而側視左袒應真肖象契神僧兆夢之徴也臨流忽墜淵涸珠明水齧簷趾嵌空嶔崎岌岌欲壓示人以顛濟之急也傳記雋永聲詩清越皆南渡第一流珠璧照耀俾嗜割烹養口體起惻隱之仁知大徳曰生也為之銘銘曰精洞太隂是孕厥靈靈應不虛現如是身涎液不濡長揖鼎俎雲沉方廣弗入衆數彼漁伊何箕裘在漁先獲援手夢仍合符潢洿漫流朣朦印蟾汩汩自渾稜稜弗潛澄瀾𣺌瀰碧甃空洞半肩伽黎萬目神竦明無礙銘明無礙吾孤雲權之子以諸父事余與樸翁兄銛樸翁稱之曰無礙屬余着語後十九年始克為之銘銘曰毫忽不透物則礙膺泮然物消伏膺以懲惟其拳拳此病始大夫何能然礙蔕獨在畦空畛虛欲萬籟瘖只益自勞直寸枉尋地窄天遒拘窘跋㚄必也逢源此外無地幻菴銘達上人曰幻菴文昌喬公行簡為書之請銘於潼川北磵某銘曰有覺有幻的生箭集諸幻消亡覺尚焉立八窗玲瓏十虛内充惟一精明復何所容以無所容故無所却知幻即離自急其縛我説有覺與無覺對是則名為如幻三昧福聖曇禪師通菴銘法門行諸父通之為道常不在君子或曰人衆者勝天天定而後勝人余則曰天不可勝而未嘗不定作通銘銘曰君子固窮故通小人反是通而終窮是故君子守道而謹終臨川王正叔嘯隐銘懐壯圖嘯長舒自樂蘧廬中之天地豈特以天地為蘧廬學道兮自娛飲水兮飯蔬是謂立天下之正位兮居天下之廣居簷隙銘顧余最古屋老不支塗垍阤剥簷隙庋器用者數板下設小榻開數櫺納月疏風作於斯息於斯非醻酢事物於外亦必於斯銘曰適斯陋陋吾愉愉安斯隘隘吾舒舒善斯獨非吾所謂道正斯立昌吾居乎瘞獒銘般若作某之仲氏有獒黧文名黧獰而警不以善吠為良夜聲先羣晝食後衆仲用恕體柔黧化之季之狸虎文曰斑以輕翾捷疾嬖季畜之經年狡穴洗空挾寵以暴非其類他獒磔之血濺黧首季勇復讐擊黧首而斃之仲趣援黧噬臍矣徹食終日瘞以弊帷盖過余道所以然曰吾傷焉吾傷者三斑化暴死暴也斑死暴益季暴也黧化吾恕盍死於恕乎予曰何傷乎吾敢賀而不以弔也恕本仁一物不得其所若已推而納諸溝中閔焉閔深則愈恕廣而充之仁不勝吾用暴虐之慘甚於燎原雖自已有所不暇顧於黧何有黧死恕得死所矣仲氏矍然而作曰然則不可以不銘銘曰黧與斑化其主暴死暴恕死恕恕有光暴自取繫襟裾不遄死白牛銘思谿作施力養人惟牛為能負力於牛惟人寡恩故君子不忍觳􅑌以小易大飲以清泠逺洗耳處比及後世王澤寖息淫祀肆作椎擊屠割享非其鬼濫觴嶺海蕩汩中土靡然成俗蚩蚩之氓老羸易少壯堂堂馳駈使就鋒刃壯者既羸亦復若是當其貿易之時其死已兆不見舊主徨徨欲訴苦不能語謂其不語是自欺耳視大白之塜巋然榛棘中抑有感焉某年月日圓覺寺造僧伽方塔十一級以尺計者頂踵拔地三百六十塼甓土木之運縁半天微大白孰能舉之塔成而斃嘻殆於此矣某年月日也寺之隂不越大界相得爽塏營其葬而筞勲焉後若干年某來住山聞諸故老為之銘銘曰舍爾畊勞爾生弗踐青金地行牟然鳴中黄鍾頽然臥蟠玉虹忘其勞食其力成浮圖十一級身溘然功巋然與浮圖相永年佛手巖善住禪院鐘銘般若隣封扣無書應無竭持寸筳致其噎惟洪其撞厥聞乃鈜聲沉響消反聽絶聞聞性斯泯聽亦超瑩是故此鐘寂而常震濁港東襌寺鐘銘大扣大鳴吼鯨震霆弗考弗擊云胡弗聞聞性常住湛水不痕由一精明見六用根淮山崇崇谷虛有神於昏曉間互應迭陳繄爾大器晩而後成獨山笵金使北磵銘布衾銘衾而布儉而易營或曰詐不得已而去於斯二者何先曰詐儉也者吾師也左袒公孫右袒司馬卭竹杖銘卭端歙尺為竹巖先生錢常熟作心貴虛受節貴不露爾窒而露君子所惡維其持危相與却歩無黨無偏遵王之路端研銘非華池不竭非干將虞缺璞少文玉方切歙研銘沉𤣥雲升𤣥津穎也筞勲如新發硎界尺銘惡圓曲尚方正直而剛重以縝小菴銘菴以小名志其大也大而不可容故小之小之為用大矣至大至剛浩然之氣也充塞天地而莫測其際寓諸尋常而莫得其眹養之至也不然渙散乎其大必乖離争犯詭譎顛倒而無所不撓膠轕乎其小則促縮拘局窒礙窘束而無所不觸亂小大之宜而失諸尋常之中何自而知夫小而得夫用哉故曰小之為用大矣為之銘授住菴人使由吾言而志其大銘曰泉濺濺火始然或浮天或燎原匪微兮曷著焉肖巖銘竹巖長子清明在躬羣妄停擾斡旋一氣颼飀衆竅事存萬變理絶雙兆削平畛畦强名曰肖紙箑銘流金燎天其酷無敵於天下勁節廩姿獨當柄用百其身如縷不憝楮生夾輔盡綿薄為犄角雖未即殄其炎炎奉揚仁風亦足以慰彼黎庶竺源銘曇蔵主一滴曹溪發於中天迤邐於江西一十八灘餘波瀰瀰襄陵懐山窒何有於濫觴障何有於頽瀾雲何心乎故岑水何心乎舊囦九河奔湍渺然毛端吾故曰統之有宗兮會之有元勝叟銘潼川定首座目定曰勝取人衆勝天之勝為之張本則謂之曰蒼蒼而穹者天也無聲無臭品彚以亨四時以成享之以誠應如谷神總總蚩蚩其類實繁汩序亂常天紀妄干嘲春哳秋嘈雜喧啾喙息弗停擬萬竅號氣革候變金行既肅族類竄匿惄然皆瘖跡絶景消泯黙至死天籟常鳴無從聞聞於戱天乎不戰而勝凡所以賀戰勝者冠盖相望雖愚夫愚婦知必之天而不必之人吾故曰天不可勝而未嘗不定則又諗諸其衆曰天何言哉物初銘四明觀書記寸田鏡空蕩然十虛雲沈翳消其應無外道之所在而已夫道未始有物物亦惡乎有夫道道之所載惟物之靈神而明之存乎其人萬生紛綸汩乎吾前莫不了厥端緒於毫忽未兆弗祈先物而物莫我先吾固曰道之所在而已銘以訂其説銘曰混且殽紛以綸曰無蔕何從生生無從去冥際動中滅静中起微退思與却顧當云何洞化母全者天天地先觀物初如是觀無盡銘潼川藏知客典吾賔者曰藏號無盡為之銘銘曰此靈覺性太空同受十虛無垠均量齊壽凡厥有生天地共盡先天後地獨存者性外取風月用雖不竭畵蛇著足既著復刖身椰子許曰小天地求諸吾身是謂直指紫巖銘日首座芝生於巖巖以芝得名曰芝巖芝澤而紫又得名於色善毗尼者日取紫巖扁其居且託其宗著其學侈其别稱何擾擾其名之多乎或曰一法千古應縁立號子本家兵法何自畔而作是説擾亂我邊陲俾我巖間風烟雲物不得寧將不戰而屈之申之以誓吾旅云峭者巖紫者芝芝名巖巖不知日之隱此巖下音户婁斯名振厥嫮名匪實嫮亦空如何其貴徳充徳日新巖益髙徳不修芝如蒿伊紫巖式芳武懋厥功永終譽彞齋銘龔某曰彞齋有取於民之秉彞好是懿徳問彞於予為之銘銘曰彞民之天民之秉彞天常卓然惟帝降衷於此下民兩忘黨偏守之以正謹而不移其歸則賢習與正違遂遵别岐小人之歸千里之失始於毫釐豈不爾思思而來復不移一絲夫何逺而舊扇銘疇曩旱三伏港弗澌物不滋爾宣風而暍者醒炎炎今如昨圖任舊惟爾諧思濯清泠者具爾瞻嗣乃績長使奉揚之柄在掌握晦巖銘昺知客振耀而九烏斃潛伏而九淵照息隂以居洞窺煥若日中疾歸戃恍杳邈是故君子用晦而守約石門銘智上座垝垣勿踰匪穹即嵌循垣得門惟石巖巖罔闢其􅖏孰快斯覩憤悱在余發機轉樞仲舉銘徳侍者徳輶如毛民鮮克舉孰能舉之惟仲山甫古往可復仲也豈無睎顔之人亦顏之徒晦巖銘為衡台之學者曰慧明强記覽知名於衆號晦巖為之銘銘曰智燭也燭諸理遐隐無或遺善用智者罔不若是智其智弗時其用過則罔不殆離婁子所以弗若罔象之為愈也檀木白衣相贊嘉定十三年正月人日瞻禮白衣大士像於永嘉楚上人嵌空玲瓏水鳥翔集絲粟眉目芒頴爪指衿佩冠纓諸莊嚴具靡不稱是眇而眂之了了可數補陁風烟悠然在前反是則無邊身爍迦羅母陁羅亦莫不然乃知蚊睫餘地可拓掌中世界可擲是道也存諸其人作贊以授楚云斤斯運堊斯斵鼻不傷立自若臻極之技與物不二惟其不然一理萬致我觀此像殆非人為就能為之技不宅微矧此匠氏應以此機應以此身化巧幻竒曰余眊然兩眼如鏡弗能審觀獨以耳聴反聴絶眹對此殊勝小白花山下瞰巨浸慈感圭老請贊無量壽像十四章章四句十方取土曰清泰城又曰極樂與苦濁鄰厭苦知樂不毫忽間一念勇往即念而瞷惟憶惟念匪疾匪遲憶而不忘念兹在兹如求亡子如䘮考妣如疢需石如渇需水以如是故曾何逺人人人亡羊入生死輪法法惟心心亦非心鄭衛嘈雜水鳥樹林悠悠漸修頟頟闡提同攝罔遺妙在不疑疑則疑城日刼倍蓰東隅既失桑榆可冀粤若二仲達圓頓機路壅般舟手自剪夷池㘽芬陁社結名勝一十有八是修是証天台嗣響的傳自衡和者如雲調髙倡宏六朝逮今衣冠緇褐愚夫愚婦爰同此筏哂乃二瓠載沉載浮即窒即海善栁栁州見月因摽執指成咎舍有相佛觀無量壽不動居士馮濟川畫像贊天竺印所藏乗本願輪游諸世間芻豢空寂以致其實桎梏冠冕而行其權在宗廟朝廷則和而不同於以見大臣之節位方伯連率則威而不猛於以見刺史之天鄉居則讀鄉黨篇而無媿家齊則揆家人卦而罔愆若夫大小藏之施也則各以無量壽願王為之數筌忘在魚蹄忘在魚兩忘忘亦忘所乃知施者未嘗施而受者未嘗受至於五千四十八巻初無一語永明壽禪師畫像贊客吟燈殘猿啼月落衲帔䝉頭千巖萬壑指破凡夫為等覺妙覺齊大小乘於錢索井索縱大辯於談笑寄虛懐於冥莫所謂百軸宗鏡之文如太山之一毫芒巍巍堂堂煒煒煌煌非心亦非佛破鏡不重光天樂趙紫芝畫像贊一㸃虛明八窗玲瓏萬波不渾百川自東殆見其灑然乎外孰知其淵乎其中謂其襄陽漫仕曰吾不為南宫謂其江湖散人曰吾不為龜䝉烏在乎儀刑先進而丹青太空竹巖孏翁錢徳載畫像贊凛乎吞八面之敵清哉拔千仞之俗盤錯不足以試銛利霹靂不足以示淵黙若夫佩鏘鏘冠巍巍臨深濯纓憑髙振衣豈非雜夫塵滓之市而遊乎方之外者耶東坡畫像贊竹巖家藏帝哀先生為天下忌速反其轅卒不憖遺遂騎箕尾而分天章雲漢昭回衣被八荒載駈六丁收拾文字神京遐陬旁羅曲致落人間者太山毫芒寒者綺紈餒者稻粱取彼譛人投畀豺虎既粱其餼而紈其袴豢以人爵俾敏厥修息公之譖承天之休二桃殺三士贊竹巖家藏大匠不棄櫟社之木良醫不遺鳥喙之毒務急吾用不一而足茍適其時雖棄必錄方其用時有正有竒顛兮吾扶危兮吾持相道巍巍二氏似之哂乃齊相曾不爾思夫三子者謬以力勝勝力以徳孰敢不敬徒䘮厥徳以致其命一念之忍桃乃其穽欲濟緩急圖任媕娿爪牙不銛其如之何盍觀相如伸秦屈頗隱然長城無庸干戈三教贊此三勝流一笑聚頭其道不同曷相為謀至哉儒先問禮於李李從竺乾逮真實際商隐於李白眉最良曰師師師其来自唐車適大方萬里一轍差之毫釐肝膽楚越蔣山沖癡絶寄初祖達摩并馬大師畫像索贊穿耳耳未嘗穴缺齒齒未嘗折北度一葦可航西歸隻履自挈或謂之空刼已前中流砥柱或謂之拈花已後金口木舌又曰正宗别調又曰直指曲説皆非吾之所謂道也若夫求大乗器走十萬里俟人作興器豈大乘夙負先覺禮聞来學學而知之既逺且邈負是四者吾恐五竺之鐵不足鑄此錯也金雞毒一粒粟未踏殺人已先跌足一十八灘兮障回死水八十四人兮淹浸弗死洪都兮泐潭宗風兮肆凌厲一波動兮萬波起派兮支兮滔滔者皆是更無一箇識𤣥㫖只有歸宗較些子檢㸃將来𤣥沙道底孤雲畫像贊閒如雲寄寥邈帖水不痕行空無脚笑從上掃跡生跡嗟後来以縛解縛於其中間巻舒自若釘釘却懸挂却老倒南陽猶欠一着下竺印畫像贊窣然短衣嶄然挿犀歲晚寂莫奮此一䕫膠名相求之則萬言不直杯水外形骸索之則半芋美於紫泥憲章左谿鼓吹荆谿使人復見古道顔色舍斯人其誰歸明教禪師五種不壊贊并引刼灰之説大三災之一也天地所不能免况天地間物哉明教禪師闍維不壞者五曰頂曰耳曰舌曰童真曰數珠萬行成就三災彌綸自若也作五種不壞贊用公書逺公影堂故事云頂骨嶢然隐若伏犀於烈火中凄其廪而古鐵錚錚㶳餘不熱擊石拊石迭中音節舍利團綴素魄冏如湛湛凝露累累貫珠豈無他人欲見其頂月行太空蛙沉坎井去窒而聰去塞而通於無數聲齊萬竅風風止聲消音響寂絶谷神不死聴火焰説説無所説聞無所聞烟滅灰飛所亡者存以是耳根示爾四衆厚徳宏功千二百種宣明心聲若出金石洶湧辯河不滲涓滴書獻天子天顔屢改一笑歸来此舌猶在韓吾不非吾奚以為壅吾不夷吾奚以馳一生事了有死無憾身隨刼燒紅開菡萏童真出家死於童真出沒巻舒一堅宻身嗟多欲人曲為欲說於其根中出火自焫猗歟哲人哂乃覆轍以古為鑑以身代舌火炎昆岡玉石俱焚石付百粉玉兮温温的的紫梙茸茸素絲自幼至老念兹在兹譬夫一龕繞以十鏡此燈長明一印印定定則離念反而自求於無求中以敏厥修物初有終法無有盡是故此珠横絶煨㶳賢者國師贊髙麗指堂請作心部根本身嚴雜華赤象青牛跨竺越華半滿字則五其等差殊聲響則一其紛拏使登門之魚駕際天之濤陋潢汙行潦而觀海若之谽谺瑣屑滅裂又安知鰋鯉之與鱨鯋强齋髙使君金書諸經贊澱藍蘸楮屑金作字去字與楮經果何似曰此諸經即楮與金續父厥志寫佛語心惟佛語心粤如父志一㸃畫中具無量義字可悉數義則無量欲了其源㝠去来相强齋大士年八十餘目如心明作蠅頭書於一蠅頭分可為二塵毛太華弗巨弗細佛神力故初不作難是故北磵作如是觀兩蟆贊御前梁楷畫并引一蟆逐蟻一蟆攫飛不及而擲於地攫而擲翾而舉之二蟲請以戰喻翾毋忘於射鈎攫毋忘於在莒蟻戰酣蟆襲其後非大嚼盍反相友夢好忽同歸一麾何足疑荷屋常不輕畫像贊芰荷為屋芙蓉為裳芳茝紉佩落英貯粻熏以石林書傳之香瀹以太華玉井之涼濯人間烟火氣毋干吾丘壑姿洎夫錦心之與綉腸發卍菴之韜畧示我武之維揚適妙喜國拓吾故疆安在乎廣莫之野而無何有之鄉義鑑堂畫像贊魁梧軒昂耿介孤潔大珠縞夜輕雲拂月作成潑天問端来前只似釘頭難于敲折東山發源雙峰巻衣把大蘇狂瀾障而東之微此老孫子已而已而高麗指堂講師畫像贊巖巖指堂破塵出經惟其能然曰聰慧人隄圓頓之頹瀾㑹中下於通津横説竪説匪虧匪盈全提半提匪壞匪成夫是之謂全體之用兮全體之真妙湛禪師月巖舍利贊并引無盡居士銘雲居三塔其畧云腐胾朽骼匪我岡是宅萬行熏蒸骨如玉如金金玉舍利也妙湛中公火後舍利如此為之贊及笄洗粧一花一香舍父求度回度厥父父子學空機先有鋒父死開法鏌鎁出匣歸奉其母孤山之滸示生有滅笑與母訣火後舍利粲如繁星如金之晶如玉之明堂堂月巖如空行月何庸留此自暴醜拙下天竺古鏡法師畫像贊伽黎擁肩不舍夜旦革履梏足炎熇不跣迹邇世相而不動不退心惟𤣥奥則唯止唯觀四辯湧兮瀾飜四筵擁兮氷泮特㫖住山靈山未散洗舊講榻萎花新換至於戒香逆風騰播林野吾嘗比之波利質多羅天樹花此之謂也陶司户畫像宅塵滓拔千丈之俗倚梅竹託三友之交稠人廣座則惟静惟黙涼天佳月則或推或敲問津榮途姑欲行志於志得時反求諸已自題頂相謂有為吾奚為謂無為吾奚不為待悟而勇為絶學而無為於戲盡之矣非吾為王梁山畫像贊從事毛錐壯夫不為置書學劒弓號馬嘶不斬樓蘭夫何自欺堂堂梁山襟利帶夔帝軫遐方詳延瑰琦良馬素絲組以五之維賢作牧任以撫綏撫綏伊何恩斯勤斯豈惟懷恩亦復畏威庶靖氛埃以偃鼓鼙昔人可師感夜半雞哂乃阿瞞横槊賦詩台宗傑首座畫像贊性具染指鼎味咸在容膝歸休日用三昧不動口不饒舌人無聞聞吾無説説翻嗟普眼弗見普賢為渠去却眼中金屑複道行空白銀為闕野月贊廣寒殿洪崖井輪有晦朔景無畦畛悠然隨所寓婆娑弄清影莫羨江樓清江樓塵汙人姚别駕命作四箴渥吏悍民怯其途則殊等而眡之氓疲不甦清明在躬執中以居御民如兒御吏如奴謂吾寡恩我不姑息謂吾遺直我不自得畏則如虎敬則如母擴而充之天下刑措右慈以容以寂止喧八窗闐然寂而忘喧珠澄濁淵不住喧寂而逢其原其静有餘其樂也全山林市朝不見畦畛失之毫釐大小異軫惟全乎天意行則往心逺地偏非一非兩右静而勝身體髪膚賤傷貴全多慾自戕傷孰甚焉彼美聲色或謂如鴆必其胸中所樂者勝古夏后氏娶於塗山樂不在娶隨山濬川禹何人也予何人也睎顔之人睎驥之馬右養生也寡慾古者網罟以魚以畋後世粒食網罟可捐一鱗之沉一羽之縱推吾此心仁不勝用方寸之淵較縮與盈悠然翻濤溺馬殺人好生之端志其大者大徳曰生黙運元化右好生也不殺堅窮壯老二箴并引余至宣城之清流丁山窮老日益甚因范曄書有取於馬援丈夫為志窮當益堅老當益壯作堅窮壯老以自箴何以御窮曰益堅不則濫是故君子固窮出輒途窮途窮則返居輒技窮技窮則思辯輒語窮語窮則黙謀輒智窮智窮則止窮諸理盡性而已右堅窮箴益壯以佚老壯色日零新新代謝曰不在是在所養者物莫我嬰物莫我化善乎楚丘之為言也使我當諸侯出正辭吾始壯矣不則死矣尚追車而赴馬嗚呼近之矣猶未也右壯老箴高祕閣金書心經頌并引東禪明覺院比丘妙信創華閣舍補陀大士判府祕閣高公年八十九飛歩登閣早年夢像若今所造施玻瓈瓶承以白金藕花其餘佛事一一隨喜金書心經欲寘大士心中而身相已具罔契心初蚤暮懇切寶脊砉然獲本妙心十目驚嗟嘆此創見蜀人北磵居簡比丘謬振頌聲一十一章章四句嘉熙元年二月初九日大般若心即天地心區區㝠求滄溟索針爰有大智金書作供欲充佛身妙發機用佛塵沙身無乎不在作如是觀墮世間解離世間解復何所求於東招提一瞬協謀塵沙佛身初湧出海小白花開物物三昧願以所書印厥心地此念始蘖𤣥覽斯契寶脊砉然虛鬲以俟若合符節如龜從筮微此大智孰考其眹惟神而明函蓋相稱我觀此經非金非字而此寶脊未始啟閉繄正法明曰觀世音澄五濁瀾如一月臨臨兹大智浄徹無垢介以景福介以眉壽謝林元之議命不知命君子奚為未知生夫子不忽義命所安之地死生自樂之天庭葉報秋記山中之寒暑嶺雲分瞑變户外之隂晴適此閒情成君竒術王鍊師問道之在天下猶川谷之與江海域中四大王與道居其二吾一之一之何如曰王以道尊道以王行道失所以行則稊稗瓦礫也王不以道御天下寡助也獨夫紂爾茍以道則皇極建百度新綱常振遐陬寧雖然豈獨王哉一身小天下茍昧是晝罔不冥瞭罔不盲履嶮不寤臨穽不却所謂無黨無偏何自而知若夫富貴利達貧賤患難皆身之川谷江海流行停淤而道之樞機户牖旋斡權變故曰川谷江海在天下相道之在人則天下同百姓日用而不知故君子之道鮮矣戒䑕北磵足跡半天下習爾情狀尤得桀黠之情故為爾忌而未嘗忌爾所謂幾辟網罟固所不忍為孰謂爾以吾為可欺晝跳梁夜穿窬飲食服玩皆爾傷殘之餘凡在吾室之君子謂吾信不孚不能格爾暴則將舍我而他之彼既舍我而他之吾亦豈能安吾居爾之逺君子近小人孰甚焉甚矣永某氏之禍商監不逺勿謂吾不爾告戒頻伽頻伽踐木偶抑無知乎將踐鷹鸇木偶君子也君子虛與道冥入鳥不亂行入獸不亂羣怒而加誅不啻黄帝絶梟獍之類汝母陵善而駸駸梟獍之樊庶幾逭君子之誅其果不悛木偶之禦侮畢弋從事覆巢破卵可立而待水利以轂横谿搆軸於岸比竹於輻發機而旋非深湍無所事後重而前輕俯仰如人意幷可以施其巧此車槔所以别也水梭窽如上架而縻之當畎澮之衝溢則出涸則納三者用於蜀吳車曰龍骨方槽而横軸板盈尺之半納諸槽側而貫之鈎鎻連環與槽稱參差釘木於軸曰猨首䠞以運其機澗溪沼沚無往不利獨不分功於槔槔梭一人之力龍骨則一人至數人車則任力於湍隨崇卑之宜雖灌溉之功豐約不齊其得罪於鑿隧抱甕則鈞也不為善雞鳴而起舜跖之辨縣判於所為為善而放利舜之徒可為跖非吾徒也吾善且不為為利乎或曰不為利斯可矣不為善非跖乎曰吾固有者善也焉往而非善無為也非不為也孜孜為善油然幾微於有為何以異於為利欲其為之務隐也故曰吾善且不為為利乎吳江性上人擬濠上游鯫鰅躍清池郝參軍所賦南蠻謂魚曰鯫鰅桓大將軍云作詩安用蠻語郝云千里投公得一蠻㕘軍當不用蠻語耶吾愛其躍字風致以訂楚漆園吏濠上酬辯賦濠上游云非鯫鰅夫何疑子非我吾何知惟其不知故不疑而全夫天倪潛而躍悠然兮樂夫樂寫神使人偉衣冠肅瞻眂巍坐屏息仰而視俯而起草毫髪不差若鏡中冩影未必不木偶也着眼於顛沛造次應對進退顰頞適悦舒急倨敬之頃熟想而黙識一得佳思亟運筆墨兔起鶻落則氣王而神完矣少陵云褒公鄂公毛髪動英姿颯爽来酣戰所以美曹將軍也張横浦則曰孔門弟子能竒怪畫出當年活聖人所以詠子温而厲威而不猛恭而安人鮮克知此妙故重為商評之贈醫卜風水方生池州病有醫死有歸卜而息疑負是三者而游人間世人舍我而安之夫如是三鍾十束異乎支離踈之素尸管城子或謂管城子銳而天非知言也文場掉鞅詞林奏技舍子則誰與子則沾溉餘潤㸃發新竒卒成其志功其懋哉故知有用於世者一日為壽不則百年為天也審矣余鈍而無用視子則有媿撲滿子吾與孔方兄絶交久矣至於貿易所須則又未能與之忘情貯以小罌遲其盈將示以持滿之道往往未盈而輒出之其出也又貯夫制作近古者一二以求其類諭之曰二老者天下之大老也其父歸之其子焉往惟其然是以不匱始悟絶交之非賦招隐床屏以方正之質受屏翰之寄使櫺風野馬不得渉吾境隐若敵國功懋而不言雖然必有存焉者耳灰冷弗然木槁弗腴則屏翰在此而不在彼鏡虗忽塵水止忽瀾外禦其侮竟何所事譬夫指鹿之旤不在長城而在望夷伐國之憂不在顓臾而在蕭墻之内也鼎缺陶之精者曰秘色有鼎焉立不倚介而特宏其中虛以容膚滑弗塵質古弗華童子置缶缶兀而鼎缺則曰剛禦剛矣夫如是則大者缺小者折精者折麄者缺故鼎缺而缶完余聞而悲之悲夫剛不以柔濟鮮不若兹鼎干將鏌鋣剛不可犯虞缺耳書諸紳為不善用剛者戒芙蓉楷禪師辯或謂芙蓉禪師剛介失中號服是拒隸名刑書甘赭其衣遂使林靈素逢彼之怒乘間而入徳士之説易於建瓴噫齊東之言也天子方銳意神仙方士儀秦之辯良平之智不足折其妄燕趙之豔晉楚之富不足變其好裒天下之至珍集天下之大美不足變其嗜前疑後丞豈無股肱之臣可諫矣枘鑿齟齬也左輔右弼豈無心腹之任可諍矣氷炭背馳也是時靈素頥指如意衡從惟命豈俟逢怒乘間然後進徳士之說哉公居浄因惡夫末流冒辱倖榮行險黷貨禪講號服録正鑒義裾方頂圓附城麗社不啻囊探更誇迭矜謂之内降商直㩁賈不闗朝省貽玷盛明罪在不敬真賜逮已我則固辭孤衷自許不與衆共死生患難又皇暇恤淄川之濵弗類人境翩翩風帽練練縞衣丹霞鹿門首為之發横翔捷出以大其家粲然麗天耿耿霽月洞上厥緒兹焉中興鄉也與俗滔滔不振不厲即患難之途徙瘴癘之地非失其本心倒行逆施者不為公為之乎公之光明盛大寂音傳在焉兹不重出是作也一以刷公之謗一以補傳載之畧道法師逸事大丈夫者富貴不能淫貧賤不能移威武不能屈公寄命螻蟻試身雷霆不奉明詔以改徳士威武能屈乎黥而流之為道州徒九死之濵過午不食詠歌至化若出金石貧賤能移乎削名刑籍復還舊物賜官分禄簡在帝心曰往欽哉去汝黥涅公念先帝不敢毁除帝曰此翁至老倔强富貴能淫乎方林靈素假道士服旤基播遷易緇於黄天下從之不則竊負而逃槁死林壑公獨緇衣立俟斧鑕視身如葉䕶法如城聖恩寛大不即誅戮非至誠其孰能與於此哉䝉後公而生觀公所成就竒偉峭絶真大丈夫事再拜右繞辭而弔之辭曰黥可息乎身據鼎耳兮息之則殞黥可去乎恩如春風兮去之不忍一念之忍迄於䝉塵黍離闕廷塗炭生靈髠天下僧又安足云邈哉道州隻影問津一笑生還天清地寧衆蠖斯屈老臂獨信隐若敵國賢於長城蠢爾靈素不正典刑雖百粉兮痛奚以平九里清隂蛻骼是舍草枯自春光奮不夜後世何知婆娑其下其顙有泚兮其容則赭油然興起兮如聞伯夷之風者荅踈寮髙處州論激字踈寮論選詩用激字江淹曲櫺激鮮飈石室有幽響待下句然後精神已襲魏文帝流飈激櫺軒未若陸雲通波激枉渚一句中激字便警筞盧諶中原厲迅飈厲字有感寓之思曹植清池激長流殆不若劉楨曲池揚素波則揚字有風致潘岳白水過庭激又在青山外矣余取陸雲激字盧諶厲字劉楨揚字釋言丁已良月十四宣州太守修然去余賦詩以餞郡博士高公炎晦尗語余曰子犯清議君子不子予乃拱而俟則曰守去子譏之余曰流言止於智者今之所謂太守者古諸侯也制千里之命而屏翰王室譏之則速咎非風狂失心不為矧若子之言五袴一錢父母二天皆譏也或曰子以其決場圃之訟失分守之正則去此趙必表貨殖以誤守於守何有守以詩挽子子不次韻乃以尾未大時猶可掉瀾於頽處益難隄之語謝而實譏余曰分守在天下主之者存焉正不正在彼不在此烏乎憾不次韻尊之也謝而陳情則言之者無罪聞之者足以戒故明斥枉直循私以誤守者惜清明之玷也余詩凡八十字序凡四十九字請隻字洗刷譏評遁逃隐伏處使余言當其實中也溢美過也遺美則不及過與不及失中也曰譏則不可序曰遽聞決去此二疏淵明事也莫不起孤風峻節之慕勇不自制遂賦古調末章輒致雙壽堂中玉顔難老之禱躐等而忘其僭詩則曰懷哉小隐侯如水秋練練又若廉泉廉練江靦言面謂練江澄潔廉則過之也一介不取人振滯亦賑貧則不妄取予振拔淹滯賑恤鰥寡也秉彞不可􅟃有實無虛名則惠人以實出於天禀而得名不虛也我欲借寇君九虎限天海欲借留無路也茫茫穹壤間誰是寇君代重詠借留之思也行行拜新渥新紉紫荷槖守以亞卿歸自藩屏必簮筆持槖也何以為雙壽揚州一雙鶴祝其壽富康寧頡頏雲霄也所謂一錢太守雙鶴揚州乃閭巷歌謡吾詩何與哉欲對此君仍大嚼世間那有揚州鶴有客知碑来薦福無人騎鶴上揚州老坡一再拈出也祖述前聞古也曰譏何譏爾吾固曰流言止於智者外物商盤郜鼎古帖舊畫至於珍怪百物無益於寒饑當其為用樂寒饑之功往往稻粱毳褐不相下君子學以志其道必専心致志屏去紛雜制之一正朝於斯夕於斯専則勤志則恪勤與恪有時而勩則沈昏困頓潛蘖於其間是以游焉息焉雜然前陳醒心耀目講明其制作品第其真贋榮粹和整沖漠調暢其筋骸張日新緝熙光明之本然後與之相忘於無窮罔㽞情於毫忽物自物我自我物我俱適也物與我俱適則指染寒具鐡擊珊瑚而佳思何從而沮哉贈輝書記天台輝書記來自徑山琰會中銜袖新句多警策就余求益不知益我實多而無以益之也麟角鳯嘴子有之矣非煎膠無以見其妙如不然吾言試續既斷之弦知余言之不爾罔嘉定癸未秋贈刀鑷工天台刀鑷工初來杭余髮方壯鬚矗矗如蝟試其技瑟瑟如蠶食葉若無刀焉余則賞其輕聲聞兩山間至今彈壓同技余間闗四方歸湖上鬚髪俱槁復試之其心手兩忘運轉挑剔畧不經意則又賞其巧噫工之技昔輕而今巧余之鬚髪昔壯而今槁壯槁者誰北磵遺老贈立上人東陽立上人以書抵余衮衮數百語鋪陳志義援引古昔責我以警䇿後生是以年大為先進而空踈如木偶者為有道則謂之曰子言是也信之於我則過矣子學教矣是欲以語言文字而達夫道今又習禪則必忘夫言忘言之言豈讀誦云乎哉且又以他人之言為警䇿猶惡影畏跡而疾騖亟馳不知息隂處静之為愈也况余空疎如木偶何以酬子之辯而求以稱子則所以益我者至矣反其言而忘之則所以益我者益大贈陳生寫字與刻字孰難曰寫字難畫被忘穿臨池忘緇專心致志僅彷彿古人用筆意公孫氏劒舞觀者得草聖之妙彼順朱耳或曰鑿為筆鎚代腕欲顔則顔欲栁則栁勁鐵瘦蔓出筆墨畦畛與夫游刃肯綮砉然中桑林之舞十九年若新發於硎何以異故曰刻字難往復競辯侃侃不相下欲解其紛而未能也則謂之曰昔人夢鹿子知之矣敢用是而中分之曰二難丁亥九月幾望丁山法堂紀歲月郡刻工陳文頗臻妙䇿其勲弔其貧書以為贈挂屨余明年七十大夫致其仕而挂冠時也昔為比丘裂冠矣乃挂屨或曰挂屨何所據曰木平師挂屨於江南後主之榻休影息迹不復至榻前觀清涼大法眼賦牡丹諷諫矣今年六十九六十九年之非多蘧伯玉二十載而無伯玉之知視屨則有媿因作而言曰一生幾兩遐想阮生之高兩鳬對飛恐入齊諧之誌吾屨之陋蒲疎而凉匪仁弗履懼迷其方匪義弗蹈懼霣其良允履允蹈粤惟考祥寧跣而視俾勿傷寧坐而忘俾勿僵寧䇿其勲永矢勿忘息而筋骸兮遂而行藏挂之墻隅兮戒余面墻言歸或病余不用隨時之義而落落也不顧人之是非擬古浮圖文字駕説犯其忌子之徒怨汝詈汝謂其詈之妄也前日之仰睇子今睇下將其業成進子而子不進乃嗾夫詈也則牧兒㸑婦知其碌碌徒貨殖麗城社飾諂以暴非其類吾非木鐸也詎排鑠金以明子志哉盍歸耕以頤所謂浩然者則謂之曰甚矣子之誤我也人各有夫志志古的也曩明教大士鐔津公著書數萬言輔吾教抱成書獻於嘉祐天子贋浮圗厥類惟錯犄角而攻之方開闗延敵輙循墻而遁怨詈尚何足云且貨殖驕人憲貧也非病附麗以傲物象傲也不悌孰逃君子之誅於吾何有故園一鉏地道阻且長朝夕以思九折羊腸陸誰余梁川誰余航止誰余舍行誰余粻使我轡籋雲追飄風乎乘飛車兮遡瀧使我飭供頓邁逆旅乎孰先饋之五漿肇聆子言如鍼膏肓静而索之莽乎忽荒盍歸乎來兮無外大方示照藏主普州半山老人讀游俠傳謂全萬巻云將此身心學佛菩提何難之有殆不知學佛菩提之與游俠易地皆然槩而言之則可據實理論則適越而北轅除是生而知之方有少分相應自無憂樹下周行七歩目顧四方已是學而知之鏡潭藏主語别令舉似諸方納粟將仕校尉禪師且道它學什麽人杜祁公病婢帖奢膏肓儉瞑眩瘳之祁公瘳其子之奢天下化之功成名遂既壽且康窮居盛行儉徳金石反覆丁寧發於婢子防其子之駸駸習侈靡墮家法欲策勲於瞑眩也祁公子美帖婦翁鉤畫遒勁於冰過清甥館行草掀舉比玉尤潤晉東土以東牀坦腹蕭洒為名談恐不足語於吾慶歴之盛跋頂山珂兄刺血寫蓮經能生不能教親也教必從師師以徳親以恩知報則知道舍是吾何觀刺十指寫三周七喻以為報匪報也盍思瞿曇未説毛頴未血文采未發經在何處若三七日思而得之無絲毫别夫如是則七世父母師長同見靈山未散非汝欺也書經後二十三日慧日北磵書書楊補之梅寓素於𤣥質成烏有責芳於影夢酣黒甜展巻臨窗色香俱在柄此能事屬諸逃禪詠姑射真須春風手先驅醉頴珠玉在側後振采毫覺我形穢書楊慈湖帖奏院崔公為定海之政慈湖楊公之弟之甥之壻在邑學其致書定海以夫三子也而曰簡之所以不得已上浼記曹者胡不得已哉或曰公不輕下語盍遺夫言叅其意可也嘉定君相一徳舜禹臯陶所不逮公猶有薦相疏方是時也莫不謂其得已而不已是豈知公哉或者之言余有所未達書於公貽定海帖左俟達者北磵集巻六
