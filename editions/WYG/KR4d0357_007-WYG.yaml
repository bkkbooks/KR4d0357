body:
  text: 北磵集巻七宋釋居簡撰跋陸永仲題江貫道寒林圖陸永仲題江貫道寒林一幅梵蓬居藏䕶惟謹貧約奉母貿易斗升終母之生百紙殆盡年八十八始以此軸遺圓方外自題曰方外佳友也非暗投矣余讀至此嘆其辦菽水紓䫲頷白眼竒蹟鑿方枘圓但知愛親不知愛畫顔平原粥盡乞米後世有乞米帖梵蓬居以畫市米當時謂之市米畫顔貧于忠梵匱于孝法當配顔傳諸無窮若永仲云結囊勿浪出寒具染凡指方外其從事斯言跋頴徳秀書文賦後異時觀老坡與參寥一帖云見頴上人數紙不覺驚喜雛㹸奮鬛已過老彪及觀頴書栁鬼傳遒婉而勁文賦尤老成頴書此賦毋慮十數本篤於文也第未見其文余不解書喜蓄前軰逸蹟每得一帖則必曰竒技也豈彼能我獨不能竒玩也豈彼有我獨不有夜以繼日思竭吾力兼而有之然終不能有或曰我安用是為治人者勞心治於人者勞力人將勞吾力矣外物則徳全玩物則徳䘮物將䘮吾徳矣所有不既多乎余敬受教䟦頴大師書韓愈師説栁栁州謂韓退之抗俗作師説而自避師名有取孟子子歸而求之有餘師頴徳秀書師説其亟於就有道而求正亦若為老坡書文賦志於文也跋智廣字負唯識百法之學者曰智廣字大用廣大矣用宜稱是少長而名長而字禮也又從而為之説何蔓焉帶為夔所憐無足也畫者足之反使之不成帶寢其説忘其字與名而反諸其身反身而誠樂莫大焉夫如是然後可與論用大跋五公帖或謂前軰貶米南宫字如仲由未見孔子時吾未見其貶也秦淮海飄飄凌雲之氣見於觚牘參寥謹嚴而踈蕩稱其為人無為子辯才師字雖不工率意信手拔俗千丈西菩僧舍故紙中得此五公豁然眼明跋小米畫毫素傳衣蕭然名家彷彿樹杪溟濛水涯吾不知雲藏山耶山藏雲耶跋六代傳衣圖自老胡至老盧一金襴一瓦盂蔓不可滋蔓滋難圖遂使芽蘖千差萬殊曰法曰心自相牴牾矧乃繪事唐捐工夫加以語言毁譽太虛繫影載馳捕風載驅一之謂甚其可再乎讀陽坡許昌朝墓誌銘劉淳叟舅氏嚴太伯銘六經之尊如天自得之妙如日以自得之妙發明六經則日麗天而纎毫無隐以六經含融自得之妙則天行日而周流無迹陽坡居士用力於此收日損之益及其登卍菴之門如漚滅全潮而同乎渺瀰蒼顔皓髯語高領寡不得與民由之有子為不死也可以慰夫九原之思跋虞仲房隸字丹丘林詠道出虞兵部書杜工部李潮八分小篆王宰山水圖兩篇隸法壊自公始然亦自成一家摶搦騫騰鯨鵬撮摩夭矯容與烟雲巻舒數十年間豐功厚徳之所載識借公為重不專在翰墨也不知公者獨以隸古稱豈知公哉昔歐公以墨君稱文湖州而其篆真草隸皆入神道徳文采光明照人荆公誦其詠鷺歐云與可拾得耳好賢莫如歐公而以墨君失之文湖州後世慎無以隸古稱公而蹈墨君稱湖州之轍也跋雪竇老融牛軸畫牛至戴嵩能事畢矣雪竇老融則又出於規矩準繩之外晴春自牧如超方之士得友得師心平氣定有日新之功露地而眠則飽道足學片石深雲燕晦自若不動聲氣物來斯應新生之特不受控勒方其解衣盤礴想像乎尋牛訪跡其既成也庶幾乎人牛兩忘已而不復自惜與好事者共之不見筆墨畦畛則又何以異夫轉位回機聖凡所不能測或者以秀闗西讓龍眠之説繩之不直老子一笑跋横浦帖横浦不喜東坡晚自嶺外歸始誠服焉手書其韓愈廟碑讀孟郊詩送琴聰序無慮十數舊在閩中見於韶石諸孫紙尾有大慧題字云横浦喜書此使韶藏䕶惟謹今復見此叙字差小於鄉所見横浦小字不易得尺牘之類亦且大把玩不忍置雖無玉蕤薔薇冷泉芳栢可熏可濯耳跋沈大卿徳和修浄覺塔記某年月日大卿沈公徳和重修浄覺岳公塔紀歲月詔後世岳師四明禮公而輒難禮反復數千萬言弗務勝務歸於是而已四明倘未死未知鹿死誰手東坡謂莊子盗跖等篇真若詆孔子實陽擠而隂為之助適與楚公子之僕相類以為弗愛公子則不可以為事公子之法亦不可吾於浄覺四明亦若是説綿綿新學亹亹譏議覃及孤山曰山外宗獨未見如兩公者出忽觀沈記油然起余屬學四明者刻諸石噫安得浄覺孤山九原可作與之商評山家山外之所同異云書橘洲跋育王僧圖後雪竇弗作晦堂灰冷遺質而耆文滔滔者皆是盖常笑橘洲跋育王僧圖云佛世比丘皆龍虎變化後世皆黄茆白葦抑有所激而云爾始圓上人欲走江西學佛照鄉語時盍語之曰少林嘗走竺西乎必曰未也則又語之曰子過少林逺矣使後世謂吾不解禪顧不偉歟跋貝多葉二嘗觀此葉於焦山行行老而西歸死於綿之雲盖寺以遺漢嘉鄧秀烈鄧墓木拱矣復見於升上座因作而言曰譯場不作竺錫不至鶴峙蛇驚愕聴眩眡一葉之書與無數葉葉葉之義字字融攝盍觀其義而遺其言所觀既亡其亡亦然古之至文鳥跡科斗今不復古竟亦何有惟道人升好古癡絶焉從得此於鄧秀烈華竺二文一之者人孰為此言北磵隱淪右為升維那贊像存乎㲲教存乎葉籋雲載馳止於建鄴奘蒐遺文以十象馱龍伯取將半淪殑伽今之所存皆其零落殘圭斷璧此經自若經無攸全義有攸往維義與經非一非兩吾不了義又不識書乃於字外洞明心初右為舟老贊跋大參樓攻媿論征僑帖餘姚龍泉寺喚仙閣舊題有征僑二字客屬普滿珣公問於文昌樓公公荅之之帖云云又云終未見二字所出吁公胸中多書若十數世豪貴家畜藏珍竒固有㑹稽所掌既富且夥豈窶人子日生所讐目閲手數旦旦知出納之地哉盖嘗見於大人賦厮征伯僑而役羨門兮詔岐伯使尚方甘泉賦雖方征僑與偓佺兮猶彷彿其若夢顔師古曰方並行也征姓北僑其名仙人也伯與北聲訛耳豈公未見相如子雲賦乎吾固曰公胸中多書豈窶人子日生所讐目閱手數旦旦知出納盈縮之地哉開禧元年季秋旦北磵某書於鄮山三錫堂題彧侍者牧牛圖牧牛看牛孏安大仰無所用吾力也佛印四牛畫蛇也梁山十牛蛇足也自得六牛足屨也按圖索牛猶索馬也孏安大仰逸嚮遺韻掃土矣舉圖而捐之不見全牛而頭角全露至於人牛兩忘入􅆵垂手皆此牛也昧夫在御而他求何獲焉跋嶼山葛魏二詩嶼山非聞寺近海不數里餘姚在其左一舍强半宣和間待制葛公次仲丞相魏公南夫尉餘姚時留句壁間寺因有聞而後生益懋勉吾不識兩君子徒誦其詩得其心其功在太常事在太史文章在天下後世不以富貴稱而稱其文章不與富貴磨滅如流俗臭腐而與此山俱傳也如此跋嚴太常帖潞國公及里門則步謂父兄行輩不敢不敬其年徳俱邵而與鄉人齒也若此及觀太常嚴江隂家居尺牘十餘幅親故往來詳緩周宻莫不曲盡十八擢第七十而致仕僅有先人之廬而禄止一傳善人報施何嗇哉四世孫為釋子曰法傳出以示予書而歸之跋嚴太常編傳燈節傳燈非儒者急務能急於斯非達性命外印組不滯一曲者其孰為之或謂蚤年登科為不幸以其仕則不學矣太常丞嚴公十八登科官居餘暇取傳燈千七百則佛祖機縁言句之切於日用者蒐英獵華手抄巨編老不釋此書易簀時説四句偈遺子孫一語不及家事所成就者可知已跋後谿劉西清贈艮傳二帖艮傳嗣講行脚皆後谿西清劉侍郎徳修指南傳歴百城自初友從别峯來至慈氏樓閣門開所見幾人所得何法若謂有得負吾後谿果無得耶亦復若此至於無得之得亦莫不然夫如是則後谿所不死者與童壽紫金色臂同一闗紐跋龍門元侍者血書華嚴八十一巻作八巻龍門佛眼侍者天竺覺元上人血指細書華嚴八十一巻為八巻外看經人名氏一卷錢塘薛大資昂作記并跋圓悟大士馮大學濟川皆隨喜贊歎後一二莫非名勝衲子不知講明續紙嗣書蕪翳先進庸言俗畫駸駸不已雖圓融行布無所不容然魚目驪珠必先分辨遂别作一巻首書薛公記跋繼以圓悟馮公一二名勝其真蹟則存諸經後余則題諸卷末虛左以俟如薛馮者一以致尚友古人之心一以旌忘軀報母之孝一以遵勿輕末學之戒跋九峯了應溈山警䇿後彭門九峯了應比丘使山隂正受比丘作歐陽率更楷法書溈山警䇿欲鑱石以示人俾人於端楷心畫中識古人懇切語如食瞑眩而起沉痼曩余客呉興見名相之學者讀此書置書而作曰鄙野逕庭不足取也則語之曰吾尤病其文采爛然也揚雄之文佶屈聱牙終有俟於後世子雲若溈山之鄙野逕庭亦俟後世溈山矣跋山谷緑茹贊真蹟山谷草聖不下顛張醉素行楷弗逮也然皆自成一家法如王謝子弟不冠不襪雖流俗人盛服振衿不如也右緑茹贊疑其宜州腕力潛微時作不然何以綽約柔緩也如此跋查菴懷浄土醻倡集并馮給事歸去來詞般舟三昧心法也生人固有之善一為習所移則貪殘其俗險狠其聚磨蟻旋復莫究端緒習具濟勝責獲稱習出乎爾反乎爾也善茍不移也瑶砌幢刹瓊沼泜岸胎菡萏聴樹林即塵蛻塵心想純熟生死由是楞嚴所謂心存聖境時復冥現先覺曲示方畧授繫念之要於上上種性雖殃積禍稔垂訣之際苦相在目教以十念惡習立轉夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚不能不楚言也賈生之言得之矣正不正在習而九花五濁遂風馬牛不相及跋平江寧上人孔子廟堂碑書學廢識書者益尠韓愈稱羲之俗書吾所以望後世者益狹虞書孔子廟堂碑唐人駸駸晉人者南北壤斷贋跡實繁此本蓋亦未易得嘗自其殘缺處而求其全沈潛往復而遺其全然後殘缺之大全了了在目雖有智巧不得而形容於語言之間也跋青羅山翁示子帖右數語所以開示子孫者至矣思其所示而求諸將見子充然家有哲匠而馳驟於外吾恐家雞野鶩之誚復見於此熏曰吾祖死矣則謂之曰亦思其所示乎曰思之則又謂之曰爾祖未始死跋鄭宗聖博古考義用器求古器有真贋古人意安在然則古意終不可求歟古之盤盂几杖有銘循銘辨器觸類求之贋與真了了吾目中譬水飲者不俟傍睨知冷暖之節鄭宗聖束髪好古資盡於器捜經史探傳記旁羅曲采於圖書欵式又質之於博雅前軰悠然得之於心作博古考義數十巻一名一物皆有本據沉潛反覆老而益勇盛世苦心之士絶無而僅有所謂吕榮之辨以吕氏榮昌為發宜重加詳而我告跋清真亮老所得勾獻可孟藏春詩蓄竒玩衲子所深戒懼䘮志也然寓意不留意何傷乎亮清真得小米雲樹半幅桃源太守勾獻可久假而不歸留詩以為謝江東部使者孟藏春次韻補其虛槖舍畫而得詩與嗜畫何異哉雖然殆不足與暢法師白玉塵尾同日語題皎如晦行書後山五詩皎如晦寫陳後山送寶講主云暫息三枝論恐枝字不當從木支姓也天下博知莫如三支謙亮䜟也從木有據乎抑筆誤耶下云重叅二老禪指趙州臨濟也二老曹人寶亦曹人公在曹歸徐時也皎作二祖非是盖初祖至六祖自有名三支對二老最切半山老人每以方語對方語梵語對梵語後山用是道也題惠崇栁塘春水鴛鴦容與於老栁煖烟春漲中便覺瀟水湘波回塘曲渚欵乃一聲悠然到耳而忘其為畫也跋東坡海外三帖一帖喜五仙雲搆落成一帖市雲母煑膏見公衛生有經謂其求長生恐不見後一帖樓攻媿䟦此帖云坡彭祖廟詩云空餐雲母連山盡不見蟠桃着子時今有十斤之需何耶書璧書記詩卷余未識永嘉璧交游中多有詩贈之乙酉春仲璧自吳門過余於西湖南宕客舍是日新晴破隂欲與孤山泉石相勞苦擕璧與數友歩兩堤掃天樂趙紫芝梅棘於湖隂拂竹巖錢徳載舊題於江湖偉觀喚舩絶湖尋寒泉趙叔迕瞑歸賦唐律貽璧囑其藏諸公軰名勝珠玉使我覺形穢跋諸尊宿帖翰墨不足論諸老然皆可觀若曇與訥固擅書名佛智老禪又自得筆外意韓子蒼評大慧書如古錦囊師子非老於研墨者未易語此跋陸放翁帖鏡湖一曲皆翁吟嘯提封翁所自有非若賀秘監請而有也遂與山僧巷友争漁樵席翰墨淋漓人争得之是三帖遂為勤上人所藏跋圓悟真跡示惠悟宜人語在建炎初元仲夏老子間闗江淮烟塵時也一言一語務開晦昧正人心掲正眼曾無纎毫自為安適計盖佛祖在人間世别無他事惟此事耳自此歸雲居尋歸少城婆娑大隐得人雖不若全盛時潛符宻契若惠悟者未易一二數攬此舊墨使人拳拳跋圓悟書圓悟老人自雲居還蜀瑄無玷侍香覺華嚴掌記元徹菴首衆於以見三朝人天龍象駈駕豪雋而與鄉人處曲折詳盡如此一再讀之恍然鄉黨篇中見孔子跋老融散聖畫軸自普化金華至蜆子凡十軰意緒情態皆不失傳記所載非高懐逸想經營盤礴不見筆墨畦畛若老融自成一家者未易模寫曩留四明最久間得之好事者輙取去今僅存觳觫一紙議者以其微茫淡墨不足以永久遂目之曰罔兩畫行軰中壽此山一時名徳作詩尚竒澁時號梵語詩良金華玉市有定價浮俗不知也因書融卷後解嘲壽云跋禪㑹圖經史無禪字往往時君世主樂從方外人訪此字義則必據問為説問其字輙不識其故何也字蹟也義宜也遺蹟而宜義洞然心初未畫之文爛爛經史中絲髮不隐使自見之聖益聖賢益賢執而泥抑將瘳焉善畫者狀意以顯義自唐肅宣文後唐少主潮朗刺史老龎翁嫗兒女難疑荅問之情態意緒了了在目終之以靈照昆弟坐亡立蛻或謂了此義者止於坐亡立蛻也耶夏蟲不可語於氷夫是之謂跋杜濠州詩藁權風烟柄月露判薫蕕一喧寂彈壓今古駈駕萬象寓思於嵌谷邃竇邊雲墟霧嚴扃鐍而司其籥騰踏震耀詘信變故觸物遇事挈騷雅之矩而為之發鏘乎玲然於天地間八音相表裏良金華玉豈龍斷塵滓市人能定其價世興伯仲以文章鳴文固不相下詩則清深秀整不為斬絶刻削澄渟涵蓄馳驟作者閫奥人謂白眉最良間闗戎馬間悲歌慷慨一昌於吟嶄然行軰中落落不諧俗朣朣雲錦莫知其幾一班仄管庸盡全豹徒識相遇之歲月於其後命之曰讀世興杜子忻吟草跋譚浚明所藏山谷巖下放言真蹟放言於規矩準繩之外而不失規矩準繩然字亦放若孔子從心時不踰矩矣往往不識此等氣象故有軟語之譏公自黔涪起廢舟泊灧澦鄰檣二客乘月吟嘯曰今代無詩人魯直軟語定不能寫此竒偉之觀盍聨句賦此其一曰千古城西灧澦堆其次曰上陵下浸碧崔嵬酒數行悲嘶不已而苦澁不續公朗吟云曉濤激噴萬丈雪夜浪急回千里雷二客詰姓字公曰軟語魯直客媿謝移櫂右五篇字字有法度為公非家蔵今為譚浚明所珍寶慶二年清明北磵盥鳯泉展玩於介亭之隂跋誠齋為譚氏作一經堂記名去疾字更生一字浚明致力於工成於工師者庸工也必得之於規矩之外致力於書成於經師者俗儒也必得之於文字之表工則良工儒則名儒譚氏世儒名門艮齋謝公書其一經堂云為家之甘棠自是名談誠齋楊公則曰不家於藏而身於藏則幾矣余舊賦張氏萬巻堂詩畧云萬卷堂中浩如海胸次洞然無芥蔕曈曨初日上闌干坦腹便便日中晒敢妄意誠齋同哉盖其與人同者如此跋卍菴法語右三百餘字孰非故紙中千百年死語死語活弄十倍精明信不與當時將死雀就地彈者相碌碌况今碌碌者耶時為之語曰妙喜長書佛眼普説卍菴法語天下三絶跋後谿敬堂詩巻後谿不學般若任運與修多羅合其用敬堂韻贈照有金篦刮膜之語又云少陵令人回向心地初耳北磵遺老書其後云後谿不可推過四明至淳上座寫華嚴經施開元寺跋根本部畧則四種廣則無盡無盡中復無邊乃至不可説轉回入四種行布圓融各安本位各離本處不同不殊無壞無雜不動本際平等無碍八十一卷一嗅無遺百一十城不移寸步逐字寫過未嘗動筆尊者童子至淳上人是則名為三無差别書坦禪師塔石育王塔廟作於晉革律於我宋再傳而禪林始具體而微公來而大備宏畧兼善不遺秋毫尤究心老病孤弱豐功懋徳與此山俱傳既息幻影瘞於鄮之西麓歲清明日羞蘋藻作供於戱塔不逾尋老屋打頭風松笙鏞雲蘿屠蘇泉清石潔流芳不歇退居違古壽藏欺世妄庸成俗各自為計一朝寢疾凡所以給侍奔走已若不相識目未瞑槖分罔均攫拏起争端臭腐與狐兔俱故吾申之為不自量者戒公之名章傑句在方册盖出上方岳之門而内交於雪竇顯尤警拔可紀者半山老人詩在焉書尼刺比丘釋子通稱也尼别男女也七佛前無尼創於耶輸陀羅得度於釋迦文法華稱耶輸陁羅比丘尼傳燈載尼總持末山尼了然妙喜書中有尼無着妙總皆尼之竒傑者了比丘事比丘所甚難尼尤難也佛祖寖古贋浮屠為亂階嫵態媚辭以欽師所謂出家乃大丈夫事非將相之所為使尼均稱比丘昧者靡然從之名稱不正胡往而非不正祖云男女有别草木無傷孔子曰必也正名乎正名天下之大分也别男女天下之大倫也於戲三學寂寥律部尤甚波羅提木义遂成具文而波逸提突吉羅未易議然則奈何曰請以梵法治之冀其自化終不反也然後請命於波羅提木义而從事於波逸提突吉羅不然何以制外道梵志尼犍子等之所譏議云跋歐陽率更九成宫醴泉銘貞觀初歐虞褚薛以王佐才弄翰追配二王謹嚴痩勁歐陽絶出流落天壤間者何限獨化度寺記醴泉銘最為珍玩習之者往往失其韻致但貴端莊如木偶死於活處鮮不為吏牘之歸贋刻誤人人亦罕識真忽見此本殆未易得反復數日書以歸之跋涪州圓上人母氏遺書哀哀母蒼蒼天子失母渡失船有生不歸有蒲可編咨爾涪州圓二者宜擇焉二者一得一亦捐千古萬古廩在前不獨見母求母憐祖塔深鎖空山烟塔中四辯蜚濤瀾與萬象説常熾然跋趙正字士橆帖山谷貶宜州全臺攻蘇黄門元祐籍中子弟在官者黜數百人正字趙士橆報參寥書中語噫前軰論小人以國予人必空國無君子非鈎黨不可陵遲至靖康縣官䝉塵國家再造往往姦血尚澤遺類抑君子之殄小人其難也如此跋秀紫芝帖參寥諸孫尹公嘗從秀紫芝游秀掌吾大慧祖記屢與横浦諸名流談往往墮其烟霧中異時張魏公駐師利閬用其雜耕渭上之䇿緩諸道餉饋有用之才也荅尹帖中語皆非參寥覺範所能道偶見之於啓上人喜為之書跋常熟長錢竹巖詩集竹巖孏翁錢徳載問余曰子於詩以前軰誰為準的余曰以自己為準的竹巖笑曰子何言之誕也余曰事與境觸情與物感發之於言惟志之所之不至學孫吳顧方畧何如耳竹巖曰審若子之言陶謝其猶病諸雖然陶謝亦人耳少陵號稱詩史又曰集大成老坡比之太史遷學崐體者目之村夫子或又謂文章至李義山特一厄學郊島則工於一二新巧字謂之字面已見笑於商周庸人小夫余用力陶謝博約少陵十數年所得於風濤塵土中古律相半盍為我觀之欲觀子嗜好與我何如時括蒼太守安僖諸孫希明欲刋諸郡齋於是擇其警拔者得三之二合二百五十餘名曰竹巖拾藁嘉定紀元重陽後五日北磵某書於丹丘般若精舍跋錢彭􅙕吟僊傳天地間竒詭莫若吟吟果何事哉蕃尠約豐課有責空蒐攪情狀挑剔萬象學詩學僊功成蛻蟬紛紛後生競浮靡文淺率欲謝晻黮乘滉瀁而友倏忽闖吾彭􅙕傳載弗望洋向若吾不信也因作而言曰聲成文文成音逸響兮沉沉悠悠兮我心跋汪龍溪彦章殖齋記周知丞宗聖祖吾取諸老跋周氏殖齋記一語云殖之時義大矣哉惜哉龍溪寓以耕也遂以其子聨翩擢第為殖之效回也好學其志恐不及此此漢儒所謂經明則取青紫如拾地芥安得殆庶作於九原與之論夫學壬辰閏月二十夜漏下數十刻北磵某書於殖齋諸孫季舒景魏甫家跋孫晉陵帖晉陵無恙時索詩索字應接不暇不獨展獨笑一限展獨笑一限帖中語也六一翁送詩與梅都官和家人云好時好節送詩去擾人是不知太守之樂其樂也跋蓮社圖此圖之作始於龍眠李伯時余則喟然而作曰理亂不闗懐利害不入耳迭評遞品為佳士不捄覆亡身隨戮辱不為也非不能也遂使此一十八人放於匡山之陽鑿池種藕授詩譚易為般舟之學身土俱厭冀西向之歸吁兹何時哉書元次山惡圓惡曲後阿即墨皆齊邑阿譽日以聞王使人視之其政厖亨阿大夫及其左右所嘗售譽於阿而致譽於王者圓轉曲從旤阿以及其身即墨政美而無譽王使人視之乃受賞圓詭隨也曲亦爾詩曰無縱詭隨方正者所惡如惡惡臭元子作惡圓又惡曲曲與圓一耳何兩哉未有能圓轉不能曲從而能小人也惡圓曰寧方為皂不圓為卿寧方為汚辱不圓為顯榮吾以望夷之事訂之然後知秦空國無方正之君子有則寧方為鹿不圓為馬寧方為死不圓為賊賊臣雖暴猛豈不折堂堂弑逆之胆而自䘮其魄哉姦邪凶惡其㘥乎於戱不有君子其能國乎書劉蛻文塜銘後天下文明涸為華川萎為春妍時危則鄭衛日淫風雅日瘖盖聲音文物為禮樂之容禮樂興衰闗時政觀風者不敢忽劉蛻文塜銘巋然於梓之兠率寺距吾廬不數舍觀者莫不慨其所為嘉其志一而氣老逶迤多態言盡而意有餘十五年得二千一百八十紙當時不加采用至今四百餘載遂為人代之羞貞元元和間詞人咳唾珠玉若蛻之英體逸調世果盡知與不也耶其自序曰然自振無力終知者甚稀豈非不獲人助乎榖梁子曰心志既通而名譽不聞友之過也何必聚而封之由此觀之則其中礨磈不平待天下後世有餘憤安知来者遂無類己者出發而明之噫三都未成人已欲覆瓿法言未振俟後世子雲不知不愠君子之事也豈未聞君子之道乎或曰魯壁汲塜龜從筮貞不華厥躬或華於人探吾破囊襲古芳塵將用晦而大明閟何病於幽扃書米老書高麗稱孔子佛余為佛者有為黄老者出此索余著語於是徧閱題跋皆中朝富貴人莫不知尊其師而以佛為諱見於行事則往往相戾吾欲尊吾師吾師弗俟吾尊而尊也曩尼宣之彰教造法堂上梁其畧云人其人廬其廬矧愈之强為辨也爾為爾我為我於惠也初何傷焉兹於斯亦作是說題瀟湘八景少時誦􅓦音尊者瀟湘八景詩詩雖未必盡八景佳處然可想而知其似也忽展横幅於飛來濃翠間詠少陵所謂湖南清絶地便覺精爽飛越題廬山圖曾見廬山是謂不負眼識其面目弗俟歩屧烟霏臨眺寒翠出竒品評取巧圖寫舍是未必不若毛延壽之於歸州女兒偶閲此巻殆庶乎萬一跋瑱師所作飲中八仙圖飲中趣詩人歌之詩中畫畫者臨之可以止矣題跋者方争妍取竒角其力於八仙酣適之地若非耽其所嗜若路逢麯車則必欲坐詩窮於作歌者之間闗浣花瀼西突不黔而後已北磵不敏請避三舍跋方别駕味道記黄叔向檥舟圗檥舟有待也記之者能道其意中事從而發其藴者稱是半淮吹腥豐豕嘯類餘波末流無所不至纜可以解矣運一耳目均諸同舟風怒雲黒水立晝暝不約而同若左右手飛廉海若無用夫勇則於吳起掉舌魏文恃險果虛語哉跋西嶽降靈圖降靈筆墨自龍眠此圖之工緻開巻即知為龍眠老手布置人物雜以鬼怪洎妙麗乘跨皆不失幼長貴賤之序進退向背之宜雲中巻舒出沒非全完而全完出人意外至於毫芒瑣屑出竒䇿勝疑其為老劉或其徒劉朝圭所能盖嘗見諸白玉樓畫於臨川陸伯敬伯敬象山之子自言得之於荆門而毫芒瑣屑出竒䇿勝與此無有二可珍也已紙絹之壽千年半千不足計不幸落浮俗富貴家藏以什襲肆羽魚宅於中與塵􅅽俱盡豈若遇名流時一鍳賞之為愈譬夫朝聞夕死豈不佳於什襲一千半千載壽於羽魚宅哉書泉南珍書記行巻學陶謝不及則失之放學李杜不及則失之巧學晩唐不及則失之俗泉南珍藏叟學晩唐吾未見其失亦未見其止駸駸不已庸不與姚賈方軌薄靄遮西日歸雕帶北雲題金山也永嘉詩人劉荆山抵掌而作曰應是我軰語暇日裴回孤山南北宕弔天樂墓田憩叅寥泉論鍊意與鍊句鍊字之别噫適然得之者意何鍊為書曰爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳凡二十九言詩則曰訏謨定命逺猷辰告八言盡厥㫖詩之嚴句與字均若渾鋼百煉書以遺珍識是日博約書鏡潭照藏主水墨草蟲鏡潭照草蟲水墨出竒便覺蘭陵畫手風斯在下當如伯樂相馬取其神駿遺其牝牡𤣥黄題水墨狸奴䑕不仁執之尤不仁寫生者増其猙獰益重吾之好生題龍眠控馬圖銕踠趣銕蹄踣行如雲立如玉誰寫神駿一空冀北矧乃御者非賤工也跋甜畫寫生最難形容其難更難題跋亦難不問工拙又難順情胡寫又更難胡寫了欲人不笑倍復難於前數難思其所以難而却其請而求免見訝難矣哉跋臥雲樓詩晩唐之作武盡美矣李杜韓栁際天濤瀾注於五字七字不滲涓滴鏗鍧畏佳盡掩衆作或曰晚唐日新唐風日不競莫不譁而咻之淳熙初四明張武子續遺響數十年間相應酬者較竒薦麗眂昔無愧今出新篇逾百客窓夜檠昏花為之落蔕清警特殊絶其尤者吾不得而形容退之招楊之罘云之罘南山來文字得我驚今得新篇不覺毛髪噤㾕跋朴翁詩葛天民朴翁詩偈一十五詩帶莊騷偈蛻𤣥妙非無𤣥妙也如古畫工投膠於丹碧求痕於膠空雲鳥蹟雖離婁子莫得其眹緇時一斂髻後十四緇時非不佳終不若斂髻後衡從恣横弗可加以準繩而不失準繩信手方圓毛髮無遺恨好事者徒得其蹟於平時其蘭亭真蹟獨吾與烏有生相眂而笑於其泊然之頃當與知者道跋陸放翁帖予束髪就外傅時先生長者言蜀帥范石湖陸放翁賔主筆墨勍敵片言隻字人皆珍惜壯而游吳越始克識之因其與吾蜀别峯橘洲諸大老臭味之偶故屢聞謦欬帖中所謂正法龍華皆别峯在蜀開法處與翁蹣跚勃􅌥抵掌嘯詠之地若季長知幾亦蜀之大名勝翁於數公尤壽考晩年使子孫選陶謝警䇿語於雪壁拄卭州九節竹東西而觀之拳拳於蜀雖竹䇿不相舍貴其有節而重蜀産若與帖中諸老游焉跋陶山帖陶山謂荆公素不好習書不欲踏人脚蹟不特書爾至於問學不喜觀左丘明肯踏他人蹟哉得時行道凡所建明衆所不與此其特立獨行者如此右一帖筆勢掀舉而穩重雖不習書吾必謂之習矣陶山東萊書其後吾欲分其一又恐天下竒物不可離其偶屬恢䕶持以傳世後見我必出此作供跋甘露滅記韓徐語了翁不喜寂音尊者稱甘露滅自是叢林以字稱妙喜聞後生稱覺範輙斥之曰甘露滅乃真浄嫡嗣奈何以字稱了翁妙喜豈相反者耶送僧序懲尸素而傲睨高躅針衲子之膏肓記韓徐語示古宿之緒餘所謂雪後見西湖諸峯則不勝踈爽今於西湖踈爽中書其後望燼餘雪後諸峯不啻於寂音勤止之思跋四明何道友寫華嚴五十三人一縷穿小兒雖小胆如天百城烟水無重數買得歸來不費錢或曰書經佛子何道友請跋手書華嚴乃贊南詢童子何哉則謂之曰八十一巻菩薩説十之七八教主輒出光明以表示之非無説也至於雲興瓶注問答繁作一生事畢童子一人而已塵中消息屬之誰與乃知教主放光菩薩問答童子南詢三無差别佛子書之不加一㸃北磵饒舌不入衆數跋荆溪教藏記然尊者生荆溪鼓吹佛壠之道譬如為山始一簣而九仞後世登絶頂小天下自四明天竺孤山浄覺後欲覿其趾或躋其麓亦未嘗乏求如浄覺孤山未之見往往讀四教儀未徹而行舛字訛未見山家一斑輒交口指為山外宗噫安得兩公復起與之論山家山外之所同異跋證覺長懺觀堂舍田檀越名氏碑輟遺子孫之田作長懺觀堂菩薩行人加行之資粮培植祖宗㝠福於既往與買書教子掃榻延師同出一轍非知夫賢而多財則損其志愚而多財則益其過隳祖宗之業者何以及此其名氏謹刻諸石俾後之飯于斯粥于斯觀行圓滿于斯者知所自北磵集巻七
