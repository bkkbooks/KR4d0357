body:
  text: 北磵集巻二宋釋居簡撰止止閣辭歘其羊角海立兮山錯㟧寂然土囊鏡浄兮一漚弗作方寸兮淵淵不風兮自湍溺馬兮殺人襄陵兮懐山息風兮水如砥息機兮心如水歌吉祥兮安時夷猶彷徉兮奚以為紫芝詞并引安僖諸孫希忯卜母宅兆得芝四莖叶其吉其友北磵某為之詞石兮瓊木兮椿飛兮鳳走兮麟草兮芝配是四靈絶類兮離倫㧞萃兮茁英不時兮自解不植兮自萌軟濕兮紫潤麗澤兮芳新食秀兮春滋挹粹兮露零太和兮藹藹至潔兮津津山雲兮溶溶溪水兮泠泠華風兮致祥霽月兮薦清馬鬛未封兮𤣥堂未扃發之者天兮感之者人姚山僧舍怪梅詞有楚者梅根於墻隂寒梢過墻當池之心池水不渾比梅德尊維徳之清請與水論水謂梅兄既清且竒亦復怪古嵗寒不移古則背俗怪則違衆彼衆與俗邈不汝共兄曰不然賦形大鈞有萬不齊粤維鈞成伊予所賦絶不諧俗俗睨盡白以白自淑水泣訴兄兄謹勿言我維漣漪乃行潦怨盍同箋天俾遂厥性反爾怪古及我澄瑩兄謝漣漪爾毋蔓辭天匪汝諧遂及我私杭州鹽官縣開福寺圓滿閣記淳熙十五年十一月二十九日杭之鹽官開福寺圓滿閣成横陳半空俯瞰百尺荘嚴像設如紫金山廣博宏麗如白銀闕檐楹飛動䦨楯衡直意匠出巧如􅀴所說嘉定庚午冬予再至是樓閣門開入已還閉見所未見恍如夢居内宫聆四辯之音又若池涌浮圗瞻滿月之好莫不心死意消平生狭陋之地蕩然無復畦畛更上一層洞開八窓霜天澄明一目千里平蕪盡處海門駕潮沙鷗風颿滅沒浩蕩方是時也将憑虛而遐征浩乎其忘歸也民於農隙爰来止兹禱禳屢豐求福不回心與境㝠善念油然而作潛恥隱慝不訐而露各於衆前密求自新盟於生生不蹈往轍更相警飭舉為善人僉曰浄慧阿闍黎修已是閣之作也隂賛潜翊不既多乎或曰翼翼飛甍厦屋渠渠費以萬計盡自我出蠧我孰甚夫何益哉已聞而喟然曰是不足以語此也吾謀之於喜捨度其有餘而取之否則去而之他不較疾遲志其成而已以吾善幻之巧起其本心之所固有與人為善何蠧乎不聞苛政之誅求乎錙銖不充箠楚立至民賦有常其竇無底娱耳目豢口體苞苴利子孫沒沒弗顧使人狥虵虎僥斯須之生以茍釋重斂與夫樂施孰愈豈不足追議哉置而勿論也而說偈言報化非真佛依真立報化法身亦非真真佛安在哉一月在空虛皎皎千江同溟渤與蹄涔圎缺隨所印影與光為二二俱從月生若謂一即二未免堕諸數重門開樓閣所見與心㑹如一蹄涔中具此圓滿輪作如是觀已反觀即忘我我以忘我故不壊世間相世間成壊相亦與報化等離相而求真與真長相違承天寺僧堂記嘉定八年予與常熟長竹巖錢徳載自西湖来姑蘇借榻承天問藥於可文文新成僧堂可容三千指曰是堂也九年之功耳㣲夫子孰能為我記之是夕篝燈對壘筆敏風雨俄頃而成大抵取韓愈送暢師之説抑揚商評之衮衮數百言頗瑰偉主僧元韶不知講明謂其佐韓而肆詆居無何而文蛻竹巖亦死記不知所在愛堂既至尋訪無有閱其家集亦復遺逸哀其落落不諧俗朣朣明月棄置不售因些而申之曰僧堂非古也霜花枯木象骨留香雖為老病設已見笑於塜間樹下雖然在則人亡則書孰謂古已不復見拂其蹟䟽其源求吾所以無媿於古斯可矣或曰四大吾堂也五藴吾室也十二處吾床坐也十八界吾應量噐也然則此堂可即也可離也則又為之説曰堂之成成既難三條椽七尺單粥則粥饘則饘坐則坐眠則眠毋求妙毋求𤣥毋談道毋參禪毋將心求人安毋將法求人傳實自實權自權頓自頓圓自圓夫如是黄金為瓦白玉為壁汝尚堪任善乎無盡居士之為言反是粒米寸絲便須具角尾償宿負則翠巖遺訓廩乎在前不自勉㫋其誰勉焉承天水陸堂記梁武夢神僧得齋之標目閲藏於法雲殿而齋儀成宋推官潼川楊諤則増廣之東坡上下八位讃則附楊後金山初筵山北寺再振自是裒𡨕福覃法施舍是則奚適姑蘇承天能仁革律而禪閲住持者莫知其㡬湛愛堂之来也凡廣大壮麗之興建咸落成於其手嘉定八年秋余謝丹丘報恩光孝事隠居飛来之隂愛堂遣侍僧志福持䟽来言曰設𡨕無堂何以待檀施子為我著一語付化人浄球使扣檀度後六年而成畫梁飛虹璇題垂雲花欄種玉風櫺吐月廣袤嚴好甲三吳聞者悦見者喜問其故曰球始語人人以為難至崑山遇大施者許某與其室人嚴氏捐負郭二頃歛嵗入基厥功堂成則以田贍衆日走市廛不務速務其成而已亦既就緒復求紀嵗月乃謂球曰事不避難衲子智勇也受不辭尠衲子等平也叢詬負謗衲子忍力也具是三者綫溜穿嵓嵓之石不然强弩之末弗穿魯縞子誠知此是以成此大役而不見其難遂為四方無盡福田俾後之有事於振墜起廢知舍是三者無獲焉釋籖巖記天台法華三昧之所流出與修多羅若合符節如破竹如建瓴非心思意度識識而指陳也今之三十巻九牛一毛耳宏逺微宻淺聞單見往往不能句讀天寳間荆谿然公避寇眷此窮獨惕然而作曰易演於羑里春秋作於歴聘不遇合之後吾以儒冠換伽黎敢忘吾兩聖人所事哉巖栖磵槃糝不逮藜夜龕雲屋拾葉記事不數年抱成書而出名曰釋籖妙𤣥之道於是大明它日妙樂輔行則又釋止觀文句天台以来駕其説於文字作者鮮儷嘉定二年春余陟華頂度石梁訪國清憇佛隴宜獨䝉養正速余登赤城絶頂浣腸井眢浚之則甘泉源源有乳色瞰書記巖臨焚藳池憩釋籖巖周覽江山徘徊不忍去感昔人囏難殄瘁之所成就而光明卓偉如此住山人普應請紀其事以俟僧史大手筆若流通大節融攝宏度則有唐補闕梁肅之言云檢詳劉大監祠堂記俗莫下於訐訐俗一成禍有不勝言者嘉定四年西佘大覺蘭若罹此酷寺既籍千指星散檢詳大監劉公以尚書倪公語詰郡將楊公之言白諸部使者復還舊物後十年余来兹聞諸故老感其事闢山靈堂西位公祠以伊蒲塞俾後来知排難解紛於吾山林無告者東坡記宸奎閣於阿育王山妙喜祠之悳也公活此山佘祠之功也崇德報功禮也公騎箕尾而上八年矣所不死者與此山俱傳故些之以詞而頌遺烈公名靖之字思恭蜀之三池人後谿翁仲子辭曰蜀山兮峩岷蜀仙兮擷英冉冉兮吳雲望蜀天兮㝠㝠稷兮非馨徳兮惟明綿世世兮妥靈戒珠寺重修卧佛殿記蕺山擅㑹稽之勝勾踐昔逰右軍舊處一水一石尚可仿像唐大厯十三年定光葬後石裂龕涌一再不已聞空中聲索肖湼槃像奉以邃宇則既安既固於是用其說舉此役落成於開成五年逮㑹昌之變乃壊大中初再振於寺僧齊翰里人謝乾嘉定五年真浄則顒感楊賔夢像求浴六十年矣又欲承通義師師覺先志盡發所有而新之卧脇吉祥飛甍邃嚴曲盡其巧有加於舊或曰佛者覺也示滅有諸曰有生非滅與生滅世間相也瞿曇不壊世間相於生滅法中直指所謂不生不滅者天地不先塵墨不後雖有聖智莫盡其際區區淺聞狭見管闚蠡勺尺澤方北溟疲精竭思妄加揣量只益自苦盍嘗觀夫日乎大明麗天無所不晝暝入於地無所不夜不有西崦之沉則咸池之浴何自而入無咸池之浴則扶桑之照何自而升故曰常在靈鷲山及餘諸住處是以信蛻凡胎聖之報雪顱不知所以孺慕也醻勝幢覺樹之依大權不知所以悲仰也外侮怡然不知所以適其適也厥類躍然不知所以樂其樂也雖愛惡之不齊揆之於理皆妄也愛惡在已則内制於私外蔽於物淪於生滅也克諸已不生不滅者出焉辭曰皇覺不作作必有則修無所修得無所得惟一真實不一不二何以明之入生出死生報盡矣趣裝前途倏然去留傳舍賈胡春之方中鳥啼花笑我則示之漏盡鐘曉背時之宜解其愛縛援溺拯迷舍是奚藥幻出空聲像亦幻出以幻修幻而蹟其蹟蕺山崇崇可磨可礱矢辭刻山與山始終普照寺重修西方前殿記華亭具體蘭若莫如普照其間莊嚴壯麗莫如無量夀殿殿之殊特莫如孟春之月㑹千萬人繫惟心自性之念事理㝠契人境兩忘淛江以西邈然寡儔複道横陳以翼邃嚴曲盡其巧以盡巧故反見窒隘蓮坐髙廣僅覿其趾眉毫宛轉鮮克彷彿遂徹其舊别敞修楹軒豁前榮八窓玲瓏佛與四衆咸得相見如明鏡中見其面像又若帝網交光相羅如撃其䝉如發其蔀費倍萬計談笑而集真懿大師忠信崇教大師祖祥善巧誘倡徒屬各致其力作於嘉定九年正月落成十二年之四月北磵起於座而告之曰鄉也窒隘而不見佛不見之見初不加捐今無窒隘而得見佛所見之見初不加益見見之時雖佛亦物見不能及非物非佛或曰佛固自若也吾見固自若也有見不見也何故則曰罔克在念狂聖由是即見離見徒問傍睨書以授真懿使喻入社之浄信者俾知窒隘宏敞未始二焉應夢泗洲大士記代人某年月日余之官福之長溪度牛皮嶺憩道傍小菴菴中僧伽塑像與二侍者皆塵埃晦昧使住菴人拂滌而致敬施金造龕障嵐昬霾蝕之患某年月日負丞長洲次修門夢僧緇雲碎零示可怜之態謂余曰牛皮嶺别後無定居兹寓姑蘇城外二侍欲偕来盡瘁不得起子幸顧我言既而寤是秋大有郡檄和糴糴場在齊門外破寺中寺曰無量夀東廂僧伽像丹碧剥落二侍骨立與夢中語無二寺既廢像雖復嚴好将何以容乃徙置北禅完理而奉安於爽塏吁亦異矣姑蘇號樂施之國大士之化如月行空而區區獨於余如此其著古之聖賢聞其風可以律貪激懦况十方耶飭而新之使人見其面而思其行事則善心油然所謂自求多福非外求也九功寺記南齊建元末㑹稽刺史榮頴文頊施第建寺於餘姚之西薦㝠福於其子秘書正字給事中京兆尹休秘書正字太子舍人光梁天監初錫休光為額吳越時武肅王目眚寺僧恵清精禱有瘳改曰光明忠懿嗣興振墜起廢者九彷九功惟敘作今額俾清住持清清源人參見雪峯逮神爽常顯則以波羅提目義律衆自是曰明曰交曰真逓迭而出開禧初學衡台者曰道源文圭訪余於飛来隠居時法堂權輿於住山妙璉而策勲於其徒思齊辟支舍利塔則餘姚令杜髙舊所造重修於敬復者久復壊矣大殿乃了聰與其徒勤苦諸行再造於方臘㶳餘壮麗與堂稱司農丞李端明記與新昌長虞似良書在焉吾聞㑹稽之地左鑑右淛帶明衿台佛仙所廬輙擅幽勝象耕鳥耘未必皆有虞之田也而農勤以孳浚井完廩未必皆有虞之居也而子孝以友故家遺俗猶有存者一水一石尚想見王謝釣㳺處源與圭能為余言之源已矣後来如源者未見也而説偈言齊梁之間竺墳孔章梁不永祚曰吾亡梁陳隋之亡吾固在兹試問諸野亡如何其矧二三君踰矩越度不曰匡捄伊臣惟具好爵厚廩吾何與焉危吾不持吾童吾顛猗歟榮公愛不忘子求福其㝠易第作寺錢氏有國像設日嚴冉冉緇雲淵珠出潛䋲䋲逮今方軌聨躅榮公願輪康荘轉轂咨爾来學是討是論冀此勝幢不騫不崩三過堂記或謂東坡因鄊里道舊故若逃虛喜跫然為文公㳺本覺是豈知公也哉公以熙寧五年攝開封府推官乞外通守杭州之明年有事於潤道過檇李尋訪焉而峩眉翠掃形於聲詩抑見文固有以致公者後六年自徐移湖再過焉文病且老又十年自翰林學士累章請郡除龍圗閣學士知杭州又過焉文死矣所謂三過門間老病死於以見其致意於文也深慶元初蜀僧本覺来住山得公第三詩於禮部尚書楊公汝明遂集帖字同前二詩登諸貞石尚書西歸題字於賢良鄧公諫從之左至今樵豎牧兒能指㸃詫行路人曰東坡三過此賦詩而去公以剛明勁正之氣與姦邪並進爽㧞不可干若千崖髙秋松桂精神草木凜栗助寡忌衆直行徑前危機𡨕施命亦幾殆煙江瘴海至輙忘反虵鄉虎落縦浪吟嘯不知死生患難為何物然則頡頏翔鳴物莫我攖不足為之榮羈窮窘局動與禍觸不足為之辱泛乎水盈科浩乎雲無心至今望之邈在天上住山元澄作堂曰三過補山中缺文而以致其思是紀刻舟之跡而語人曰劍在此余又為之記與尋劍何異哉寳林寺普賢堂記普賢堂之作也為登大峩參禮普賢大士者化城禅榻長連拓飰食􅀴行之地若枯木留薌之制中奉大士代陳如尊者幢幢雲水爰憇爰止咸曰大峩大士所都庸知夫銀色提封玉象歩武果在是乎吾聞普賢行願境界大無外小無間虛可塵析溟可滴數惟此境界不可盡際巋然大峩萬仞淩空虛上出雲雨磅礴數百里其間生植飛走與夫此山孰非是中一塵一沙而此大士身量夀量亦復若是㳺觀之人信種善本及本所願亦於是中不即不離日用不知昧夫心求務以目覩反謂大士與我異致宿舂糧槖糗粻或三月儲䟦山渉江披蒙茸攀嶮巇幸而至其上荘視肅瞻澄慮歛紛極其所見野鹿逺導靈鳥逸響晨霏夕嵐萬變隂晴或矚光相或光攝身天燈瞑升天鐘曉撞見聞㑹心則喜而加信不則謗且怒其不信自心不見自心見量所造而以喜怒為用滔滔者皆是也顛山夏氷廩不可留匆匆言歸薦来至兹主是堂者猶妄冀其曹溪一宿鰲山半夜俾知夫大士無乎不在非此山非他山非近而易企非逺而難致塵塵爾刹刹爾曽不逺人人逺之爾然則某人圗成嗣先振始普光肯堂某人施地區區之心有在乎是是不可以不紀湖州寳雲彬文仲浄業記公名了彬字文仲湖州烏程縣計氏子寳雲寺清湛則受業師也十五能誦妙法蓮花經二十七則發明古方書之秘遇新雨露服伽黎受具畢瀝指端血書所誦之經為衆工發䝉㳙埃之報将尋訪而求度生死法鄭禹功固止之縛􅛄於雙槐堂之東俾州里疾疢者有甚於水火之託蕭千岩陸静州相挽尤力勉為諸公留愈危療急不勝數旋徙瑶山所療不啻雙槐之東五十而修浄業即寳雲舊環堵建繫念之所結搆象設體製大備十友㑹盟一志無移日課有常風雨不渝尅期薫修則北峯印為之主南翔逺日本芿為之伴綴輯藏乗則諸子稽其費諸孫相其役凡根椽片瓦皆公為之倡七十八而績用成居無何厭世之念作夢三僧雲間来覺而笑曰此其兆矣使速印印至則為著解疑一章其徒是後夢有與公同者又復一日見二僧持畫佛公曰大丈夫行當即真安事假為言訖不見索紙書四句偈曰七八終夀禄浄業一生篤目覩阿彌陁平生功行足巍坐肅聽熙怡含笑見佛説法無量衆圍繞於卧内如淨名室不廹不隘諸徒誦􅀴不置至若七日一心不亂處寂然如入禅定嘉定六年十一月十九日夀七十八臘五十一度德稠徳藏二弟子藏先公死稠嗣箕裘兩孫懐就師慧公始以劑砭之技進於道或以為可鄙吾未見其可鄙也昔范文正公嘗願達則為賢相窮則為良醫窮達者士之常而博施濟衆易地則皆然公以是道游搢紳入草澤鍼膏肓起廢疾累行以密裒德務隂不撓世相而相浄業長揖三界翩然而西醫果負公也耶正法醨甚賢聖隠伏贋浮圗厥類惟錯貨殖成俗千礎萬指尸素且不揆一息不来雌雄立判方将十百為伍大書特書刋其謬悠狂怪之言愚吾氓而罔市利聞浄土之説則輒大笑不則攘臂而排之皇皇一生颯然白首日暮途逺鷇穿雀飛方是時也浄土豈逺人哉人逺之矣因作而言曰浄業策勲之速求如公者晉東土諸賢已降歴厯可考余㳺東林企懐古昔山空無人水流花開雖不逮事雁門二難而相周旋於遺民次宗反而求之一社儼然於戲適圓通康荘必自補陁大士尋浄土捷徑必自雁門二難舍是而他之如航一葦於絶潢斷港欲至八德之池難矣哉華亭西寺無盡燈記作光明供供養中㝡獵人之箭洞犀貫革塵龕佛燈耿耿欲灺箭以剔燈天眼證通况夫南畮膏腴基一蘭若無盡光明吳氏子某有田一頃强半耕而穫之數十口可以無飢不以養數十口之家而以為一燈之施者獨何如盖其疇曩有事于補陀大士如谷答響如水涵月茍其棼慮雜想隠慝潛恥不盡澡雪而欲造夫純誠之地何以感格𤣥覺如此其著施所難施不為難者殆非偶然咨爾妙朴盍思其難謹終如初俾𡨕者明明終不盡日月薄蝕此燈長照風雨如晦此燈不夜䝉斯光明若徹䝉覆若披雲霧作此施者心華發明照十方刹爾時妙朴從座而起稽首北磵請說是法北磵黙然遣化菩薩其名曰頴於四衆前作如是言田而耕續光嗣明乗月之虧持月之盈耕而稼智燭弗灺轉空為晝破暝於夜稼而穫是諏是度以綿以延毋止毋作穫而廩歌豐慶稔受者無心施者奠枕時化菩薩作是說已舉以授朴既授朴已作禮而去瑞巖開田然無盡燈記浄名大士既授萬二千天女無盡燈法門從而諭之曰㝠者皆明明終不盡伊尹所謂以先覺覺後覺也後世焚膏繼晷號無盡燈非浄名心也日夜相代為明者日月也大厦既夕風雨如晦瞭然者将眊然待燈而見燈亦豈無待焉惟有待故運行於人日月則運行於天運之之殊不息則一也瑞巖丹丘勝處燈失常運貨殖取贏使此燈不夜莫知㡬興廢住山道全謀諸衆曰貨殖取贏乎墾土收穫乎智紹曰是􅂉一道也顧主之何如主之有常則皆永傳不然則勺海為膏伐山為炬徒爾為也僉曰善紹則請命出山旋淛絶淮積錙累銖閲四年而歸僦工闢荒眡嵗入為無盡光明茁霜蕭蕭隻影婆娑焦心勞思恐蹈貨殖取贏之轍求余記其成為将来之勸平江南翔懴院記南翔懴院成㑹其費緡錢以數萬稽某謀於檀越顧君某捐金振廩權輿於某年月日和而施者響如谷聲落成於某年月日髙廣宏敞極一時壯麗正修之地幻普賢懴悔主如雜花法華所説燕寂之所則闢禪觀攝散亂如留香枯木之制設椸於閤則以偹盤礴解衣注湯於室則以戒宣明妙觸課日用於薫沐則以振其怠裕嵗修於阡陌則以致其久整整翼翼倫次攸敘淛江以西輪奐鮮儷於戲虗空無邉故世界無邉世界無邉故衆生無邉普賢則悟夫無邉衆生所同者始一善至無量善卒踐等覺妙覺以覺後覺衆生反是始一惡至無量惡卒踐鬼畜苦輪輪轉不息茍悟夫與普賢同者歸六用根息諸妄初如䧟如穽如賊如寃克此一念如弹指頃則銀色界應念昭徹六用諸妄皆助道法昔所作業雲㸃太清雲散夢掃即一切空今所懴摩如湯銷氷無别有氷即一􅋀假斷空假邉一前後際不動本際即一切中一心鏡空三觀鼎峙法萬其緒即三而知離三而知即名邪説不即邪說是謂正因正因精明是真懴悔空界衆生可知其際此懴無邉不可究盡昧者昧此脂三毒車策四倒乗蹈八邪轍掉百非鞅疾驅於六塵之墟聚族而謀曰是可罔下愚知者不道也則詰之曰過而不改是謂過矣不知也知者改過乎曰改過然則改過與懴摩有以異乎曰無以異也胡為乎知者不道也仲虺之美成湯曰改過不吝傅說戒髙宗曰無恥過作非孔子曰丘也幸茍有過人必知之詎知此懴未出竺西二三聖賢已行之於此土矣故表而出之俾從事於斯者知夫所謂罔下愚者下愚也南翔僧堂記連長榻旉廣座容數千指開單盋必摉梁棟選柱石然後可以帡幪震風陵雨雖然非古也古之人一生打徹於塜間樹下古已往矣若今食息於塜樹鮮不澒洞觀聽曰怪曰誕曰姦偷鬼物歗族呼類水洒梃逐使不在吾境乃已而姦偷之徒往往託以沮吾法元祐間端師子所勘辯才所拒之妖回頭慶元間趙京兆所黥之風道隆咸其類也此堂之建於以見前軰慮後世者若是作五觀法俾食於堂者作如是觀吾嘗謂五觀具四端猶四體也請論其目一曰計功多少量彼来處無惻隠之心則勤不知耕勞不知炊享非正命漫不加省二曰忖已德行全缺應供無羞惡之心則酣嘻終日無所用心盤樂怠傲蕩而不反三曰防心離過貪等為宗無辭讓之心則餮豐潔饕珍美却䟽糲縱口體而極其所嗜四曰正事良藥為療形枯無是非之心則舍靈龜觀朶頥道不腴日以羸氣餒而不支五曰為成道業故應受此食無是四端者何以深造而自得之自得之雖層氷峩峩精瓊而爢列鼎萬鍾不素餐兮是故縉紳五觀黄太史作而象其因南翔寺僧某求紀其師某年月日雲堂之落成也為具載其設施使知某振箧垂槖不徒其為南翔寺九品觀堂記蓮社作於東林般舟之道至是鼔行於晉宋由晉逮今衣冠緇褐菩薩行人策勲浄業載諸紙上語者不勝數嘉定四年仲春之季昭文錢公象祖易簀之際吾猶及見之佛聲未斷怡然垂訣天香天樂隠隱户牖其聲其臭皆非常聞是時諸孤擗踊號慟荒迷戃怳不暇知聞予時承丹丘報恩之乏與三峰大長老䝉宜獨在焉䝉憎凡子以吾浮圗為誕哤使予勿言前所謂紙上語信不可誣按􅀴中説有佛取土曰清泰國無地問津心能知津不皇不王太古自若不令不申至神自化七情不鑿九品成列塵刹幢盖樹林水鳥法音宣流佛願力故極惡重障報相現時濵於九死一念知反力不暇給遇人教令憶佛念佛十念成就宿負俱泯即生於此雖下下品皆不退轉上善種性觀法精密想念純至一念相應㫁前後際不動本際正遍知海皆從想生如指標月月因指見見境想滅得月指忘月與境㝠忘性亦滅滅無可滅所滅亦空見彼導師與二大士及彼四衆交臂如故悟惟心土非中非邉此觀與堂亦非中外文賁勸發罄竭而助修印振始不徒其為從節承終亦既其力嘉定三禩爰舉是役丙子之秋遂落其成刋諸琬琰昭示来學俾敏厥修毋怠乃訓南翔寺大殿碑隂南翔大殿成於某年月日而後造像亦既久矣古野與殿不胥稱頽圮不可治後某年月日寺僧文杲改作如七金山炫燿赫奕佛像慈而威恭而安給侍菩薩則威而慈天神則威以恭其不敢安則一也巧麗尊特所謂皆有聖人之一體佛則集大成也即佛之大成而得吾心之廣大悉偹即吾心而指衆人之心心佛衆生三無差別文杲辦心李某辦力工之薦巧亦心佛衆生之所同者殿有記兹不重出澱山㑹靈廟記祀天下之大典也德不被物功不及民者不在是典蜡所以報嵗功也凡水旱疫癘蝗螟則黜其方之神然則在是典者庸尸素哉嬴秦時邢氏三女子死而有靈能役鬼工各開湖泖瀦亂流以弭水患澱湖之靈其季也網罟之利舟檝之益民歌屢豐菑害不生一方之氓均飫其恵嘉定七年孟夏大旱奔走羣望有禱輙爽知縣事李伯夀命主簿陸垕躬至巖扃檀木始然水立晝昏濺沫飛濤沮洳冠裳傍睨辟易陸固自若不衡不倚若有相者得魚得蛙速雨之徴必冀所求不獲不已潛魚既躍蛙亦隨至霈雨雱注三日足用嵗大有秋申聞朝廷錫號㑹靈掲榜之辰陸乃肅齋夤奉其行以侈君賜以答神貺觀者如堵震動山谷水天一碧幽顯咸若黄耉鮐背相眡而作曰神来止兹福我兹土千有餘嵗不知㡬縣吏之禱於斯也一朝潛悳徹覆於吾賢父母之手久矣吾神恒其德而旉其恵也褒封之後凡所以恵我者亦豈有加於疇曩而貳其心哉獨嘉吾賢父母能講明政之所先務使朝廷恩渥不及尸素之鬼足以風勵素食怠事俾敏厥修予聞而嘉之遂櫽括其言而文之俾修嵗時之祀者歌之歌曰湖山兮蒼蒼湖底兮天泱泱樓觀兮淩空虗突兀兮金鋃鐺舳艫兮轉輸秔稌兮繞湖不知㡬千萬兮寄豐凶兮慘舒煙冥𡨕兮雲淡風蕭蕭兮葭菼貝闕兮襲𤣥窞物不疵癘兮民不䫲頷煥兮榜題雨露兮新滋神之靈兮聽之華亭白蓮寺記熙寧元年嵗薦饑溝洫間老羸枕藉邦人吳世榮相景徳寺僧宗喜收歛而火於此盖不知其幾也法林嗣興律部謹嚴道俗向化土木金碧咸極其巧藏以度􅀴堂以容衆憧憧水雲挂盋息肩大殿鼎新則思度受其成幻佛與天則思坦悉其力閲二十一寒暑得今額度既老謂戒空曰力不逮志日暮途逺然則奈何空憤悱而作曰将九仭者虧一簣繄我父祖創業未既了此緒役非我而誰乃益自奮厲撙節於寒苦寂寥中不疾不徐爰度爰諏化爽塏於重淵封沮洳為茂林向背衡直各得其所俾於農隙報功植福物不疵癘民胥適悦歴年四十策勲於戒空之手則又屬諸妙恵増其所未至恵徧求紀述莫予為宜予謂恵曰若知夫是刹之成資喜與空久而彌芳者乎異乎吾所聞於今之貨殖於營繕而務速以駭愚驚俗者逺矣茍利其速必不以誠格人而以傀刼也至於然頂然臂鍊指瀝血凡所以鼔吹閭閻傾動觀聽者鮮不勇為治其荒唐謬悠之言聾瞽匹夫匹婦而敓其心使妄冀夫所不當得皇皇規毛髪之利汲汲濟其所欲施如紿漁者亟縱亟釣而求好生不殺之益小不如意則籲天疾呼曰施果不足恃而善果不足為不㡬於龍斷與盍亦觀夫古之建幢樹刹過千百年更廢迭興苟冒其地輙愆於厥躬以逮其後人吾不知胡為乎而然耶揆以吾法則必以為誕哤落落不偶俗故吾罕言以俟忘言者辭曰澱湖北隣機山以西喜来相攸開此招提乃振溝洫燎骼燔胾不知㡬何動以萬計一再有傳至於法林林學南山右規左箴像設有嚴以相鐘鼓建大寳輪以授思度度拜稽首謂坦與空權輿非難難惟厥終繼自乃今罔敢或墜念兹在兹事乃克濟我觀白蓮澄浄不垢名是蘭若亦曰弗茍咨爾来學當如是觀母求安心求心所安北磵集巻二
